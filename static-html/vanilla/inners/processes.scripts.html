  <script>
    (function () {
      var FILTERS_KEY = "datagon_processes_filters_collapsed_v1";
      var overview = null;
      var loading = false;
      var pollTimer = null;
      var processesPrefsMerged = false;

      function fmtNum(v) {
        return Number(v || 0).toLocaleString("ru-RU");
      }
      function fmtDateTime(v) {
        if (!v) return "-";
        var d = new Date(v);
        if (isNaN(d.getTime())) return String(v);
        return d.toLocaleDateString("ru-RU") + " " + d.toLocaleTimeString("ru-RU");
      }

      function fmtDurationMs(ms) {
        if (ms == null || ms === "") return "—";
        var n = Number(ms);
        if (!isFinite(n) || n < 0) return "—";
        if (n < 1000) return Math.round(n) + " мс";
        var sec = Math.round(n / 1000);
        if (sec < 120) return sec + " с";
        var min = Math.floor(sec / 60);
        var s2 = sec % 60;
        return min + " мин " + s2 + " с";
      }

      function summarizeMatchPhaseResult(r) {
        if (!r || typeof r !== "object") return "";
        var bits = [];
        if (r.clearedPending === true) bits.push("очищен pending");
        if (r.clearedPending === false) bits.push("pending не очищали (продолжение)");
        if (r.count != null) bits.push("загружено товаров " + fmtNum(r.count));
        if (r.source) bits.push("источник: " + r.source);
        if (r.durationSec != null) bits.push("за " + r.durationSec + " с");
        if (r.skipped != null) bits.push("отфильтровано " + fmtNum(r.skipped));
        if (r.remaining != null) bits.push("осталось " + fmtNum(r.remaining));
        if (r.priceRows != null) bits.push("строк прайса " + fmtNum(r.priceRows));
        if (r.normNameRows != null) bits.push("нормализаций имён " + fmtNum(r.normNameRows));
        if (r.skuMap && r.skuMap !== "none") bits.push("индекс SKU: " + r.skuMap);
        if (r.productsScanned != null) bits.push("обработано позиций " + fmtNum(r.productsScanned));
        if (r.newMatchesSku != null) bits.push("+совп. SKU " + fmtNum(r.newMatchesSku));
        if (r.newMatchesName != null) bits.push("+совп. по имени " + fmtNum(r.newMatchesName));
        if (r.totalMatchesSaved != null) bits.push("вставлено строк " + fmtNum(r.totalMatchesSaved));
        if (r.userCancelled) bits.push("остановка пользователя");
        if (r.error) bits.push("ошибка: " + r.error);
        if (!bits.length) {
          try {
            return JSON.stringify(r);
          } catch (e2) {
            return "";
          }
        }
        return bits.join(", ");
      }

      function authHeaders() {
        var h = {};
        try {
          var u = localStorage.getItem("currentUser");
          var t = localStorage.getItem("authToken");
          if (u) h["x-auth-username"] = u;
          if (t) h["x-auth-token"] = t;
        } catch (e0) {}
        return h;
      }

      var actOffset = 0;
      var actLimit = 35;
      var actTotal = 0;
      var actPageLabelMap = {};
      var ACT_JOURNAL_COLLAPSE_KEY = "datagon_processes_activity_journal_collapsed_v1";
      /** Длинные карточки: свёрнуто по умолчанию, кнопка «Развернуть запись». */
      var ACT_ROW_EXPAND_THRESHOLD = 300;

      function kindClass(k) {
        if (k === "login") return "dg-act-login";
        if (k === "logout") return "dg-act-logout";
        if (k === "page_view") return "dg-act-page";
        if (k === "click") return "dg-act-click";
        if (k === "ui") return "dg-act-ui";
        return "";
      }

      function kindTitle(k) {
        if (k === "login") return "Вход";
        if (k === "logout") return "Выход";
        if (k === "page_view") return "Раздел";
        if (k === "click") return "Действие";
        if (k === "ui") return "Запись";
        return k || "Событие";
      }

      function fillActUserSelect(users) {
        var sel = document.getElementById("dg-act-user");
        if (!sel) return;
        var prev = sel.value;
        sel.innerHTML = '<option value="">Все пользователи</option>';
        (users || []).forEach(function (u) {
          var o = document.createElement("option");
          o.value = String(u.id);
          o.textContent = (u.full_name || u.username || "#" + u.id).trim();
          sel.appendChild(o);
        });
        if (prev && [].some.call(sel.options, function (x) { return x.value === prev; })) sel.value = prev;
      }

      function fillActPageOptions(pageOptions) {
        var sel = document.getElementById("dg-act-section");
        if (!sel) return;
        actPageLabelMap = {};
        var prev = sel.value;
        sel.innerHTML = '<option value="">Все разделы</option>';
        (pageOptions || []).forEach(function (p) {
          var val = String((p && p.value) != null ? p.value : "").trim();
          var lab = String((p && p.label) != null ? p.label : val).trim();
          if (!val) return;
          actPageLabelMap[val] = lab;
          var o = document.createElement("option");
          o.value = val;
          o.textContent = lab.length > 64 ? lab.slice(0, 62) + "…" : lab;
          sel.appendChild(o);
        });
        if (prev && [].some.call(sel.options, function (x) { return x.value === prev; })) sel.value = prev;
      }

      function renderActivityRows(rows) {
        var mount = document.getElementById("dg-act-list");
        if (!mount) return;
        mount.replaceChildren();
        if (!rows || !rows.length) {
          document.getElementById("dg-act-empty").style.display = "";
          return;
        }
        document.getElementById("dg-act-empty").style.display = "none";
        rows.forEach(function (r) {
          var wrap = document.createElement("div");
          wrap.className = "dg-act-item " + kindClass(r.kind);
          var head = document.createElement("div");
          head.className = "d-flex flex-wrap align-items-center gap-2 mb-1";
          var badge = document.createElement("span");
          badge.className = "badge bg-light text-dark border dg-act-badge";
          badge.textContent = kindTitle(r.kind);
          var who = document.createElement("strong");
          who.textContent = (r.full_name || r.username || "Пользователь #" + r.user_id).trim();
          var when = document.createElement("span");
          when.className = "text-muted small ms-auto";
          when.textContent = fmtDateTime(r.created_at);
          head.appendChild(badge);
          head.appendChild(who);
          head.appendChild(when);
          var title = document.createElement("div");
          title.className = "fw-semibold text-break";
          var bits = [];
          if (r.section) bits.push("раздел: " + (actPageLabelMap[r.section] || r.section));
          if (r.detail) {
            try {
              var o = JSON.parse(r.detail);
              if (o && typeof o === "object") {
                if (o.action === "user_create") {
                  if (o.username) bits.push("логин: «" + String(o.username) + "»");
                  if (o.full_name) bits.push(String(o.full_name));
                } else if (o.action === "user_delete") {
                  if (o.username) bits.push("удалён логин: «" + String(o.username) + "»");
                  if (o.full_name) bits.push(String(o.full_name));
                } else if (o.action === "matching_start" || o.action === "matching_retry") {
                  if (o.job_id != null) bits.push("задача #" + String(o.job_id));
                  if (o.site_label) bits.push(String(o.site_label));
                  if (o.product_search) bits.push("фильтр: «" + String(o.product_search).slice(0, 80) + "»");
                  if (o.product_ids_count) bits.push("в задаче товаров: " + String(o.product_ids_count));
                  if (o.products_preview && o.products_preview.length) {
                    bits.push(
                      "пример: " +
                        o.products_preview
                          .slice(0, 4)
                          .map(function (p) {
                            return "#" + p.id + " " + String(p.sku || "").slice(0, 28);
                          })
                          .join(", ")
                    );
                  }
                } else if (o.action === "sync_price_from_competitor") {
                  var nm0 = o.name ? String(o.name).slice(0, 100) : "";
                  var sk0 = o.sku ? String(o.sku).slice(0, 64) : "";
                  if (nm0) bits.push(nm0);
                  if (sk0) bits.push("SKU «" + sk0 + "»");
                  if (o.new_price != null && o.new_price !== "")
                    bits.push("новая цена: " + String(o.new_price) + " " + String(o.currency || "").trim());
                  if (o.competitor_source) bits.push("конкурент: " + String(o.competitor_source));
                  if (o.random_range_pct) bits.push("диапазон %: " + String(o.random_range_pct));
                } else if (o.action === "my_product_refresh_cms") {
                  if (o.name) bits.push(String(o.name).slice(0, 100));
                  if (o.sku) bits.push("SKU «" + String(o.sku).slice(0, 64) + "»");
                  if (o.site_id != null) bits.push("сайт #" + String(o.site_id));
                  if (o.source_id) bits.push("source_id: " + String(o.source_id).slice(0, 48));
                } else if (
                  o.ui_action === "matches_reject" ||
                  o.ui_action === "matches_confirm" ||
                  o.ui_action === "matches_unlink"
                ) {
                  if (o.my_product_name_full)
                    bits.push("наш товар: «" + String(o.my_product_name_full) + "»");
                  if (o.my_sku) bits.push("наш SKU: " + String(o.my_sku));
                  if (o.competitor_name_full)
                    bits.push("конкурент: «" + String(o.competitor_name_full) + "»");
                  if (o.competitor_sku) bits.push("SKU конкурента: " + String(o.competitor_sku));
                  if (o.my_site_name) bits.push("сайт: " + String(o.my_site_name));
                  if (o.competitor_project_label) bits.push("прайс: " + String(o.competitor_project_label));
                  if (o.product_match_id != null) bits.push("запись #" + String(o.product_match_id));
                } else {
                  if (r.kind === "page_view" && o.path) bits.push("адрес: " + String(o.path));
                  if (o.text) bits.push("«" + String(o.text).slice(0, 120) + "»");
                  if (o.tag) bits.push(String(o.tag).toLowerCase());
                }
              }
            } catch (eJ) {
              bits.push(String(r.detail).slice(0, 160));
            }
          }
          var labelFull = String(r.label || "—");
          var subLine = bits.length ? bits.join(" · ") : "";
          title.textContent = labelFull;
          var sub = null;
          if (bits.length) {
            sub = document.createElement("div");
            sub.className = "small text-muted";
            sub.textContent = subLine;
          }
          var needsRowExpand =
            labelFull.length > 160 ||
            subLine.length > 220 ||
            labelFull.length + subLine.length > ACT_ROW_EXPAND_THRESHOLD;
          wrap.appendChild(head);
          wrap.appendChild(title);
          if (sub) wrap.appendChild(sub);
          if (needsRowExpand) {
            title.classList.add("dg-act-row-detail", "dg-act-row-detail-collapsed");
            if (sub) sub.classList.add("dg-act-row-detail", "dg-act-row-detail-collapsed");
            var rowTgl = document.createElement("button");
            rowTgl.type = "button";
            rowTgl.className = "btn btn-link btn-sm p-0 align-self-start mt-1 text-decoration-none";
            rowTgl.setAttribute("aria-expanded", "false");
            rowTgl.textContent = "Развернуть запись";
            rowTgl.addEventListener("click", function () {
              var open = rowTgl.getAttribute("aria-expanded") === "true";
              var next = !open;
              rowTgl.setAttribute("aria-expanded", next ? "true" : "false");
              rowTgl.textContent = next ? "Свернуть запись" : "Развернуть запись";
              title.classList.toggle("dg-act-row-detail-collapsed", !next);
              if (sub) sub.classList.toggle("dg-act-row-detail-collapsed", !next);
            });
            wrap.appendChild(rowTgl);
          }
          mount.appendChild(wrap);
        });
      }

      function syncActPager() {
        var pg = document.getElementById("dg-act-pager");
        var hint = document.getElementById("dg-act-page-hint");
        if (!pg || !hint) return;
        if (actTotal <= actLimit) {
          pg.style.display = "none";
          return;
        }
        pg.style.display = "flex";
        var from = actOffset + 1;
        var to = Math.min(actOffset + actLimit, actTotal);
        hint.textContent = from + "–" + to + " из " + actTotal;
        document.getElementById("dg-act-prev").disabled = actOffset <= 0;
        document.getElementById("dg-act-next").disabled = actOffset + actLimit >= actTotal;
      }

      function resetActivityJournalFilters() {
        var kind = document.getElementById("dg-act-kind");
        var uid = document.getElementById("dg-act-user");
        var s = document.getElementById("dg-act-section");
        var f = document.getElementById("dg-act-from");
        var t = document.getElementById("dg-act-to");
        if (kind) kind.value = "";
        if (uid) uid.value = "";
        if (s) s.value = "";
        if (f) f.value = "";
        if (t) t.value = "";
        actOffset = 0;
      }

      function loadActivityJournal() {
        var deny = document.getElementById("dg-act-deny");
        var hero = document.getElementById("dg-activity-hero");
        if (!deny || !hero) return;
        var uid = String(document.getElementById("dg-act-user").value || "").trim();
        var kind = String(document.getElementById("dg-act-kind").value || "").trim();
        var sectionEl = document.getElementById("dg-act-section");
        var fromEl = document.getElementById("dg-act-from");
        var toEl = document.getElementById("dg-act-to");
        var section = sectionEl ? String(sectionEl.value || "").trim() : "";
        var fromTs = fromEl ? String(fromEl.value || "").trim() : "";
        var toTs = toEl ? String(toEl.value || "").trim() : "";
        var qs = new URLSearchParams({ limit: String(actLimit), offset: String(actOffset) });
        if (uid) qs.set("user_id", uid);
        if (kind) qs.set("kind", kind);
        if (section) qs.set("section", section);
        if (fromTs) qs.set("from_ts", fromTs);
        if (toTs) qs.set("to_ts", toTs);
        fetch("/api/activity/events?" + qs.toString(), { credentials: "same-origin", headers: authHeaders() })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (x.r.status === 403) {
              deny.style.display = "";
              var listEl = document.getElementById("dg-act-list");
              if (listEl) listEl.replaceChildren();
              document.getElementById("dg-act-empty").style.display = "none";
              document.getElementById("dg-act-pager").style.display = "none";
              return;
            }
            if (!x.r.ok) throw new Error((x.j && x.j.error) || "Журнал недоступен");
            deny.style.display = "none";
            actTotal = Number(x.j.total || 0);
            var hintRet = document.getElementById("dg-act-retention-hint");
            if (hintRet) {
              var rd = Number(x.j.retentionDays);
              if (!Number.isFinite(rd) || rd < 1) rd = 120;
              hintRet.textContent =
                "Хранение: события не старше " +
                rd +
                " дней (автоочистка при открытии журнала). Более старые записи удаляются.";
            }
            fillActUserSelect(x.j.users || []);
            fillActPageOptions(x.j.pageOptions || []);
            renderActivityRows(x.j.rows || []);
            syncActPager();
          })
          .catch(function () {
            deny.style.display = "none";
          });
      }

      function getSelectedSiteId() {
        return String(document.getElementById("dg-proc-site").value || "");
      }

      function showErr(msg) {
        var el = document.getElementById("dg-proc-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function setBootLoad(vis) {
        var el = document.getElementById("dg-proc-boot-load");
        if (el) el.style.display = vis ? "" : "none";
      }

      function logNeedle() {
        return String(document.getElementById("dg-proc-smart-search").value || "")
          .trim()
          .toLowerCase();
      }

      function collectProcessesFilterForm() {
        return {
          smart: document.getElementById("dg-proc-smart-search").value,
          site_id: getSelectedSiteId(),
        };
      }

      function persistProcessesFilterForm() {
        try {
          if (window.DatagonFilters) window.DatagonFilters.save("processes", collectProcessesFilterForm());
        } catch (e) {}
      }

      function mergeProcessesPrefsFromStorage() {
        var DF = window.DatagonFilters;
        if (!DF || !DF.load) return;
        var prefs = DF.load("processes");
        if (!prefs) return;
        if (prefs.smart != null) document.getElementById("dg-proc-smart-search").value = String(prefs.smart);
        var sel = document.getElementById("dg-proc-site");
        if (prefs.site_id != null && [].some.call(sel.options, function (o) {
          return o.value === String(prefs.site_id);
        }))
          sel.value = String(prefs.site_id);
      }

      function renderFromOverview() {
        if (!overview) return;
        var needle = logNeedle();
        var globalSync = overview.globalSync || {};
        document.getElementById("dg-proc-gs-status").textContent = globalSync.active ? "В процессе" : "Не активен";
        document.getElementById("dg-proc-gs-msg").textContent = globalSync.message || "-";
        document.getElementById("dg-proc-gs-prog").textContent =
          fmtNum(globalSync.processed) + "/" + fmtNum(globalSync.total);

        var moysklad = overview.moysklad || {};
        var msStatus = moysklad.active ? "В процессе" : moysklad.done ? "Завершен" : "Ожидание";
        document.getElementById("dg-proc-ms-status").textContent = msStatus;
        document.getElementById("dg-proc-ms-msg").textContent = moysklad.message || "-";
        document.getElementById("dg-proc-ms-prog").textContent =
          fmtNum(moysklad.processed) + "/" + fmtNum(moysklad.total);
        var msLogs = document.getElementById("dg-proc-ms-logs");
        msLogs.replaceChildren();
        (Array.isArray(moysklad.logs) ? moysklad.logs : [])
          .filter(function (line) {
            return !needle || String(line || "").toLowerCase().indexOf(needle) !== -1;
          })
          .slice(0, 20)
          .forEach(function (line) {
            var d = document.createElement("div");
            d.textContent = "• " + line;
            msLogs.appendChild(d);
          });

        var autoSync = overview.autoSync || {};
        var cfg = autoSync.config || {};
        document.getElementById("dg-proc-as-now").textContent =
          (autoSync.now_moscow_date || "-") + " " + (autoSync.now_moscow_time || "-");
        document.getElementById("dg-proc-as-my").textContent =
          (cfg.myproducts_enabled ? "включено" : "выключено") + " (" + (cfg.myproducts_time || "-") + ")";
        document.getElementById("dg-proc-as-msk").textContent =
          (cfg.moysklad_enabled ? "включено" : "выключено") + " (" + (cfg.moysklad_time || "-") + ")";
        document.getElementById("dg-proc-as-runner").textContent = autoSync.runner_active
          ? "выполняется"
          : "ожидание";
        var q = Array.isArray(autoSync.queue) ? autoSync.queue : [];
        document.getElementById("dg-proc-as-queue").textContent = q.length ? q.join(" → ") : "пусто";

        var runsEl = document.getElementById("dg-proc-as-runs");
        runsEl.replaceChildren();
        var autoSyncRuns = Array.isArray(overview.autoSyncRuns) ? overview.autoSyncRuns : [];
        var filteredRuns = autoSyncRuns.filter(function (r) {
          if (!needle) return true;
          var hay = (String(r.task_type || "") + " " + String(r.status || "") + " " + String(r.message || "")).toLowerCase();
          return hay.indexOf(needle) !== -1;
        });
        if (filteredRuns.length) {
          filteredRuns.forEach(function (r) {
            var d = document.createElement("div");
            d.textContent =
              "• " +
              (r.task_type || "-") +
              " — " +
              (r.status || "-") +
              " | старт: " +
              fmtDateTime(r.started_at) +
              " | финиш: " +
              fmtDateTime(r.finished_at) +
              (r.message ? " | " + r.message : "");
            runsEl.appendChild(d);
          });
        } else {
          var empty = document.createElement("div");
          empty.textContent = "История автозапусков пока пуста";
          runsEl.appendChild(empty);
        }

        var discEl = document.getElementById("dg-proc-discovery");
        discEl.replaceChildren();
        var discovery = Array.isArray(overview.discovery) ? overview.discovery : [];
        var filteredDisc = discovery.filter(function (r) {
          if (!needle) return true;
          var hay = (String(r.project_id || "") + " " + String(r.message || "")).toLowerCase();
          return hay.indexOf(needle) !== -1;
        });
        if (filteredDisc.length) {
          filteredDisc.forEach(function (r) {
            var d = document.createElement("div");
            d.appendChild(document.createTextNode("• "));
            var b = document.createElement("b");
            b.textContent = "Проект #" + r.project_id;
            d.appendChild(b);
            d.appendChild(
              document.createTextNode(
                " — " +
                  (r.active ? "выполняется" : "завершен") +
                  (r.cancel_requested ? " (остановка запрошена)" : "") +
                  " | старт: " +
                  fmtDateTime(r.started_at) +
                  " | финиш: " +
                  fmtDateTime(r.finished_at) +
                  " | найдено: " +
                  fmtNum(r.discovered) +
                  " | новых: " +
                  fmtNum(r.added) +
                  " | " +
                  (r.message || "-")
              )
            );
            discEl.appendChild(d);
          });
        } else {
          var d0 = document.createElement("div");
          d0.textContent = "Запусков автообхода пока не было";
          discEl.appendChild(d0);
        }

        var queue = overview.queue || {};
        document.getElementById("dg-proc-q-total").textContent = fmtNum(queue.total);
        document.getElementById("dg-proc-q-pending").textContent = fmtNum(queue.pending);
        document.getElementById("dg-proc-q-processing").textContent = fmtNum(queue.processing);
        document.getElementById("dg-proc-q-done").textContent = fmtNum(queue.done);
        document.getElementById("dg-proc-q-error").textContent = fmtNum(queue.error);

        var matches = overview.matches || {};
        var mStat = matches.active ? "В процессе" : matches.status || "Ожидание";
        document.getElementById("dg-proc-m-status").textContent = mStat;
        document.getElementById("dg-proc-m-msg").textContent = matches.message || "-";
        document.getElementById("dg-proc-m-prog").textContent =
          fmtNum(matches.processed) + "/" + fmtNum(matches.total);
        document.getElementById("dg-proc-m-found").textContent = fmtNum(matches.found);
        document.getElementById("dg-proc-m-sku").textContent = fmtNum(matches.foundSku);
        document.getElementById("dg-proc-m-name").textContent = fmtNum(matches.foundName);
        var mPh = document.getElementById("dg-proc-m-phases");
        if (mPh) {
          mPh.replaceChildren();
          var phases = Array.isArray(matches.phases) ? matches.phases : [];
          var nlow = needle.toLowerCase();
          var filteredPh = phases.filter(function (ph) {
            if (!needle) return true;
            var hay = (
              String(ph.title || "") +
              " " +
              String(ph.key || "") +
              " " +
              summarizeMatchPhaseResult(ph.result)
            ).toLowerCase();
            return hay.indexOf(nlow) !== -1;
          });
          if (!filteredPh.length) {
            var em = document.createElement("div");
            em.className = "text-muted fst-italic";
            em.textContent = phases.length
              ? "Нет этапов по текущему фильтру — измените умный поиск."
              : "Этапы появятся после нового запуска сопоставления (в старых задачах phases_json не было).";
            mPh.appendChild(em);
          } else {
            filteredPh.forEach(function (ph) {
              var row = document.createElement("div");
              row.className = "mb-2 pb-2 border-bottom border-light";
              var t0 = document.createElement("div");
              t0.appendChild(document.createTextNode("▸ "));
              var tb = document.createElement("b");
              tb.textContent = ph.title || ph.key || "этап";
              t0.appendChild(tb);
              row.appendChild(t0);
              var meta = document.createElement("div");
              meta.className = "ms-3 text-muted";
              var st = fmtDateTime(ph.startedAt);
              var en = ph.endedAt ? fmtDateTime(ph.endedAt) : "… ещё выполняется";
              var dur =
                ph.durationMs != null
                  ? fmtDurationMs(ph.durationMs)
                  : ph.endedAt
                    ? "—"
                    : "—";
              meta.textContent =
                "Старт: " + st + " · Финиш: " + en + " · Длительность: " + dur;
              row.appendChild(meta);
              var rs = summarizeMatchPhaseResult(ph.result);
              if (rs) {
                var rr = document.createElement("div");
                rr.className = "ms-3 mt-1";
                rr.textContent = "Итог: " + rs;
                row.appendChild(rr);
              }
              mPh.appendChild(row);
            });
          }
        }
        var mLogs = document.getElementById("dg-proc-m-logs");
        mLogs.replaceChildren();
        (Array.isArray(matches.logs) ? matches.logs : [])
          .filter(function (line) {
            return !needle || String(line || "").toLowerCase().indexOf(needle) !== -1;
          })
          .slice(0, 8)
          .forEach(function (line) {
            var d = document.createElement("div");
            d.textContent = "• " + line;
            mLogs.appendChild(d);
          });
      }

      function fillSiteSelect(matchesSites) {
        var sel = document.getElementById("dg-proc-site");
        var prev = sel.value;
        sel.innerHTML = "";
        if (!matchesSites.length) {
          var o = document.createElement("option");
          o.value = "";
          o.textContent = "Нет сайтов";
          sel.appendChild(o);
          return;
        }
        matchesSites.forEach(function (s) {
          var opt = document.createElement("option");
          opt.value = String(s.id);
          opt.textContent = s.name || "Сайт #" + s.id;
          sel.appendChild(opt);
        });
        if (prev && [].some.call(sel.options, function (x) { return x.value === prev; })) sel.value = prev;
      }

      function applySiteFromResponse(json) {
        var matchesSites = Array.isArray(json.matchesSites) ? json.matchesSites : [];
        fillSiteSelect(matchesSites);
        var sel = document.getElementById("dg-proc-site");
        var responseSiteId = json.matches && json.matches.mySiteId ? String(json.matches.mySiteId) : "";
        var selectedBefore = getSelectedSiteId();
        if (responseSiteId) sel.value = responseSiteId;
        else if (!selectedBefore && matchesSites.length) sel.value = String(matchesSites[0].id);
      }

      function loadOverview(preferredSiteId) {
        var selected =
          preferredSiteId !== undefined && preferredSiteId !== null
            ? String(preferredSiteId)
            : getSelectedSiteId();
        loading = true;
        if (!overview) setBootLoad(true);
        var qs = selected ? "?my_site_id=" + encodeURIComponent(selected) : "";
        fetch("/api/processes/overview" + qs, { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Не удалось загрузить сводку процессов");
            overview = x.j;
            applySiteFromResponse(x.j);
            if (!processesPrefsMerged) {
              mergeProcessesPrefsFromStorage();
              processesPrefsMerged = true;
            }
            renderFromOverview();
            showErr("");
          })
          .catch(function (e) {
            showErr(e.message || "Ошибка загрузки процессов");
          })
          .then(function () {
            loading = false;
            setBootLoad(false);
          });
      }

      function stopMsSync() {
        fetch("/api/ms/stop", { method: "POST", credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось остановить синхронизацию");
            alert("Синхронизация МойСклад остановлена");
            loadOverview();
          })
          .catch(function (e) {
            alert(e.message || "Ошибка остановки");
          });
      }

      document.getElementById("dg-proc-refresh-head").addEventListener("click", function () {
        persistProcessesFilterForm();
        loadOverview();
        loadActivityJournal();
      });
      document.getElementById("dg-proc-refresh-inline").addEventListener("click", function () {
        persistProcessesFilterForm();
        loadOverview();
        loadActivityJournal();
      });
      document.getElementById("dg-proc-site").addEventListener("change", function () {
        loadOverview(this.value);
      });
      document.getElementById("dg-proc-apply").addEventListener("click", function () {
        persistProcessesFilterForm();
        if (overview) renderFromOverview();
      });
      document.getElementById("dg-proc-default").addEventListener("click", function () {
        if (window.DatagonProcessesFilterBlocks && window.DatagonProcessesFilterBlocks.reset) window.DatagonProcessesFilterBlocks.reset();
        if (window.DatagonFilters) window.DatagonFilters.clear("processes");
        document.getElementById("dg-proc-smart-search").value = "";
        if (overview) renderFromOverview();
      });
      document.getElementById("dg-proc-ms-stop").addEventListener("click", stopMsSync);

      (function processesFilterFieldVisibility() {
        var FIELD_GROUPS = [
          {
            title: "Фильтры",
            subtitle: "",
            items: [
              { key: "smart", title: "Умный поиск", hint: "" },
              { key: "site", title: "Мой сайт", hint: "" },
              { key: "refresh_inline", title: "Кнопка «Обновить сейчас»", hint: "" },
            ],
          },
          {
            title: "Действия",
            subtitle: "",
            items: [{ key: "filter_actions", title: "«Применить» и «По умолчанию»", hint: "" }],
          },
        ];
        if (window.DatagonFilterFieldsVisibility && window.DatagonFilterFieldsVisibility.init) {
          window.DatagonFilterFieldsVisibility.init({
            storageKeyPrefix: "datagon_processes_filter_fields_v2",
            attr: "data-dg-proc-filter-field",
            fieldGroups: FIELD_GROUPS,
            togglesRootId: "dg-proc-filter-blocks-toggles",
            idPrefix: "dg-proc-ff-",
            exposeAs: "DatagonProcessesFilterBlocks",
            onAfterApply: function () {},
          });
        }
      })();

      (function collapse() {
        var body = document.getElementById("dg-proc-filters-body");
        var btn = document.getElementById("dg-proc-filters-toggle");
        function applyStorage() {
          try {
            if (localStorage.getItem(FILTERS_KEY) === "1") {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(FILTERS_KEY) === "1") body.style.display = "none";
        } catch (e) {}
        applyStorage();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(FILTERS_KEY, hidden ? "0" : "1");
          } catch (e) {}
        });
      })();

      function startPoll() {
        stopPoll();
        pollTimer = setInterval(function () {
          loadOverview();
        }, 3000);
      }
      function stopPoll() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      (function initActivityJournalHeroCollapse() {
        var btn = document.getElementById("dg-act-hero-toggle");
        var body = document.getElementById("dg-act-hero-body");
        if (!btn || !body) return;
        function apply(collapsed) {
          body.style.display = collapsed ? "none" : "";
          btn.textContent = collapsed ? "Развернуть журнал" : "Свернуть журнал";
          btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
          try {
            localStorage.setItem(ACT_JOURNAL_COLLAPSE_KEY, collapsed ? "1" : "0");
          } catch (e) {}
        }
        try {
          apply(localStorage.getItem(ACT_JOURNAL_COLLAPSE_KEY) === "1");
        } catch (e2) {
          apply(false);
        }
        btn.addEventListener("click", function () {
          apply(body.style.display !== "none");
        });
      })();

      document.getElementById("dg-act-refresh").addEventListener("click", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-user").addEventListener("change", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-kind").addEventListener("change", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-section").addEventListener("change", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-from").addEventListener("change", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-to").addEventListener("change", function () {
        actOffset = 0;
        loadActivityJournal();
      });
      document.getElementById("dg-act-reset-filters").addEventListener("click", function () {
        resetActivityJournalFilters();
        loadActivityJournal();
      });
      window.addEventListener("pageshow", function (e) {
        if (e && e.persisted) {
          resetActivityJournalFilters();
          loadActivityJournal();
        }
      });
      document.getElementById("dg-act-prev").addEventListener("click", function () {
        actOffset = Math.max(0, actOffset - actLimit);
        loadActivityJournal();
      });
      document.getElementById("dg-act-next").addEventListener("click", function () {
        if (actOffset + actLimit < actTotal) actOffset += actLimit;
        loadActivityJournal();
      });

      loadOverview();
      resetActivityJournalFilters();
      loadActivityJournal();
      startPoll();
      window.addEventListener("beforeunload", stopPoll);
    })();
  </script>
