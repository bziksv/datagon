  <script>
    (function () {
      var FILTERS_KEY = "datagon_results_filters_collapsed_v1";
      var projects = [];
      var rows = [];
      var total = 0;
      var page = 1;
      var limit = 100;
      var sortBy = "parsed_at";
      var sortDir = "desc";
      var SORT_STORAGE_VERSION = 1;
      var loading = false;
      var urlDebounce = null;
      var searchReloadTimer = null;
      var resultsFetchAbortController = null;
      var DEFAULT_VISIBLE_COLS = [true, true, true, true, true, true, true, true, true, true];
      var visibleCols = DEFAULT_VISIBLE_COLS.slice();
      var columnWidths = {};
      var resizeState = null;
      var FLOATING_HEADER_OFFSET_PX = 2;
      var FLOATING_HEADER_START_EPS_PX = 3;
      var resultsFloatingHeaderRaf = 0;
      var resultsFloatingLastScrollTs = 0;
      var loadResultsGeneration = 0;

      function storageScope() {
        var userId = window.__DG_USER_ID__ || window.__USER_ID__ || "anon";
        return String(userId);
      }
      function userSortKey() {
        return "dg_results_sort_v" + SORT_STORAGE_VERSION + "_" + storageScope();
      }
      function userVisibleColsKey() {
        return "dg_results_visible_cols_v3_" + storageScope();
      }
      function userColWidthKey() {
        return "dg_results_col_widths_v4_" + storageScope();
      }

      function fmtDate(v) {
        if (!v) return "-";
        var d = new Date(v);
        if (isNaN(d.getTime())) return "-";
        return d.toLocaleString("ru-RU");
      }

      function readApiFilters() {
        return {
          project_id: document.getElementById("dg-res-f-project").value,
          page_status: document.getElementById("dg-res-f-page_status").value,
          matched: document.getElementById("dg-res-f-matched").value,
          availability: document.getElementById("dg-res-f-availability").value,
          search: document.getElementById("dg-res-f-search").value.trim(),
          project_name: document.getElementById("dg-res-f-project_name").value.trim(),
          price_min: document.getElementById("dg-res-f-price_min").value,
          price_max: document.getElementById("dg-res-f-price_max").value,
        };
      }

      function collectResultsFilterForm() {
        return {
          search: document.getElementById("dg-res-f-search").value,
          project_id: document.getElementById("dg-res-f-project").value,
          page_status: document.getElementById("dg-res-f-page_status").value,
          matched: document.getElementById("dg-res-f-matched").value,
          availability: document.getElementById("dg-res-f-availability").value,
          project_name: document.getElementById("dg-res-f-project_name").value,
          price_min: document.getElementById("dg-res-f-price_min").value,
          price_max: document.getElementById("dg-res-f-price_max").value,
          limit: String(limit),
          page: String(page),
          sort_by: sortBy,
          sort_dir: sortDir,
        };
      }

      function persistResultsFilterForm() {
        try {
          if (window.DatagonFilters) window.DatagonFilters.save("results", collectResultsFilterForm());
        } catch (e) {}
      }

      function mergeResultsPrefsFromStorage() {
        var DF = window.DatagonFilters;
        if (!DF || !DF.load) return;
        var prefs = DF.load("results");
        if (!prefs) return;
        var p;
        try {
          p = new URLSearchParams(window.location.search);
        } catch (e2) {
          p = new URLSearchParams();
        }
        function missing(k) {
          return !p.has(k);
        }
        if (missing("search") && prefs.search != null)
          document.getElementById("dg-res-f-search").value = String(prefs.search);
        if (missing("project_id") && prefs.project_id != null) {
          var sel = document.getElementById("dg-res-f-project");
          var want = String(prefs.project_id);
          if ([].some.call(sel.options, function (o) {
            return o.value === want;
          }))
            sel.value = want;
          else if (want === "all") sel.value = "all";
        }
        if (missing("page_status") && prefs.page_status != null)
          document.getElementById("dg-res-f-page_status").value = String(prefs.page_status);
        if (missing("matched") && prefs.matched != null)
          document.getElementById("dg-res-f-matched").value = String(prefs.matched);
        if (missing("availability") && prefs.availability != null)
          document.getElementById("dg-res-f-availability").value = String(prefs.availability);
        if (missing("project_name") && prefs.project_name != null)
          document.getElementById("dg-res-f-project_name").value = String(prefs.project_name);
        if (missing("price_min") && prefs.price_min != null)
          document.getElementById("dg-res-f-price_min").value = String(prefs.price_min);
        if (missing("price_max") && prefs.price_max != null)
          document.getElementById("dg-res-f-price_max").value = String(prefs.price_max);
        if (missing("limit") && prefs.limit != null) {
          var l = Number(prefs.limit);
          if ([50, 100, 500, 1000].includes(l)) {
            limit = l;
            document.getElementById("dg-res-limit").value = String(l);
          }
        }
        if (missing("page") && prefs.page != null) {
          var pg = Number(prefs.page);
          if (Number.isFinite(pg) && pg > 0) page = pg;
        }
        if (missing("sort_by") && prefs.sort_by) sortBy = String(prefs.sort_by);
        if (missing("sort_dir") && (prefs.sort_dir === "asc" || prefs.sort_dir === "desc")) sortDir = prefs.sort_dir;
      }

      function buildUrl() {
        var f = readApiFilters();
        var s = new URLSearchParams({
          limit: String(limit),
          offset: String((page - 1) * limit),
          sort_by: sortBy,
          sort_dir: sortDir,
        });
        Object.keys(f).forEach(function (k) {
          var v = f[k];
          if (v === undefined || v === null || v === "" || v === "all") return;
          if ((k === "price_min" || k === "price_max") && String(v).trim() === "") return;
          s.set(k, String(v));
        });
        return "/api/results?" + s.toString();
      }

      function syncUrl() {
        var f = readApiFilters();
        var params = new URLSearchParams();
        Object.keys(f).forEach(function (k) {
          var v = f[k];
          if (v === undefined || v === null || v === "" || v === "all") return;
          if ((k === "price_min" || k === "price_max") && String(v).trim() === "") return;
          params.set(k, String(v));
        });
        if (page > 1) params.set("page", String(page));
        if (limit !== 100) params.set("limit", String(limit));
        if (sortBy !== "parsed_at") params.set("sort_by", sortBy);
        if (sortDir !== "desc") params.set("sort_dir", sortDir);
        var next = params.toString()
          ? window.location.pathname + "?" + params.toString()
          : window.location.pathname;
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      function scheduleSyncUrl() {
        if (urlDebounce) clearTimeout(urlDebounce);
        urlDebounce = setTimeout(function () {
          urlDebounce = null;
          syncUrl();
        }, 200);
      }

      function parseUrlToForm() {
        var params = new URLSearchParams(window.location.search);
        ["project_id", "page_status", "matched", "availability", "search", "project_name", "price_min", "price_max"].forEach(function (k) {
          var v = params.get(k);
          if (v === null || v === "") return;
          if (k === "search") document.getElementById("dg-res-f-search").value = v;
          if (k === "project_id") document.getElementById("dg-res-f-project").value = v;
          if (k === "page_status") document.getElementById("dg-res-f-page_status").value = v;
          if (k === "matched") document.getElementById("dg-res-f-matched").value = v;
          if (k === "availability") document.getElementById("dg-res-f-availability").value = v;
          if (k === "project_name") document.getElementById("dg-res-f-project_name").value = v;
          if (k === "price_min") document.getElementById("dg-res-f-price_min").value = v;
          if (k === "price_max") document.getElementById("dg-res-f-price_max").value = v;
        });
        var p = Number(params.get("page") || 1);
        var l = Number(params.get("limit") || 100);
        if (Number.isFinite(p) && p > 0) page = p;
        if ([50, 100, 500, 1000].includes(l)) {
          limit = l;
          document.getElementById("dg-res-limit").value = String(l);
        }
        var sb = params.get("sort_by");
        var sd = params.get("sort_dir");
        if (sb) sortBy = sb;
        if (sd === "asc" || sd === "desc") sortDir = sd;
        if (!sb || !sd) {
          try {
            var raw = localStorage.getItem(userSortKey());
            var ls = raw ? JSON.parse(raw) : null;
            if (ls && ls.sortBy) sortBy = ls.sortBy;
            if (ls && (ls.sortDir === "asc" || ls.sortDir === "desc")) sortDir = ls.sortDir;
          } catch (e) {}
        }
      }

      function updateSortHeaders() {
        document.querySelectorAll("#dg-res-thead th").forEach(function (th) {
          var field = th.getAttribute("data-res-sort");
          var base = th.getAttribute("data-res-col-label");
          if (!base) {
            var sp0 = th.querySelector(".dg-res-th-text");
            base = String((sp0 && sp0.textContent) || "")
              .replace(/\s*[↑↓]\s*$/g, "")
              .trim();
            if (base) th.setAttribute("data-res-col-label", base);
          }
          var span = th.querySelector(".dg-res-th-text");
          if (!span) {
            span = document.createElement("span");
            span.className = "dg-res-th-text";
            var handleEx = th.querySelector(".dg-res-resize-handle");
            if (handleEx) th.insertBefore(span, handleEx);
            else th.appendChild(span);
          }
          var suffix = field && field === sortBy ? (sortDir === "asc" ? " ↑" : " ↓") : "";
          span.textContent = (base || "") + suffix;
        });
      }

      function fillProjects(list) {
        var sel = document.getElementById("dg-res-f-project");
        var prev = sel.value;
        sel.innerHTML = '<option value="all">Все проекты</option>';
        (list || []).forEach(function (p) {
          var o = document.createElement("option");
          o.value = String(p.id);
          o.textContent = p.name || "#" + p.id;
          sel.appendChild(o);
        });
        if ([].some.call(sel.options, function (o) { return o.value === prev; })) sel.value = prev;
        mergeResultsPrefsFromStorage();
      }

      function pagesCount() {
        return Math.max(1, Math.ceil(total / limit));
      }

      function updateHints(opt) {
        opt = opt || {};
        var suffix = opt.refreshSuffix || "";
        var fh = document.getElementById("dg-res-filters-hint");
        var th = document.getElementById("dg-res-table-hint");
        if (fh) fh.textContent = "Всего записей: " + Number(total || 0).toLocaleString("ru-RU");
        if (th) th.textContent = "Страница " + page + "/" + pagesCount() + suffix;
        var prev = document.getElementById("dg-res-prev");
        var next = document.getElementById("dg-res-next");
        if (prev) prev.disabled = page <= 1;
        if (next) next.disabled = page >= pagesCount();
      }

      function showErr(msg) {
        var el = document.getElementById("dg-res-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function captureResultsTheadBaseTop() {
        var thead = document.getElementById("dg-res-thead");
        if (!thead) return;
        thead.style.transform = "";
        thead.style.position = "";
        thead.style.zIndex = "";
        thead.style.willChange = "";
        thead.removeAttribute("data-dg-floating");
        var rect = thead.getBoundingClientRect();
        var absTop = (window.scrollY || window.pageYOffset || 0) + (rect && rect.top ? rect.top : 0);
        thead.setAttribute("data-dg-base-top", String(absTop));
      }

      function getResultsStickyTopPx() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        if (!fixed) return 0;
        if (!header || !header.getBoundingClientRect) return 60;
        var rect = header.getBoundingClientRect();
        var h = rect && rect.height ? rect.height : 60;
        return h > 0 ? h : 60;
      }

      function updateResultsStickyTopVar() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        var top = 0;
        if (fixed && header && header.getBoundingClientRect) {
          var rect = header.getBoundingClientRect();
          top = rect && rect.height ? rect.height : 60;
        }
        document.documentElement.style.setProperty("--dg-table-sticky-top", top + "px");
      }

      function updateResultsFloatingHeaderFallback() {
        var thead = document.getElementById("dg-res-thead");
        if (!thead) return;
        var table = thead.closest("table");
        if (!table || !table.getBoundingClientRect) return;
        var row = thead.querySelector("tr");
        if (!row) return;

        var y = window.scrollY || window.pageYOffset || 0;
        var headerTop = getResultsStickyTopPx();

        var baseTopAbs = Number(thead.getAttribute("data-dg-base-top") || 0);
        if (!Number.isFinite(baseTopAbs) || baseTopAbs <= 0) return;
        var tableRect = table.getBoundingClientRect();
        var tableBottom = tableRect.bottom + y;
        var rowRect = row.getBoundingClientRect();
        var rowHeight = rowRect && rowRect.height ? rowRect.height : 0;

        var headerLine = y + headerTop;
        var start = baseTopAbs + FLOATING_HEADER_START_EPS_PX;
        var end = tableBottom - rowHeight;
        if (headerLine <= start || headerLine >= end) {
          if (thead.style.transform) {
            thead.style.transform = "";
            thead.style.position = "";
            thead.style.zIndex = "";
            thead.style.willChange = "";
            thead.removeAttribute("data-dg-floating");
          }
          return;
        }

        var zoomAwareOffset = FLOATING_HEADER_OFFSET_PX;
        var dpr = window.devicePixelRatio || 1;
        if (Math.abs(dpr - 1) < 0.03) zoomAwareOffset = FLOATING_HEADER_OFFSET_PX - 3;
        var shift = Math.max(0, headerLine - start - zoomAwareOffset);
        var shiftPx = Number(shift.toFixed(3));
        var nextTransform = "translate3d(0," + shiftPx + "px,0)";
        if (thead.style.transform !== nextTransform) {
          thead.style.transform = nextTransform;
          thead.style.position = "relative";
          thead.style.zIndex = "25";
          thead.style.willChange = "transform";
          thead.setAttribute("data-dg-floating", "1");
        }
      }

      function resultsFloatingHeaderTick(ts) {
        resultsFloatingHeaderRaf = 0;
        updateResultsFloatingHeaderFallback();
        if (ts - resultsFloatingLastScrollTs < 140) {
          resultsFloatingHeaderRaf = requestAnimationFrame(resultsFloatingHeaderTick);
        }
      }

      function scheduleResultsFloatingHeaderUpdate() {
        resultsFloatingLastScrollTs = performance.now();
        if (resultsFloatingHeaderRaf) return;
        resultsFloatingHeaderRaf = requestAnimationFrame(resultsFloatingHeaderTick);
      }

      function onScrollResultsFloatingHeader() {
        scheduleResultsFloatingHeaderUpdate();
      }

      function resRefreshFloatingAfterLayout() {
        requestAnimationFrame(function () {
          captureResultsTheadBaseTop();
          scheduleResultsFloatingHeaderUpdate();
        });
      }

      function renderTable() {
        var tbody = document.getElementById("dg-res-tbody");
        tbody.replaceChildren();
        updateHints();
        if (loading) {
          var trL = document.createElement("tr");
          var tdL = document.createElement("td");
          tdL.colSpan = 10;
          tdL.className = "text-muted";
          tdL.textContent = "Загрузка...";
          trL.appendChild(tdL);
          tbody.appendChild(trL);
          applyStoredColumnWidths();
          initColumnResizeHandles();
          resRefreshFloatingAfterLayout();
          return;
        }
        var filtered = rows || [];
        if (!filtered.length) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.colSpan = 10;
          td.className = "text-muted";
          td.textContent = "Нет результатов";
          tr.appendChild(td);
          tbody.appendChild(tr);
          applyStoredColumnWidths();
          initColumnResizeHandles();
          resRefreshFloatingAfterLayout();
          return;
        }
        filtered.forEach(function (r) {
          var matched = Number(r.is_matched || 0) === 1;
          var pageStatus = String(r.page_status || "").toLowerCase();
          var tr = document.createElement("tr");
          if (matched) tr.className = "table-success";
          var tdDate = document.createElement("td");
          var d1 = document.createElement("div");
          d1.innerHTML = "<b>Результат:</b> " + fmtDate(r.parsed_at);
          var d2 = document.createElement("div");
          d2.className = "small text-muted";
          d2.innerHTML = "<b>Парсинг:</b> " + fmtDate(r.page_parsed_at);
          tdDate.appendChild(d1);
          tdDate.appendChild(d2);
          var tdProj = document.createElement("td");
          tdProj.textContent = r.project_name || "-";
          var tdProd = document.createElement("td");
          var b = document.createElement("b");
          b.textContent = r.product_name || "-";
          tdProd.appendChild(b);
          var tdSku = document.createElement("td");
          tdSku.textContent = r.sku || "-";
          var tdMat = document.createElement("td");
          if (matched) {
            var badge = document.createElement("span");
            badge.className = "badge bg-success";
            badge.textContent = "Сопоставлено";
            tdMat.appendChild(badge);
          } else tdMat.textContent = "-";
          var tdParse = document.createElement("td");
          if (pageStatus === "pending") {
            var w = document.createElement("span");
            w.className = "badge bg-warning";
            w.textContent = "Ожидает";
            tdParse.appendChild(w);
          } else if (pageStatus === "processing") {
            var inf = document.createElement("span");
            inf.className = "badge bg-info";
            inf.textContent = "В обработке";
            tdParse.appendChild(inf);
          } else if (pageStatus === "done") {
            var ok = document.createElement("span");
            ok.className = "badge bg-success";
            ok.textContent = "Готово";
            tdParse.appendChild(ok);
          } else if (pageStatus === "error") {
            var er = document.createElement("span");
            er.className = "badge bg-danger";
            er.textContent = "Ошибка";
            tdParse.appendChild(er);
          } else if (!pageStatus) {
            var nx = document.createElement("span");
            nx.className = "text-muted";
            nx.textContent = "нет в очереди";
            tdParse.appendChild(nx);
          }
          var tdOos = document.createElement("td");
          if (r.is_oos) {
            var oos = document.createElement("span");
            oos.className = "badge bg-danger";
            oos.textContent = "Под заказ";
            tdOos.appendChild(oos);
          } else {
            var st = document.createElement("span");
            st.className = "badge bg-success";
            st.textContent = "В наличии";
            tdOos.appendChild(st);
          }
          var tdPrice = document.createElement("td");
          if (r.is_oos) tdPrice.textContent = "-";
          else
            tdPrice.textContent =
              Number(r.price || 0).toLocaleString("ru-RU", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) +
              " " +
              (r.currency || "RUB");
          var tdUrl = document.createElement("td");
          var a = document.createElement("a");
          a.href = r.page_url || r.url || "#";
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "Открыть";
          tdUrl.appendChild(a);
          var tdAct = document.createElement("td");
          tdAct.className = "text-nowrap";
          var btnRe = document.createElement("button");
          btnRe.type = "button";
          btnRe.className = "btn btn-sm btn-outline-info me-1";
          btnRe.innerHTML = '<i class="pe-7s-refresh me-1"></i>↻';
          btnRe.addEventListener("click", function () {
            reparseOne(r);
          });
          var btnDel = document.createElement("button");
          btnDel.type = "button";
          btnDel.className = "btn btn-sm btn-outline-danger";
          btnDel.innerHTML = '<i class="pe-7s-trash me-1"></i>×';
          btnDel.addEventListener("click", function () {
            deleteOne(r.id);
          });
          tdAct.appendChild(btnRe);
          tdAct.appendChild(btnDel);
          tr.appendChild(tdDate);
          tr.appendChild(tdProj);
          tr.appendChild(tdProd);
          tr.appendChild(tdSku);
          tr.appendChild(tdMat);
          tr.appendChild(tdParse);
          tr.appendChild(tdOos);
          tr.appendChild(tdPrice);
          tr.appendChild(tdUrl);
          tr.appendChild(tdAct);
          tbody.appendChild(tr);
        });
        applyVisibleColumns();
        applyStoredColumnWidths();
        initColumnResizeHandles();
        resRefreshFloatingAfterLayout();
      }

      function loadResults(opts) {
        opts = opts || {};
        var showSkeleton = opts.showSkeleton !== false;
        var gen = ++loadResultsGeneration;
        if (searchReloadTimer) {
          clearTimeout(searchReloadTimer);
          searchReloadTimer = null;
        }
        if (resultsFetchAbortController) {
          resultsFetchAbortController.abort();
        }
        var tbodyRefresh = document.getElementById("dg-res-tbody");
        if (tbodyRefresh) tbodyRefresh.classList.remove("dg-res-tbody-refreshing");
        var controller = new AbortController();
        resultsFetchAbortController = controller;
        loading = true;
        showErr("");
        if (showSkeleton) {
          renderTable();
        } else {
          if (tbodyRefresh) tbodyRefresh.classList.add("dg-res-tbody-refreshing");
          updateHints({ refreshSuffix: " · обновление…" });
        }

        fetch(buildUrl(), { credentials: "same-origin", signal: controller.signal })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (gen !== loadResultsGeneration) return;
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки результатов");
            var data = x.j.data || x.j.rows || [];
            rows = Array.isArray(data) ? data : [];
            total = Number(x.j.total || 0);
            loading = false;
            if (tbodyRefresh) tbodyRefresh.classList.remove("dg-res-tbody-refreshing");
            renderTable();
            syncUrl();
            persistResultsFilterForm();
          })
          .catch(function (e) {
            if (e.name === "AbortError") return;
            if (gen !== loadResultsGeneration) return;
            loading = false;
            if (tbodyRefresh) tbodyRefresh.classList.remove("dg-res-tbody-refreshing");
            rows = [];
            total = 0;
            renderTable();
            showErr(e.message || "Не удалось загрузить результаты");
          })
          .finally(function () {
            if (resultsFetchAbortController === controller) {
              resultsFetchAbortController = null;
            }
          });
      }

      function loadBaseData() {
        return Promise.all([
          fetch("/api/projects", { credentials: "same-origin" }).then(function (r) {
            return r.json();
          }),
          fetch("/api/settings", { credentials: "same-origin" }).then(function (r) {
            return r.json();
          }),
        ])
          .then(function (arr) {
            if (Array.isArray(arr[0])) {
              projects = arr[0];
              fillProjects(projects);
            }
            var urlHadLimit = false;
            try {
              urlHadLimit = new URLSearchParams(window.location.search).has("limit");
            } catch (e2) {}
            var dl = Number((arr[1] && arr[1].default_limit) || 100);
            if (!urlHadLimit && [50, 100, 500, 1000].includes(dl)) {
              var prevLimit = limit;
              limit = dl;
              var limSel = document.getElementById("dg-res-limit");
              if (limSel) limSel.value = String(dl);
              if (prevLimit !== dl) {
                loadResults({ showSkeleton: false });
              }
            }
            return arr;
          })
          .catch(function () {});
      }

      function parseSmart() {
        var raw = String(document.getElementById("dg-res-f-search").value || "").trim();
        if (!raw) return;
        var tokens = raw.match(/"[^"]+"|\S+/g) || [];
        var free = [];
        var next = readApiFilters();
        tokens.forEach(function (t) {
          var idx = t.indexOf(":");
          if (idx <= 0) {
            free.push(t.replace(/^"(.*)"$/, "$1"));
            return;
          }
          var key = t.slice(0, idx).toLowerCase();
          var value = t.slice(idx + 1).replace(/^"(.*)"$/, "$1").trim();
          if (key === "project" || key === "project_id") next.project_id = value;
          else if (key === "status" || key === "page_status") next.page_status = value;
          else if (key === "code" || key === "sku" || key === "name") free.push(value);
          else free.push(value);
        });
        next.search = free.join(" ").trim();
        document.getElementById("dg-res-f-search").value = next.search;
        document.getElementById("dg-res-f-page_status").value = next.page_status || "";
        document.getElementById("dg-res-f-matched").value = next.matched || "all";
        document.getElementById("dg-res-f-availability").value = next.availability || "all";
        var sel = document.getElementById("dg-res-f-project");
        var want = String(next.project_id || "all");
        if (want !== "all" && [].some.call(sel.options, function (o) { return o.value === want; })) sel.value = want;
        else sel.value = "all";
        page = 1;
        persistResultsFilterForm();
        loadResults();
      }

      function onSort(field) {
        if (sortBy === field) sortDir = sortDir === "asc" ? "desc" : "asc";
        else {
          sortBy = field;
          sortDir = "asc";
          page = 1;
        }
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sortBy: sortBy, sortDir: sortDir }));
        } catch (e) {}
        updateSortHeaders();
        persistResultsFilterForm();
        loadResults({ showSkeleton: false });
      }

      function getHeaderCells() {
        var table = document.getElementById("dg-res-main-table");
        if (!table || !table.tHead || !table.tHead.rows[0]) return [];
        return Array.prototype.slice.call(table.tHead.rows[0].cells || []);
      }

      function clearAppliedColumnWidths() {
        var table = document.getElementById("dg-res-main-table");
        if (!table || !table.tHead || !table.tHead.rows[0]) return;
        var cg = table.querySelector("colgroup");
        if (cg) {
          for (var ci = 0; ci < cg.children.length; ci++) {
            cg.children[ci].style.width = "";
          }
        }
        getHeaderCells().forEach(function (th) {
          th.removeAttribute("data-dg-res-resize-ready");
          var rh = th.querySelector(".dg-res-resize-handle");
          if (rh) rh.remove();
        });
        var rowsList = [table.tHead.rows[0]].concat(
          Array.prototype.slice.call((table.tBodies[0] && table.tBodies[0].rows) || [])
        );
        rowsList.forEach(function (row) {
          for (var i = 0; i < row.cells.length; i++) {
            var c = row.cells[i];
            if (c.colSpan > 1) continue;
            c.style.width = "";
            c.style.minWidth = "";
            c.style.maxWidth = "";
            c.style.boxSizing = "";
          }
        });
      }

      function applyColumnWidthByIndex(idx, px) {
        var w = Math.max(80, Math.min(900, Math.round(Number(px) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        columnWidths[idx] = w;
        var headers = getHeaderCells();
        if (headers[idx]) {
          headers[idx].style.width = w + "px";
          headers[idx].style.minWidth = w + "px";
          headers[idx].style.maxWidth = w + "px";
        }
        var tbody = document.getElementById("dg-res-tbody");
        if (!tbody) return;
        Array.prototype.forEach.call(tbody.rows || [], function (tr) {
          if (!tr.cells || !tr.cells[idx]) return;
          var cell = tr.cells[idx];
          if (cell.colSpan > 1) return;
          cell.style.boxSizing = "border-box";
          cell.style.width = w + "px";
          cell.style.minWidth = w + "px";
          cell.style.maxWidth = w + "px";
        });
      }

      function applyStoredColumnWidths() {
        Object.keys(columnWidths || {}).forEach(function (k) {
          var idx = Number(k);
          var px = Number(columnWidths[k]);
          if (!Number.isFinite(idx) || !Number.isFinite(px) || px < 80) return;
          applyColumnWidthByIndex(idx, px);
        });
      }

      function onResizeMoveResults(e) {
        if (!resizeState) return;
        var delta = e.clientX - resizeState.startX;
        applyColumnWidthByIndex(resizeState.colIndex, resizeState.startWidth + delta);
        scheduleResultsFloatingHeaderUpdate();
      }

      function onResizeUpResults() {
        if (!resizeState) return;
        resizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try {
          localStorage.setItem(userColWidthKey(), JSON.stringify(columnWidths || {}));
        } catch (err) {}
        resRefreshFloatingAfterLayout();
      }

      function initColumnResizeHandles() {
        getHeaderCells().forEach(function (th, idx) {
          if (th.getAttribute("data-dg-res-resize-ready") === "1") return;
          th.setAttribute("data-dg-res-resize-ready", "1");
          th.style.position = "relative";
          var h = document.createElement("span");
          h.className = "dg-res-resize-handle";
          h.setAttribute("role", "separator");
          h.setAttribute("aria-orientation", "vertical");
          h.title = "Потяните, чтобы изменить ширину";
          h.style.cssText =
            "position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:4;" +
            "background:linear-gradient(to right,transparent 47%,#d9dee5 47%,#d9dee5 53%,transparent 53%);opacity:0.55";
          h.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var rect = th.getBoundingClientRect();
            var w = Number(columnWidths[idx] || (rect && rect.width ? rect.width : 0));
            resizeState = { colIndex: idx, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          h.addEventListener("click", function (ev) {
            ev.stopPropagation();
          });
          th.appendChild(h);
        });
      }

      function applyVisibleColumns() {
        var table = document.getElementById("dg-res-main-table");
        if (!table) return;
        var cg = table.querySelector("colgroup");
        var colNodes = cg ? cg.querySelectorAll("col") : [];
        for (var ci = 0; ci < colNodes.length; ci++) {
          colNodes[ci].style.visibility = visibleCols[ci] === false ? "collapse" : "";
        }
        var rowsList = [];
        if (table.tHead && table.tHead.rows && table.tHead.rows[0]) rowsList.push(table.tHead.rows[0]);
        var bodyRows = Array.prototype.slice.call((table.tBodies[0] && table.tBodies[0].rows) || []);
        rowsList = rowsList.concat(bodyRows);
        rowsList.forEach(function (row) {
          for (var i = 0; i < row.cells.length; i++) {
            row.cells[i].style.display = "";
            row.cells[i].style.visibility = visibleCols[i] === false ? "collapse" : "";
          }
        });
        resRefreshFloatingAfterLayout();
      }

      function renderColumnsPanel() {
        var list = document.getElementById("dg-res-columns-list");
        if (!list) return;
        var headers = getHeaderCells();
        list.innerHTML = "";
        headers.forEach(function (th, idx) {
          var label = document.createElement("label");
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = visibleCols[idx] !== false;
          cb.addEventListener("change", function () {
            visibleCols[idx] = cb.checked;
            applyVisibleColumns();
            try {
              localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols));
            } catch (e) {}
          });
          var txt = document.createElement("span");
          var panelLabel = th.getAttribute("data-res-col-label");
          if (!panelLabel) {
            panelLabel = String(th.textContent || "")
              .replace(/\s*[↑↓]\s*$/g, "")
              .trim();
          }
          txt.textContent = panelLabel || "Колонка " + (idx + 1);
          label.appendChild(cb);
          label.appendChild(txt);
          list.appendChild(label);
        });
      }

      function initColumnsPanel() {
        try {
          var rawW = localStorage.getItem(userColWidthKey());
          var parsedW = rawW ? JSON.parse(rawW) : null;
          if (parsedW && typeof parsedW === "object") columnWidths = parsedW;
        } catch (e2) {}
        try {
          var rawVisible = localStorage.getItem(userVisibleColsKey());
          var parsedVisible = rawVisible ? JSON.parse(rawVisible) : null;
          if (Array.isArray(parsedVisible) && parsedVisible.length) visibleCols = parsedVisible.slice();
        } catch (e) {}
        var panel = document.getElementById("dg-res-columns-panel");
        var toggle = document.getElementById("dg-res-columns-toggle");
        var allBtn = document.getElementById("dg-res-columns-all");
        var noneBtn = document.getElementById("dg-res-columns-none");
        var defBtn = document.getElementById("dg-res-columns-default");
        if (toggle && panel) {
          toggle.addEventListener("click", function () {
            panel.classList.toggle("open");
          });
        }
        if (allBtn) {
          allBtn.addEventListener("click", function () {
            visibleCols = getHeaderCells().map(function () { return true; });
            applyVisibleColumns();
            renderColumnsPanel();
          });
        }
        if (noneBtn) {
          noneBtn.addEventListener("click", function () {
            visibleCols = getHeaderCells().map(function (_, i) { return i === 0; });
            applyVisibleColumns();
            renderColumnsPanel();
          });
        }
        if (defBtn) {
          defBtn.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            columnWidths = {};
            try {
              localStorage.removeItem(userColWidthKey());
            } catch (e3) {}
            clearAppliedColumnWidths();
            applyVisibleColumns();
            renderColumnsPanel();
            initColumnResizeHandles();
          });
        }
        renderColumnsPanel();
      }

      function clearResults() {
        if (!window.confirm("Удалить историю результатов по текущему проекту?")) return;
        var f = readApiFilters();
        fetch("/api/results/clear", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ project_id: f.project_id === "all" ? null : f.project_id }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Не удалось очистить");
            alert("История очищена");
            loadResults();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function reparseAll() {
        if (!window.confirm("Добавить в очередь URL из результатов по текущим фильтрам?")) return;
        var f = readApiFilters();
        fetch("/api/parse/refresh-results", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_id: f.project_id === "all" ? null : f.project_id,
            page_status: f.page_status || null,
            search: f.search || null,
          }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || x.j.message || "Не удалось поставить в очередь");
            alert(x.j.message || "URL добавлены в очередь");
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function reparseOne(r) {
        if (!window.confirm("Поставить страницу в очередь на повторный парсинг?")) return;
        fetch("/api/parse/refresh-single", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: r.url,
            project_id: r.project_id,
            page_id: r.page_id || null,
          }),
        })
          .then(function (res) {
            return res.json().then(function (j) {
              return { r: res, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || x.j.message || "Не удалось поставить в очередь");
            alert(x.j.message || "Добавлено в очередь");
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function deleteOne(id) {
        if (!window.confirm("Удалить запись из истории?")) return;
        fetch("/api/results/" + id, { method: "DELETE", credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось удалить");
            alert("Запись удалена");
            loadResults({ showSkeleton: false });
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      document.getElementById("results-apply").addEventListener("click", function () {
        if (String(document.getElementById("dg-res-f-search").value || "").trim()) {
          parseSmart();
          return;
        }
        page = 1;
        persistResultsFilterForm();
        loadResults();
      });
      document.getElementById("results-default").addEventListener("click", function () {
        if (window.DatagonResultsFilterBlocks && window.DatagonResultsFilterBlocks.reset) window.DatagonResultsFilterBlocks.reset();
        if (window.DatagonFilters) window.DatagonFilters.clear("results");
        document.getElementById("dg-res-f-search").value = "";
        document.getElementById("dg-res-f-project").value = "all";
        document.getElementById("dg-res-f-page_status").value = "";
        document.getElementById("dg-res-f-matched").value = "all";
        document.getElementById("dg-res-f-availability").value = "all";
        document.getElementById("dg-res-f-project_name").value = "";
        document.getElementById("dg-res-f-price_min").value = "";
        document.getElementById("dg-res-f-price_max").value = "";
        limit = 100;
        document.getElementById("dg-res-limit").value = "100";
        page = 1;
        sortBy = "parsed_at";
        sortDir = "desc";
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sortBy: sortBy, sortDir: sortDir }));
        } catch (e) {}
        updateSortHeaders();
        try {
          window.history.replaceState(null, "", window.location.pathname);
        } catch (e2) {}
        loadResults();
      });
      document.getElementById("results-reparse-all").addEventListener("click", reparseAll);
      document.getElementById("results-clear-history").addEventListener("click", clearResults);

      document.getElementById("dg-res-f-search").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          if (searchReloadTimer) {
            clearTimeout(searchReloadTimer);
            searchReloadTimer = null;
          }
          parseSmart();
        }
      });

      document.getElementById("dg-res-f-search").addEventListener("input", function () {
        scheduleSyncUrl();
      });

      ["dg-res-f-project", "dg-res-f-matched", "dg-res-f-page_status", "dg-res-f-availability"].forEach(function (id) {
        document.getElementById(id).addEventListener("change", function () {
          page = 1;
          scheduleSyncUrl();
        });
      });

      document.getElementById("dg-res-limit").addEventListener("change", function () {
        limit = Number(this.value) || 100;
        page = 1;
        scheduleSyncUrl();
      });

      document.getElementById("dg-res-prev").addEventListener("click", function () {
        if (page > 1) {
          page--;
          loadResults({ showSkeleton: false });
        }
      });
      document.getElementById("dg-res-next").addEventListener("click", function () {
        if (page < pagesCount()) {
          page++;
          loadResults({ showSkeleton: false });
        }
      });

      (function bindResultsSortHeaderClicks() {
        var theadSort = document.getElementById("dg-res-thead");
        if (!theadSort) return;
        theadSort.addEventListener("click", function (e) {
          if (e.target && e.target.closest && e.target.closest(".dg-res-resize-handle")) return;
          var th = e.target.closest ? e.target.closest("th[data-res-sort]") : null;
          if (!th) return;
          var label = th.querySelector(".dg-res-th-text");
          if (label && e.target !== label && !label.contains(e.target)) return;
          onSort(th.getAttribute("data-res-sort"));
        });
      })();

      window.addEventListener("mousemove", onResizeMoveResults);
      window.addEventListener("mouseup", onResizeUpResults);

      var filterAdjustTimer = null;
      function scheduleFilterAdjustReload() {
        if (filterAdjustTimer) clearTimeout(filterAdjustTimer);
        filterAdjustTimer = setTimeout(function () {
          filterAdjustTimer = null;
          page = 1;
          scheduleSyncUrl();
        }, 350);
      }
      document.getElementById("dg-res-f-project_name").addEventListener("input", function () {
        scheduleSyncUrl();
        scheduleFilterAdjustReload();
      });
      ["dg-res-f-price_min", "dg-res-f-price_max"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", function () {
          scheduleSyncUrl();
          scheduleFilterAdjustReload();
        });
        document.getElementById(id).addEventListener("change", function () {
          scheduleSyncUrl();
          scheduleFilterAdjustReload();
        });
      });

      (function resultsFilterFieldVisibility() {
        var FIELD_GROUPS = [
          {
            title: "Основной ряд",
            subtitle: "Поиск и отбор",
            items: [
              { key: "smart", title: "Умный поиск", hint: "" },
              { key: "project", title: "Проект", hint: "" },
              { key: "matched", title: "Сопоставление", hint: "" },
              { key: "page_status", title: "Статус парсинга", hint: "" },
              { key: "availability", title: "Наличие", hint: "" },
            ],
          },
          {
            title: "Дополнительно",
            subtitle: "Название и цена",
            items: [
              { key: "project_name", title: "Название проекта (содержит)", hint: "" },
              { key: "price_min", title: "Цена от", hint: "" },
              { key: "price_max", title: "Цена до", hint: "" },
            ],
          },
          {
            title: "Действия",
            subtitle: "Кнопки под фильтром",
            items: [{ key: "filter_actions", title: "Кнопки «Применить», «По умолчанию» и др.", hint: "" }],
          },
        ];
        if (window.DatagonFilterFieldsVisibility && window.DatagonFilterFieldsVisibility.init) {
          window.DatagonFilterFieldsVisibility.init({
            storageKeyPrefix: "datagon_results_filter_fields_v2",
            attr: "data-dg-res-filter-field",
            fieldGroups: FIELD_GROUPS,
            togglesRootId: "dg-res-filter-blocks-toggles",
            idPrefix: "dg-res-ff-",
            exposeAs: "DatagonResultsFilterBlocks",
            onAfterApply: resRefreshFloatingAfterLayout,
          });
        }
      })();

      (function collapse() {
        var body = document.getElementById("dg-res-filters-body");
        var btn = document.getElementById("dg-res-filters-toggle");
        function sync() {
          try {
            if (localStorage.getItem(FILTERS_KEY) === "1") {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(FILTERS_KEY) === "1") body.style.display = "none";
        } catch (e) {}
        sync();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(FILTERS_KEY, hidden ? "0" : "1");
          } catch (e) {}
          resRefreshFloatingAfterLayout();
        });
      })();

      window.addEventListener("scroll", onScrollResultsFloatingHeader, { passive: true });
      window.addEventListener("resize", function () {
        updateResultsStickyTopVar();
        resRefreshFloatingAfterLayout();
      });
      (function bindResultsScrollContainers() {
        var mainOuter = document.querySelector(".app-main__outer");
        if (mainOuter && mainOuter.addEventListener) {
          mainOuter.addEventListener("scroll", onScrollResultsFloatingHeader, { passive: true });
        }
        var horiz = document.querySelector(".dg-res-table-scroll-outer");
        if (horiz && horiz.addEventListener) {
          horiz.addEventListener("scroll", onScrollResultsFloatingHeader, { passive: true });
        }
      })();

      updateResultsStickyTopVar();
      parseUrlToForm();
      mergeResultsPrefsFromStorage();
      updateSortHeaders();
      initColumnsPanel();
      loadResults();
      loadBaseData();
    })();
  </script>
