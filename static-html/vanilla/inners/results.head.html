  <!-- Результаты: визуал заголовка таблицы — паритет с dg-ms-table / МойСклад (moysklad.head + тема main.*.css). -->

    /* fixed — как МойСклад: ресайз колонок; границы как table-bordered + явный цвет (перебиваем .dg-ms-table из main.css) */
    body.datagon-vanilla-body[data-dg-active-nav="results"] #dg-res-main-table.dg-ms-table {

    /*

    body.datagon-vanilla-body[data-dg-active-nav="results"] #dg-res-main-table.dg-ms-table thead th:last-child {

    body.datagon-vanilla-body[data-dg-active-nav="results"] #dg-res-main-table thead th:hover .dg-res-resize-handle {

    body.datagon-vanilla-body[data-dg-active-nav="results"] #dg-res-main-table.dg-ms-table tbody td {

      opacity: 0.62;
      pointer-events: none;
      transition: opacity 0.12s ease-out;
    }
  </style>
