  <script>
    (function () {
      var FILTERS_KEY = "datagon_projects_filters_collapsed_v1";
      var SORT_STORAGE_VERSION = "v1";
      var projects = [];
      var loading = false;
      var sortBy = "id";
      var sortDir = "desc";
      var editProject = null;
      var DEFAULT_VISIBLE_COLS = ["id", "name", "domain", "pages_count", "queue", "actions"];
      var visibleCols = DEFAULT_VISIBLE_COLS.slice();
      var columnWidths = {};
      var resizeState = null;

      function sortArrow(active, dir) {
        return active ? (dir === "asc" ? " ↑" : " ↓") : "";
      }

      function userSortKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_projects_sort_" + SORT_STORAGE_VERSION + ":" + u;
        } catch (e) {
          return "datagon_projects_sort_" + SORT_STORAGE_VERSION + ":guest";
        }
      }

      function userVisibleColsKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_projects_visible_cols_v1:" + u;
        } catch (e) {
          return "datagon_projects_visible_cols_v1:guest";
        }
      }

      function userColWidthKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_projects_col_widths_v1:" + u;
        } catch (e) {
          return "datagon_projects_col_widths_v1:guest";
        }
      }

      function syncSortUrl() {
        var params = new URLSearchParams(window.location.search);
        params.set("sort_by", sortBy);
        params.set("sort_dir", sortDir);
        var next = window.location.pathname + "?" + params.toString();
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      function loadSortState() {
        var params = new URLSearchParams(window.location.search);
        var sb = params.get("sort_by");
        var sd = params.get("sort_dir");
        var allowed = { id: true, name: true, domain: true, pages_count: true };
        if (sb && allowed[sb]) sortBy = sb;
        if (sd === "asc" || sd === "desc") sortDir = sd;
        if (sb && sd) return;
        try {
          var saved = JSON.parse(localStorage.getItem(userSortKey()) || "{}");
          if (saved && allowed[saved.sort_by]) sortBy = saved.sort_by;
          if (saved && (saved.sort_dir === "asc" || saved.sort_dir === "desc")) sortDir = saved.sort_dir;
        } catch (e) {}
      }

      function showErr(msg) {
        var el = document.getElementById("dg-proj-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function readSmartSearch() {
        return document.getElementById("dg-proj-smart").value.trim();
      }

      function readTableFilters() {
        return {
          id: document.getElementById("dg-proj-tf-id").value.trim(),
          name: document.getElementById("dg-proj-tf-name").value.trim(),
          domain: document.getElementById("dg-proj-tf-domain").value.trim(),
          pages_min: document.getElementById("dg-proj-tf-pages_min").value,
          pages_max: document.getElementById("dg-proj-tf-pages_max").value,
        };
      }

      function computeRows() {
        var needle = readSmartSearch().toLowerCase();
        var rows = (projects || []).map(function (p) {
          var pending = Number(p.pending_count || 0);
          var processing = Number(p.processing_count || 0);
          var done = Number(p.done_count || 0);
          var error = Number(p.error_count || 0);
          return Object.assign({}, p, {
            queueInfo: "⏳ " + pending + " | ⚙️ " + processing + " | ✅ " + done + " | ❌ " + error,
          });
        });
        if (needle) {
          rows = rows.filter(function (p) {
            var haystack = (String(p.id || "") + " " + (p.name || "") + " " + (p.domain || "")).toLowerCase();
            return haystack.includes(needle);
          });
        }
        var tf = readTableFilters();
        return rows.filter(function (p) {
          if (tf.id && !String(p.id || "").includes(String(tf.id).trim())) return false;
          if (tf.name && !String(p.name || "").toLowerCase().includes(String(tf.name).trim().toLowerCase())) return false;
          if (tf.domain && !String(p.domain || "").toLowerCase().includes(String(tf.domain).trim().toLowerCase())) return false;
          var pages = Number(p.pages_count || 0);
          var min = Number(tf.pages_min || "");
          var max = Number(tf.pages_max || "");
          if (Number.isFinite(min) && String(tf.pages_min).trim() !== "" && pages < min) return false;
          if (Number.isFinite(max) && String(tf.pages_max).trim() !== "" && pages > max) return false;
          return true;
        });
      }

      function updateSortHeaders() {
        document.querySelectorAll("th[data-proj-sort]").forEach(function (th) {
          var f = th.getAttribute("data-proj-sort");
          var base = { id: "ID", name: "Имя", domain: "Домен", pages_count: "Страниц" }[f] || f;
          var labelEl = th.querySelector(".proj-sort-label");
          if (!labelEl) {
            labelEl = document.createElement("span");
            labelEl.className = "proj-sort-label";
            th.insertBefore(labelEl, th.firstChild || null);
          }
          labelEl.textContent = base + sortArrow(sortBy === f, sortDir);
          Array.prototype.slice.call(th.childNodes).forEach(function (node) {
            if (node === labelEl) return;
            if (node.classList && node.classList.contains("proj-resize-handle")) return;
            if (node.nodeType === Node.TEXT_NODE) th.removeChild(node);
          });
        });
        initColumnResizeHandles();
        applyStoredColumnWidths();
      }

      function getHeaderCells() {
        return Array.prototype.slice.call(document.querySelectorAll("#dg-proj-main-table thead th"));
      }

      function applyColumnWidthByIndex(index, widthPx) {
        var w = Math.max(80, Math.min(900, Math.round(Number(widthPx) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        columnWidths[index] = w;
        var headers = getHeaderCells();
        if (headers[index]) {
          headers[index].style.width = w + "px";
          headers[index].style.minWidth = w + "px";
          headers[index].style.maxWidth = w + "px";
        }
        document.querySelectorAll("#dg-proj-tbody tr").forEach(function (tr) {
          if (!tr.cells || !tr.cells[index]) return;
          tr.cells[index].style.width = w + "px";
          tr.cells[index].style.minWidth = w + "px";
          tr.cells[index].style.maxWidth = w + "px";
        });
      }

      function applyStoredColumnWidths() {
        Object.keys(columnWidths || {}).forEach(function (k) {
          var idx = Number(k);
          if (!Number.isFinite(idx)) return;
          applyColumnWidthByIndex(idx, columnWidths[k]);
        });
      }

      function onResizeMove(e) {
        if (!resizeState) return;
        var delta = e.clientX - resizeState.startX;
        applyColumnWidthByIndex(resizeState.index, resizeState.startWidth + delta);
      }

      function onResizeUp() {
        if (!resizeState) return;
        resizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try {
          localStorage.setItem(userColWidthKey(), JSON.stringify(columnWidths || {}));
        } catch (e) {}
      }

      function initColumnResizeHandles() {
        getHeaderCells().forEach(function (th, index) {
          if (th.getAttribute("data-proj-resize-ready") === "1") return;
          th.setAttribute("data-proj-resize-ready", "1");
          th.style.position = "relative";
          th.style.overflow = "visible";
          th.addEventListener("mousemove", function (ev) {
            var rect = th.getBoundingClientRect();
            if (!rect) return;
            th.style.cursor = ev.clientX >= rect.right - 24 ? "col-resize" : "";
          });
          th.addEventListener("mouseleave", function () {
            th.style.cursor = "";
          });
          th.addEventListener("mousedown", function (ev) {
            var rect = th.getBoundingClientRect();
            if (!rect) return;
            // Allow resize by dragging right edge of header.
            if (ev.clientX < rect.right - 24) return;
            ev.preventDefault();
            ev.stopPropagation();
            var w = Number(columnWidths[index] || (rect.width || 0));
            resizeState = { index: index, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          var handle = document.createElement("span");
          handle.className = "proj-resize-handle";
          handle.setAttribute("role", "separator");
          handle.setAttribute("aria-orientation", "vertical");
          handle.title = "Потяните, чтобы изменить ширину";
          handle.style.cssText =
            "position:absolute;top:0;right:0;width:8px;height:100%;cursor:col-resize;z-index:8;" +
            "background:linear-gradient(to right,transparent 42%,#cfd6df 42%,#cfd6df 58%,transparent 58%);opacity:0.9";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var rect = th.getBoundingClientRect();
            var w = Number(columnWidths[index] || (rect && rect.width ? rect.width : 0));
            resizeState = { index: index, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          handle.addEventListener("click", function (ev) {
            ev.stopPropagation();
          });
          th.appendChild(handle);
        });
      }

      function applyVisibleColumns() {
        var headers = getHeaderCells();
        headers.forEach(function (th, index) {
          var key = th.getAttribute("data-proj-sort");
          if (!key) key = index === headers.length - 2 ? "queue" : "actions";
          var show = visibleCols.indexOf(key) >= 0;
          th.style.display = show ? "" : "none";
          document.querySelectorAll("#dg-proj-tbody tr").forEach(function (tr) {
            if (tr.cells && tr.cells[index]) tr.cells[index].style.display = show ? "" : "none";
          });
        });
      }

      function renderColumnsPanel() {
        var list = document.getElementById("dg-proj-columns-list");
        if (!list) return;
        list.replaceChildren();
        var headers = getHeaderCells();
        headers.forEach(function (th, index) {
          var key = th.getAttribute("data-proj-sort");
          if (!key) key = index === headers.length - 2 ? "queue" : "actions";
          var label = String(th.textContent || "").replace(/\s*[↑↓]\s*$/, "").trim();
          var row = document.createElement("label");
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = visibleCols.indexOf(key) >= 0;
          cb.addEventListener("change", function () {
            var next = visibleCols.slice();
            if (cb.checked) {
              if (next.indexOf(key) < 0) next.push(key);
            } else {
              next = next.filter(function (k) {
                return k !== key;
              });
            }
            if (!next.length) {
              cb.checked = true;
              return;
            }
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) {
              return next.indexOf(k) >= 0;
            });
            try {
              localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols));
            } catch (e) {}
            applyVisibleColumns();
          });
          row.appendChild(cb);
          row.appendChild(document.createTextNode(label));
          list.appendChild(row);
        });
      }

      function setSort(field) {
        if (sortBy === field) sortDir = sortDir === "asc" ? "desc" : "asc";
        else {
          sortBy = field;
          sortDir = "asc";
        }
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sort_by: sortBy, sort_dir: sortDir }));
        } catch (e) {}
        document.getElementById("dg-proj-sort-by").value = sortBy;
        document.getElementById("dg-proj-sort-dir").value = sortDir;
        syncSortUrl();
        updateSortHeaders();
        loadProjects();
      }

      function renderTable() {
        updateSortHeaders();
        var tbody = document.getElementById("dg-proj-tbody");
        tbody.replaceChildren();
        var filtered = computeRows();
        if (loading) {
          var trL = document.createElement("tr");
          var tdL = document.createElement("td");
          tdL.colSpan = 6;
          tdL.className = "text-muted";
          tdL.textContent = "Загрузка...";
          trL.appendChild(tdL);
          tbody.appendChild(trL);
          applyVisibleColumns();
          applyStoredColumnWidths();
          return;
        }
        if (!filtered.length) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.colSpan = 6;
          td.className = "text-muted";
          td.textContent = "Нет проектов";
          tr.appendChild(td);
          tbody.appendChild(tr);
          applyVisibleColumns();
          applyStoredColumnWidths();
          return;
        }
        filtered.forEach(function (p) {
          var tr = document.createElement("tr");
          var tdId = document.createElement("td");
          tdId.textContent = String(p.id);
          var tdName = document.createElement("td");
          var b = document.createElement("b");
          b.textContent = p.name || "";
          tdName.appendChild(b);
          var sub = document.createElement("div");
          sub.className = "small text-muted";
          sub.textContent = p.domain || "";
          tdName.appendChild(sub);
          var tdDom = document.createElement("td");
          tdDom.textContent = p.domain || "";
          var tdPages = document.createElement("td");
          tdPages.textContent = String(Number(p.pages_count || 0));
          var tdQ = document.createElement("td");
          var sm = document.createElement("small");
          sm.textContent = p.queueInfo || "";
          tdQ.appendChild(sm);
          var tdAct = document.createElement("td");
          tdAct.className = "text-nowrap";
          var btnEd = document.createElement("button");
          btnEd.type = "button";
          btnEd.className = "btn btn-warning btn-sm me-1 mb-1";
          btnEd.textContent = "✏️ Изменить";
          btnEd.addEventListener("click", function () {
            openEdit(p);
          });
          var btnDel = document.createElement("button");
          btnDel.type = "button";
          btnDel.className = "btn btn-danger btn-sm mb-1";
          btnDel.textContent = "🗑️ Удалить";
          btnDel.addEventListener("click", function () {
            deleteProject(p);
          });
          tdAct.appendChild(btnEd);
          tdAct.appendChild(btnDel);
          tr.appendChild(tdId);
          tr.appendChild(tdName);
          tr.appendChild(tdDom);
          tr.appendChild(tdPages);
          tr.appendChild(tdQ);
          tr.appendChild(tdAct);
          tbody.appendChild(tr);
        });
        applyVisibleColumns();
        applyStoredColumnWidths();
        initColumnResizeHandles();
      }

      function loadProjects() {
        sortBy = document.getElementById("dg-proj-sort-by").value;
        sortDir = document.getElementById("dg-proj-sort-dir").value;
        syncSortUrl();
        loading = true;
        showErr("");
        renderTable();
        var qs = new URLSearchParams({ sort_by: sortBy, sort_dir: sortDir });
        fetch("/api/projects?" + qs.toString(), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Не удалось загрузить проекты");
            projects = Array.isArray(x.j) ? x.j : [];
            loading = false;
            renderTable();
          })
          .catch(function (e) {
            loading = false;
            projects = [];
            renderTable();
            showErr(e.message || "Ошибка загрузки проектов");
          });
      }

      function readCreateForm() {
        return {
          name: document.getElementById("dg-proj-new-name").value.trim(),
          domain: document.getElementById("dg-proj-new-domain").value.trim(),
          selector_price: document.getElementById("dg-proj-new-selector_price").value.trim(),
          selector_name: document.getElementById("dg-proj-new-selector_name").value.trim(),
          selector_sku: document.getElementById("dg-proj-new-selector_sku").value.trim(),
          selector_oos: document.getElementById("dg-proj-new-selector_oos").value.trim(),
        };
      }

      function createProject() {
        var f = readCreateForm();
        if (!f.name || !f.selector_price) {
          alert("Заполните название и селектор цены");
          return;
        }
        fetch("/api/projects", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(f),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось создать проект");
            document.getElementById("dg-proj-new-name").value = "";
            document.getElementById("dg-proj-new-domain").value = "";
            document.getElementById("dg-proj-new-selector_price").value = "";
            document.getElementById("dg-proj-new-selector_name").value = "";
            document.getElementById("dg-proj-new-selector_sku").value = "";
            document.getElementById("dg-proj-new-selector_oos").value = "";
            loadProjects();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function deleteProject(p) {
        if (!window.confirm('Удалить проект "' + p.name + '" и связанные страницы?')) return;
        fetch("/api/projects/" + p.id, { method: "DELETE", credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось удалить проект");
            loadProjects();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function openEdit(p) {
        editProject = Object.assign({}, p);
        document.getElementById("dg-proj-edit-title").textContent = "Редактировать проект #" + p.id;
        document.getElementById("dg-proj-edit-name").value = p.name || "";
        document.getElementById("dg-proj-edit-domain").value = p.domain || "";
        document.getElementById("dg-proj-edit-selector_price").value = p.selector_price || "";
        document.getElementById("dg-proj-edit-selector_name").value = p.selector_name || "";
        document.getElementById("dg-proj-edit-selector_sku").value = p.selector_sku || "";
        document.getElementById("dg-proj-edit-selector_oos").value = p.selector_oos || "";
        document.getElementById("dg-proj-edit-wrap").style.display = "";
        try {
          document.getElementById("dg-proj-edit-wrap").scrollIntoView({ behavior: "smooth", block: "nearest" });
        } catch (e) {}
      }

      function closeEdit() {
        editProject = null;
        document.getElementById("dg-proj-edit-wrap").style.display = "none";
      }

      function saveEdit() {
        if (!editProject) return;
        var body = {
          name: document.getElementById("dg-proj-edit-name").value.trim(),
          domain: document.getElementById("dg-proj-edit-domain").value.trim(),
          selector_price: document.getElementById("dg-proj-edit-selector_price").value.trim(),
          selector_name: document.getElementById("dg-proj-edit-selector_name").value.trim(),
          selector_sku: document.getElementById("dg-proj-edit-selector_sku").value.trim(),
          selector_oos: document.getElementById("dg-proj-edit-selector_oos").value.trim(),
        };
        fetch("/api/projects/" + editProject.id, {
          method: "PUT",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось сохранить изменения");
            closeEdit();
            loadProjects();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      document.querySelectorAll("th[data-proj-sort]").forEach(function (th) {
        th.addEventListener("click", function () {
          setSort(th.getAttribute("data-proj-sort"));
        });
      });
      window.addEventListener("mousemove", onResizeMove);
      window.addEventListener("mouseup", onResizeUp);

      document.getElementById("dg-proj-sort-by").addEventListener("change", function () {
        sortBy = this.value;
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sort_by: sortBy, sort_dir: sortDir }));
        } catch (e) {}
        syncSortUrl();
        updateSortHeaders();
        loadProjects();
      });
      document.getElementById("dg-proj-sort-dir").addEventListener("change", function () {
        sortDir = this.value;
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sort_by: sortBy, sort_dir: sortDir }));
        } catch (e) {}
        syncSortUrl();
        updateSortHeaders();
        loadProjects();
      });

      document.getElementById("dg-proj-btn-refresh").addEventListener("click", function () {
        loadProjects();
      });
      document.getElementById("dg-proj-btn-create").addEventListener("click", createProject);
      document.getElementById("dg-proj-btn-save").addEventListener("click", saveEdit);
      document.getElementById("dg-proj-btn-cancel-edit").addEventListener("click", closeEdit);

      [
        "dg-proj-smart",
        "dg-proj-tf-id",
        "dg-proj-tf-name",
        "dg-proj-tf-domain",
        "dg-proj-tf-pages_min",
        "dg-proj-tf-pages_max",
      ].forEach(function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", function () {
          renderTable();
        });
        el.addEventListener("change", function () {
          renderTable();
        });
      });

      (function filtersCollapse() {
        var body = document.getElementById("dg-proj-filters-body");
        var btn = document.getElementById("dg-proj-filters-toggle");
        function sync() {
          try {
            if (localStorage.getItem(FILTERS_KEY) === "1") {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(FILTERS_KEY) === "1") body.style.display = "none";
        } catch (e) {}
        sync();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(FILTERS_KEY, hidden ? "0" : "1");
          } catch (e) {}
        });
      })();

      (function initColumnsPanel() {
        try {
          var rawVisible = JSON.parse(localStorage.getItem(userVisibleColsKey()) || "[]");
          if (Array.isArray(rawVisible) && rawVisible.length) {
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) {
              return rawVisible.indexOf(k) >= 0;
            });
          }
        } catch (e) {}
        try {
          columnWidths = JSON.parse(localStorage.getItem(userColWidthKey()) || "{}") || {};
        } catch (e) {
          columnWidths = {};
        }
        var toggle = document.getElementById("dg-proj-columns-toggle");
        var panel = document.getElementById("dg-proj-columns-panel");
        var btnAll = document.getElementById("dg-proj-columns-all");
        var btnNone = document.getElementById("dg-proj-columns-none");
        var btnDef = document.getElementById("dg-proj-columns-default");
        if (toggle && panel) {
          toggle.addEventListener("click", function () {
            panel.classList.toggle("open");
            renderColumnsPanel();
          });
        }
        if (btnAll) {
          btnAll.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try {
              localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnNone) {
          btnNone.addEventListener("click", function () {
            visibleCols = ["name"];
            try {
              localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnDef) {
          btnDef.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try {
              localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
      })();

      loadSortState();
