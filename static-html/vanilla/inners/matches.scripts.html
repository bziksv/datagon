  <script>
    (function () {
      var PRODUCTS_LIMIT = 50;
      var MATCHES_MY_PRODUCTS_MANUAL_COLLAPSE_KEY = "datagon_matches_my_products_manual_collapsed_v1";

      function formatNumber(value) {
        return Number(value || 0).toLocaleString("ru-RU");
      }
      function formatDateTime(value) {
        if (!value) return "-";
        var d = new Date(value);
        if (isNaN(d.getTime())) return "-";
        return d.toLocaleString("ru-RU");
      }
      function buildSiteUrl(raw) {
        var v = String(raw || "").trim();
        if (!v) return "";
        if (/^https?:\/\//i.test(v)) return v;
        if (!/[a-z0-9-]+\.[a-z]{2,}/i.test(v)) return "";
        return "https://" + v;
      }
      function normalizeWebasystProductUrl(rawUrl, domainRaw, cmsType) {
        var direct = buildSiteUrl(rawUrl);
        var base = buildSiteUrl(domainRaw);
        var isWebasyst = String(cmsType || "").toLowerCase() === "webasyst";
        function rewrite(u, allowMultiSegment) {
          var pathRaw = String(u.pathname || "/");
          var pathLower = pathRaw.toLowerCase();
          if (pathLower.indexOf("/webasyst/") >= 0) return null;
          if (pathLower.startsWith("/search")) return null;
          if (pathLower.startsWith("/product/")) {
            if (!pathRaw.endsWith("/")) u.pathname = pathRaw + "/";
            return u.toString();
          }
          var slug = pathRaw.replace(/^\/+/, "").replace(/\/+$/, "");
          if (!slug) return u.toString();
          if (slug.indexOf("/") >= 0) {
            if (!allowMultiSegment) return null;
            var parts = slug.split("/").filter(Boolean);
            var last = parts[parts.length - 1];
            if (!last) return u.toString();
            u.pathname = "/product/" + last + "/";
            return u.toString();
          }
          if (/^(search|cart|checkout|login|my|order|tag|brands?|contact|blog)$/i.test(slug)) return null;
          u.pathname = "/product/" + slug + "/";
          return u.toString();
        }
        if (direct) {
          try {
            var u = new URL(direct);
            var out = rewrite(u, isWebasyst);
            return out != null ? out : direct;
          } catch (e) {
            return direct;
          }
        }
        if (!isWebasyst || !base) return "";
        try {
          var u2 = new URL(base);
          var out2 = rewrite(u2, true);
          return out2 != null ? out2 : base;
        } catch (e2) {
          return base;
        }
      }
      /**
       * Fallback витрины Shop-Script: если после normalizeWebasystProductUrl URL всё ещё нет —
       * собираем https://домен/product/{SKU}/ (SKU без символов /, ?, #).
       */
      function buildProductPageUrlFromSlug(domainRaw, skuRaw) {
        var base = buildSiteUrl(domainRaw);
        var sku = String(skuRaw || "").trim();
        if (!base || !sku || /[/?#]/.test(sku)) return "";
        return base.replace(/\/+$/, "") + "/product/" + encodeURIComponent(sku) + "/";
      }
      function buildProductSearchUrl(domainRaw, sku, name) {
        var base = buildSiteUrl(domainRaw);
        if (!base) return "";
        var query = String(sku || "").trim() || String(name || "").trim();
        if (!query) return base;
        return base.replace(/\/$/, "") + "/search/?q=" + encodeURIComponent(query);
      }
      function buildWebasystEditUrl(domainRaw, sourceId, cmsType) {
        var base = buildSiteUrl(domainRaw);
        var id = String(sourceId || "").trim();
        if (!base || !id) return "";
        if (String(cmsType || "").toLowerCase() !== "webasyst") return "";
        return base.replace(/\/$/, "") + "/webasyst/shop/?action=products#/product/" + encodeURIComponent(id) + "/edit/";
      }

      var MATCH_MODES_ALLOWED = { all: 1, name: 1, sku: 1, sku_norm: 1, sku_best: 1 };

      function syncUrlFromState() {
        var params = new URLSearchParams();
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        var statusFilter = document.getElementById("dg-matches-status-filter").value;
        var searchMode = document.getElementById("dg-matches-search-mode").value;
        var productSearch = String(document.getElementById("dg-matches-product-search").value || "").trim();
        var matchesPage = Number(state.matchesPage || 1);
        var matchesLimit = Number(state.matchesLimit || 100);
        if (mySiteId) params.set("my_site_id", String(mySiteId));
        if (statusFilter && statusFilter !== "pending") params.set("status", statusFilter);
        if (searchMode && searchMode !== "all") params.set("mode", searchMode);
        if (productSearch) params.set("product_search", productSearch);
        if (matchesPage > 1) params.set("matches_page", String(matchesPage));
        if (matchesLimit !== 100) params.set("matches_limit", String(matchesLimit));
        var next = params.toString()
          ? window.location.pathname + "?" + params.toString()
          : window.location.pathname;
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      var state = {
        mySites: [],
        competitors: [],
        competitorIds: [],
        myProducts: [],
        myProductsPage: 1,
        myProductsTotal: 0,
        selectedProductIds: [],
        loadingProducts: false,
        matches: [],
        matchesPage: 1,
        matchesLimit: 100,
        matchesTotal: 0,
        loadingMatches: false,
        matchesSortBy: "confidence",
        matchesSortDir: "desc",
        jobStatus: {
          active: false,
          done: false,
          message: "Ожидание",
          processed: 0,
          total: 0,
          foundSku: 0,
          foundName: 0,
          logs: [],
          canRetry: false,
        },
        jobDoneReloaded: false,
        statusTimer: null,
        urlTick: null,
      };

      var MATCHES_MY_COL_COUNT = 7;
      var MATCHES_MY_COL_DEFAULTS = [44, 108, 120, 280, 96, 72, 152];
      var matchesMyColWidths = {};
      var matchesMyResizeState = null;
      var matchesMyResizeGlobalsBound = false;
      var matchesMyScrollGlobalsBound = false;
      var FLOATING_MY_OFFSET_PX = 2;
      var FLOATING_MY_START_EPS_PX = 3;
      var matchesMyFloatingRaf = 0;
      var matchesMyFloatingLastScrollTs = 0;

      function showErr(msg) {
        var el = document.getElementById("dg-matches-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function parseUrlParams() {
        var p = new URLSearchParams(window.location.search);
        return {
          my_site_id: p.get("my_site_id") || "",
          status: p.get("status") || "",
          mode: p.get("mode") || "",
          product_search: p.get("product_search") || "",
          matches_page: Number(p.get("matches_page") || 1),
          matches_limit: Number(p.get("matches_limit") || 100),
        };
      }

      function scheduleSyncUrl() {
        if (state.urlTick) clearTimeout(state.urlTick);
        state.urlTick = setTimeout(function () {
          state.urlTick = null;
          syncUrlFromState();
        }, 150);
      }

      function selectedSet() {
        var s = {};
        state.selectedProductIds.forEach(function (id) {
          s[id] = true;
        });
        return s;
      }

      function fillMySitesSelect() {
        var sel = document.getElementById("dg-matches-my-site");
        var v = sel.value;
        sel.innerHTML = '<option value="">-- выберите --</option>';
        state.mySites.forEach(function (s) {
          var o = document.createElement("option");
          o.value = String(s.id);
          o.textContent = s.name || "#" + s.id;
          sel.appendChild(o);
        });
        if (v && [].some.call(sel.options, function (o) { return o.value === v; })) sel.value = v;
      }

      function renderCompetitors() {
        var box = document.getElementById("dg-matches-competitors");
        box.replaceChildren();
        var set = {};
        state.competitorIds.forEach(function (id) {
          set[String(id)] = true;
        });
        state.competitors.forEach(function (c) {
          var id = String(c.id);
          var wrap = document.createElement("div");
          wrap.className = "form-check";
          var inp = document.createElement("input");
          inp.type = "checkbox";
          inp.className = "form-check-input";
          inp.id = "comp-" + id;
          inp.checked = !!set[id];
          inp.addEventListener("change", function () {
            if (inp.checked) {
              if (!state.competitorIds.some(function (x) { return String(x) === id; })) state.competitorIds.push(id);
            } else {
              state.competitorIds = state.competitorIds.filter(function (x) { return String(x) !== id; });
            }
            scheduleSyncUrl();
            refreshActionButtons();
          });
          var lab = document.createElement("label");
          lab.className = "form-check-label";
          lab.htmlFor = "comp-" + id;
          lab.textContent = c.name || "#" + c.id;
          wrap.appendChild(inp);
          wrap.appendChild(lab);
          box.appendChild(wrap);
        });
      }

      function refreshActionButtons() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        var hasComp = state.competitorIds.length > 0;
        var js = state.jobStatus;
        document.getElementById("dg-matches-run-selected").disabled = !mySiteId || !hasComp;
        document.getElementById("dg-matches-run-auto").disabled = !mySiteId || !hasComp;
        document.getElementById("dg-matches-retry").disabled = !mySiteId || !js.canRetry;
        document.getElementById("dg-matches-stop").disabled = !mySiteId || !js.active;
      }

      function updateJobUi() {
        var js = state.jobStatus;
        var pct = js.total > 0 ? Math.round((js.processed / js.total) * 100) : 0;
        var hint = document.getElementById("dg-matches-job-hint");
        if (hint)
          hint.textContent =
            (js.message || "Ожидание") +
            " (" +
            formatNumber(js.processed) +
            "/" +
            formatNumber(js.total) +
            ", " +
            pct +
            "%)";
        var found = document.getElementById("dg-matches-job-found");
        if (found)
          found.textContent =
            "Найдено по заданию: по SKU " + formatNumber(js.foundSku) + ", по названию " + formatNumber(js.foundName);
        var logsEl = document.getElementById("dg-matches-job-logs");
        if (logsEl) {
          logsEl.replaceChildren();
          (js.logs || []).slice(0, 10).forEach(function (l, i) {
            var d = document.createElement("div");
            d.textContent = "• " + l;
            logsEl.appendChild(d);
          });
          logsEl.classList.toggle("dg-matches-job-logs-reserved", !!js.active || (js.logs || []).length > 0);
        }
        refreshActionButtons();
      }

      function myProductsPages() {
        return Math.max(1, Math.ceil(state.myProductsTotal / PRODUCTS_LIMIT));
      }
      function matchesPages() {
        return Math.max(1, Math.ceil(state.matchesTotal / state.matchesLimit));
      }

      function updateMyProductsHints() {
        document.getElementById("dg-matches-my-products-page-hint").textContent =
          "Страница " + state.myProductsPage + "/" + myProductsPages();
        document.getElementById("dg-matches-my-prev").disabled = state.myProductsPage <= 1;
        document.getElementById("dg-matches-my-next").disabled = state.myProductsPage >= myProductsPages();
        document.getElementById("dg-matches-my-products-hint").textContent =
          "Выбрано: " + state.selectedProductIds.length + "; всего: " + formatNumber(state.myProductsTotal);
      }

      function updateMatchesPageHints() {
        document.getElementById("dg-matches-page-hint").textContent =
          "Страница " + state.matchesPage + "/" + matchesPages();
        document.getElementById("dg-matches-prev").disabled = state.matchesPage <= 1;
        document.getElementById("dg-matches-next").disabled = state.matchesPage >= matchesPages();
        document.getElementById("dg-matches-total-hint").textContent = "Всего: " + formatNumber(state.matchesTotal);
      }

      function formatMatchesMyProductMoney(value) {
        var num = Number(value);
        if (!Number.isFinite(num)) num = 0;
        return num.toLocaleString("ru-RU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatMatchesMyProductUpdated(iso) {
        if (!iso) return "—";
        try {
          var d = new Date(iso);
          if (Number.isNaN(d.getTime())) return String(iso);
          return d.toLocaleString("ru-RU", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch (e) {
          return "—";
        }
      }

      function userMatchesMyColWidthKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_matches_my_products_col_widths_v1:" + u;
        } catch (e) {
          return "datagon_matches_my_products_col_widths_v1:guest";
        }
      }

      function syncMatchesMyTableLayoutWidth() {
        var tbl = document.getElementById("dg-matches-my-main-table");
        if (!tbl) return;
        var sum = 0;
        for (var i = 0; i < MATCHES_MY_COL_COUNT; i++) {
          var w = matchesMyColWidths[i];
          if (!Number.isFinite(w) || w <= 0) w = MATCHES_MY_COL_DEFAULTS[i];
          sum += w;
        }
        tbl.style.width = sum + "px";
        tbl.style.minWidth = sum + "px";
      }

      function applyMatchesMyColumnWidth(index, widthPx) {
        var minW = index === 0 ? 36 : 60;
        var maxW = index === 0 ? 80 : 900;
        var w = Math.max(minW, Math.min(maxW, Math.round(Number(widthPx) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        matchesMyColWidths[index] = w;
        var col = document.querySelector("#dg-matches-my-main-table col.dg-matches-my-col-" + index);
        if (col) col.style.width = w + "px";
        var headRow = document.getElementById("dg-matches-my-thead-row");
        if (headRow && headRow.cells && headRow.cells[index]) {
          var th = headRow.cells[index];
          th.style.boxSizing = "border-box";
          th.style.width = w + "px";
          th.style.minWidth = w + "px";
          th.style.maxWidth = w + "px";
        }
        var tb = document.getElementById("dg-matches-my-products-tbody");
        if (tb) {
          Array.prototype.forEach.call(tb.rows || [], function (tr) {
            if (!tr.cells || !tr.cells[index] || tr.cells[index].colSpan > 1) return;
            var c = tr.cells[index];
            c.style.boxSizing = "border-box";
            c.style.width = w + "px";
            c.style.minWidth = w + "px";
            c.style.maxWidth = w + "px";
          });
        }
        syncMatchesMyTableLayoutWidth();
      }

      function applyStoredMatchesMyColWidths() {
        try {
          var raw = localStorage.getItem(userMatchesMyColWidthKey());
          if (raw) matchesMyColWidths = JSON.parse(raw) || {};
        } catch (e) {
          matchesMyColWidths = {};
        }
        for (var i = 0; i < MATCHES_MY_COL_COUNT; i++) {
          if (matchesMyColWidths[i] != null) applyMatchesMyColumnWidth(i, matchesMyColWidths[i]);
        }
        syncMatchesMyTableLayoutWidth();
      }

      function onMatchesMyResizeMove(e) {
        if (!matchesMyResizeState) return;
        var delta = e.clientX - matchesMyResizeState.startX;
        applyMatchesMyColumnWidth(matchesMyResizeState.index, matchesMyResizeState.startWidth + delta);
      }

      function onMatchesMyResizeUp() {
        if (!matchesMyResizeState) return;
        matchesMyResizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try {
          localStorage.setItem(userMatchesMyColWidthKey(), JSON.stringify(matchesMyColWidths || {}));
        } catch (e) {}
      }

      function ensureMatchesMyResizeGlobals() {
        if (matchesMyResizeGlobalsBound) return;
        matchesMyResizeGlobalsBound = true;
        document.addEventListener("mousemove", onMatchesMyResizeMove);
        document.addEventListener("mouseup", onMatchesMyResizeUp);
      }

      function initMatchesMyColumnResizeHandles() {
        var row = document.getElementById("dg-matches-my-thead-row");
        if (!row) return;
        ensureMatchesMyResizeGlobals();
        var ths = Array.prototype.slice.call(row.querySelectorAll("th"));
        ths.forEach(function (th, index) {
          if (index >= MATCHES_MY_COL_COUNT) return;
          if (th.getAttribute("data-dg-matches-my-resize-ready") === "1") return;
          th.setAttribute("data-dg-matches-my-resize-ready", "1");
          th.style.position = "relative";
          var handle = document.createElement("span");
          handle.className = "dg-matches-my-resize-handle";
          handle.setAttribute("role", "separator");
          handle.setAttribute("aria-orientation", "vertical");
          handle.title = "Потяните, чтобы изменить ширину колонки";
          handle.style.cssText =
            "position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:4;" +
            "background:linear-gradient(to right,transparent 47%,#d9dee5 47%,#d9dee5 53%,transparent 53%);opacity:0.55";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var col = document.querySelector("#dg-matches-my-main-table col.dg-matches-my-col-" + index);
            var cur = col && col.style.width ? parseInt(col.style.width, 10) : 0;
            if (!Number.isFinite(cur) || cur <= 0) cur = MATCHES_MY_COL_DEFAULTS[index];
            var rect = th.getBoundingClientRect();
            var w0 = rect && rect.width ? Math.round(rect.width) : cur;
            matchesMyResizeState = {
              index: index,
              startX: ev.clientX,
              startWidth:
                Number(matchesMyColWidths[index]) > 0 ? Number(matchesMyColWidths[index]) : w0 || cur,
            };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          handle.addEventListener("click", function (ev) {
            ev.stopPropagation();
          });
          th.appendChild(handle);
        });
      }

      function getMatchesMyStickyTopPx() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        if (!fixed) return 0;
        if (!header || !header.getBoundingClientRect) return 60;
        var rect = header.getBoundingClientRect();
        var h = rect && rect.height ? rect.height : 60;
        return h > 0 ? h : 60;
      }

      function captureMatchesMyTheadBaseTop() {
        var thead = document.getElementById("dg-matches-my-thead");
        if (!thead) return;
        thead.style.transform = "";
        thead.style.position = "";
        thead.style.zIndex = "";
        thead.style.willChange = "";
        thead.removeAttribute("data-dg-floating");
        var rect = thead.getBoundingClientRect();
        var absTop = (window.scrollY || window.pageYOffset || 0) + (rect && rect.top ? rect.top : 0);
        thead.setAttribute("data-dg-base-top", String(absTop));
      }

      function updateMatchesMyFloatingHeaderFallback() {
        var thead = document.getElementById("dg-matches-my-thead");
        if (!thead) return;
        var table = thead.closest("table");
        if (!table || !table.getBoundingClientRect) return;
        var row = thead.querySelector("tr");
        if (!row) return;

        var y = window.scrollY || window.pageYOffset || 0;
        var headerTop = getMatchesMyStickyTopPx();

        var baseTopAbs = Number(thead.getAttribute("data-dg-base-top") || 0);
        if (!Number.isFinite(baseTopAbs) || baseTopAbs <= 0) return;
        var tableRect = table.getBoundingClientRect();
        var tableBottom = tableRect.bottom + y;
        var rowRect = row.getBoundingClientRect();
        var rowHeight = rowRect && rowRect.height ? rowRect.height : 0;

        var headerLine = y + headerTop;
        var start = baseTopAbs + FLOATING_MY_START_EPS_PX;
        var end = tableBottom - rowHeight;
        if (headerLine <= start || headerLine >= end) {
          if (thead.style.transform) {
            thead.style.transform = "";
            thead.style.position = "";
            thead.style.zIndex = "";
            thead.style.willChange = "";
            thead.removeAttribute("data-dg-floating");
          }
          return;
        }

        var zoomAwareOffset = FLOATING_MY_OFFSET_PX;
        var dpr = window.devicePixelRatio || 1;
        if (Math.abs(dpr - 1) < 0.03) zoomAwareOffset = FLOATING_MY_OFFSET_PX - 3;
        var shift = Math.max(0, headerLine - start - zoomAwareOffset);
        var shiftPx = Number(shift.toFixed(3));
        var nextTransform = "translate3d(0," + shiftPx + "px,0)";
        if (thead.style.transform !== nextTransform) {
          thead.style.transform = nextTransform;
          thead.style.position = "relative";
          thead.style.zIndex = "25";
          thead.style.willChange = "transform";
          thead.setAttribute("data-dg-floating", "1");
        }
      }

      function matchesMyFloatingHeaderTick(ts) {
        matchesMyFloatingRaf = 0;
        updateMatchesMyFloatingHeaderFallback();
        if (ts - matchesMyFloatingLastScrollTs < 140) {
          matchesMyFloatingRaf = requestAnimationFrame(matchesMyFloatingHeaderTick);
        }
      }

      function scheduleMatchesMyFloatingHeaderUpdate() {
        matchesMyFloatingLastScrollTs = performance.now();
        if (matchesMyFloatingRaf) return;
        matchesMyFloatingRaf = requestAnimationFrame(matchesMyFloatingHeaderTick);
      }

      function onScrollMatchesMyFloatingHeader() {
        scheduleMatchesMyFloatingHeaderUpdate();
      }

      function matchesMyRefreshFloatingAfterLayout() {
        requestAnimationFrame(function () {
          captureMatchesMyTheadBaseTop();
          scheduleMatchesMyFloatingHeaderUpdate();
        });
      }

      function ensureMatchesMyScrollAndResizeBound() {
        if (matchesMyScrollGlobalsBound) return;
        matchesMyScrollGlobalsBound = true;
        window.addEventListener("scroll", onScrollMatchesMyFloatingHeader, { passive: true });
        window.addEventListener("resize", function () {
          matchesMyRefreshFloatingAfterLayout();
        });
        var mainOuter = document.querySelector(".app-main__outer");
        if (mainOuter && mainOuter.addEventListener) {
          mainOuter.addEventListener("scroll", onScrollMatchesMyFloatingHeader, { passive: true });
        }
        var horiz = document.querySelector(".dg-matches-my-table-scroll-outer");
        if (horiz && horiz.addEventListener) {
          horiz.addEventListener("scroll", onScrollMatchesMyFloatingHeader, { passive: true });
        }
      }

      function setupMatchesMyProductsTableChrome() {
        ensureMatchesMyScrollAndResizeBound();
        applyStoredMatchesMyColWidths();
        initMatchesMyColumnResizeHandles();
        matchesMyRefreshFloatingAfterLayout();
      }

      function renderMyProducts() {
        updateMyProductsHints();
        var tbody = document.getElementById("dg-matches-my-products-tbody");
        tbody.replaceChildren();
        var sel = selectedSet();
        var myProductsColSpan = 7;
        if (state.loadingProducts) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.colSpan = myProductsColSpan;
          td.className = "text-muted text-center";
          td.textContent = "Загрузка...";
          tr.appendChild(td);
          tbody.appendChild(tr);
          setupMatchesMyProductsTableChrome();
          return;
        }
        if (!state.myProducts.length) {
          var tr0 = document.createElement("tr");
          var td0 = document.createElement("td");
          td0.colSpan = myProductsColSpan;
          td0.className = "text-muted text-center";
          td0.textContent = "Нет товаров";
          tr0.appendChild(td0);
          tbody.appendChild(tr0);
          setupMatchesMyProductsTableChrome();
          return;
        }
        state.myProducts.forEach(function (p) {
          var tr = document.createElement("tr");
          var td0 = document.createElement("td");
          td0.className = "text-center align-middle";
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = !!sel[p.id];
          cb.addEventListener("change", function () {
            var set = {};
            state.selectedProductIds.forEach(function (id) {
              set[id] = true;
            });
            if (cb.checked) set[p.id] = true;
            else delete set[p.id];
            state.selectedProductIds = Object.keys(set).map(Number);
            updateMyProductsHints();
          });
          td0.appendChild(cb);
          tr.appendChild(td0);
          var tdCode = document.createElement("td");
          tdCode.className = "text-center";
          var codeStr = String(p.source_id != null ? p.source_id : "").trim();
          tdCode.textContent = codeStr ? codeStr : p.id != null ? String(p.id) : "—";
          tr.appendChild(tdCode);
          ["sku", "name"].forEach(function (k) {
            var td = document.createElement("td");
            td.className = "text-center";

      function filteredSortedMatches() {
        var term = String(document.getElementById("dg-matches-smart-filter").value || "")
          .trim()
          .toLowerCase();
        var matches = state.matches;
        var filtered =
          !term
            ? matches
            : matches.filter(function (m) {
                var hay = [
                  m.status,
                  m.match_type,
                  m.my_sku,
                  m.my_product_name,
                  m.competitor_sku,
                  m.competitor_name,
                  m.confirmed_by,
                  m.unlinked_by,
                ]
                  .map(function (x) {
                    return String(x || "").toLowerCase();
                  })
                  .join(" ");
                return hay.indexOf(term) !== -1;
              });
        var tf = readTableFilters();
        var byColumns = filtered.filter(function (m) {
          if (tf.my_sku && String(m.my_sku || "").toLowerCase().indexOf(String(tf.my_sku).trim().toLowerCase()) === -1)
            return false;
          if (
            tf.competitor_sku &&
            String(m.competitor_sku || "").toLowerCase().indexOf(String(tf.competitor_sku).trim().toLowerCase()) === -1
          )
            return false;
          if (tf.match_type !== "all" && String(m.match_type || "").toLowerCase() !== String(tf.match_type).toLowerCase())
            return false;
          if (tf.status !== "all" && String(m.status || "").toLowerCase() !== String(tf.status).toLowerCase()) return false;
          var pct = Number(m.confidence_score || 0) * 100;
          var min = Number(tf.confidence_min || "");
          var max = Number(tf.confidence_max || "");
          if (Number.isFinite(min) && String(tf.confidence_min).trim() !== "" && pct < min) return false;
          if (Number.isFinite(max) && String(tf.confidence_max).trim() !== "" && pct > max) return false;
          return true;
        });
        var dir = state.matchesSortDir === "asc" ? 1 : -1;
        var sortBy = state.matchesSortBy;
        return byColumns.slice().sort(function (a, b) {
          if (sortBy === "confidence") {
            return (Number(a.confidence_score || 0) - Number(b.confidence_score || 0)) * dir;
          }
          var av = String(a[sortBy] || "");
          var bv = String(b[sortBy] || "");
          return av.localeCompare(bv, "ru", { sensitivity: "base" }) * dir;
        });
      }

      var MATCHES_COL_DEFAULTS = [140, 120, 104, 328, 328, 352];
      var matchesColWidths = {};

      function userMatchesColWidthKey() {
        try {

      function syncMatchesTableLayoutWidth() {
        var tbl = document.getElementById("dg-matches-list-table");
        if (!tbl) return;
        var sum = 0;
        for (var i = 0; i < 6; i++) {
          var w = matchesColWidths[i];
          if (!Number.isFinite(w) || w <= 0) w = MATCHES_COL_DEFAULTS[i];
          sum += w;
        }
        tbl.style.width = sum + "px";
        tbl.style.minWidth = sum + "px";
      }

      function applyMatchesColumnWidth(index, widthPx) {
        var w = Math.max(60, Math.min(900, Math.round(Number(widthPx) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        matchesColWidths[index] = w;
        var col = document.querySelector("#dg-matches-list-table col.dg-matches-col-" + index);
        if (col) col.style.width = w + "px";
        var headRow = document.querySelector("#dg-matches-list-table thead tr");
        if (headRow && headRow.cells && headRow.cells[index]) {
          var th = headRow.cells[index];
          th.style.boxSizing = "border-box";
          th.style.width = w + "px";
          th.style.minWidth = w + "px";
          th.style.maxWidth = w + "px";
        }
        var tb = document.getElementById("dg-matches-tbody");
        if (tb) {
          Array.prototype.forEach.call(tb.rows || [], function (tr) {
            if (!tr.cells || !tr.cells[index] || tr.cells[index].colSpan > 1) return;
            var c = tr.cells[index];
            c.style.boxSizing = "border-box";
            c.style.width = w + "px";
            c.style.minWidth = w + "px";
            c.style.maxWidth = w + "px";
          });
        }
        syncMatchesTableLayoutWidth();
      }

      function applyStoredMatchesColWidths() {
        try {
          var raw = localStorage.getItem(userMatchesColWidthKey());
          if (raw) matchesColWidths = JSON.parse(raw) || {};
        } catch (e) {
          matchesColWidths = {};
        }
        for (var i = 0; i < 6; i++) {
          if (matchesColWidths[i] != null) applyMatchesColumnWidth(i, matchesColWidths[i]);
        }
        syncMatchesTableLayoutWidth();
      }

      function onMatchesResizeMove(e) {
        if (!matchesResizeState) return;
        var delta = e.clientX - matchesResizeState.startX;
        applyMatchesColumnWidth(matchesResizeState.index, matchesResizeState.startWidth + delta);
      }

      function onMatchesResizeUp() {
        if (!matchesResizeState) return;
        matchesResizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try {
          localStorage.setItem(userMatchesColWidthKey(), JSON.stringify(matchesColWidths || {}));
        } catch (e) {}
      }

      function ensureMatchesResizeGlobals() {
        if (matchesResizeGlobalsBound) return;
        matchesResizeGlobalsBound = true;
        document.addEventListener("mousemove", onMatchesResizeMove);
        document.addEventListener("mouseup", onMatchesResizeUp);
      }

      function initMatchesColumnResizeHandles() {
        var row = document.querySelector("#dg-matches-list-table thead tr");
        if (!row) return;
        ensureMatchesResizeGlobals();
        var ths = Array.prototype.slice.call(row.querySelectorAll("th"));
        ths.forEach(function (th, index) {
          if (index >= 6) return;
          if (th.getAttribute("data-dg-matches-resize-ready") === "1") return;
          th.setAttribute("data-dg-matches-resize-ready", "1");
          th.style.position = "relative";
          var handle = document.createElement("span");
          handle.className = "dg-matches-resize-handle";
          handle.setAttribute("role", "separator");
          handle.setAttribute("aria-orientation", "vertical");
          handle.title = "Потяните, чтобы изменить ширину колонки";
          handle.style.cssText =
            "position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:4;" +
            "background:linear-gradient(to right,transparent 47%,#d9dee5 47%,#d9dee5 53%,transparent 53%);opacity:0.55";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var col = document.querySelector("#dg-matches-list-table col.dg-matches-col-" + index);
            var cur = col && col.style.width ? parseInt(col.style.width, 10) : 0;
            if (!Number.isFinite(cur) || cur <= 0) cur = MATCHES_COL_DEFAULTS[index];
            var rect = th.getBoundingClientRect();
            var w0 = rect && rect.width ? Math.round(rect.width) : cur;
            matchesResizeState = {
              index: index,
              startX: ev.clientX,
              startWidth: Number(matchesColWidths[index]) > 0 ? Number(matchesColWidths[index]) : w0 || cur,
            };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          handle.addEventListener("click", function (ev) {
            ev.stopPropagation();
          });
          th.appendChild(handle);
        });
      }

        if (status === "confirmed") return { icon: "pe-7s-check", badge: "success", label: "Подтверждено" };

      function scoreUi(matchType, score) {
        if (String(matchType || "").toLowerCase() === "sku") return { text: "100% (по SKU)", badge: "success" };
        var pct = Math.round(Number(score || 0) * 100);
        if (pct >= 90) return { text: pct + "%", badge: "success" };
        if (pct >= 70) return { text: pct + "%", badge: "warning" };
        return { text: pct + "%", badge: "secondary" };
      }

      function effectiveMatchTypeForScore(m, score) {
        var t = String(m.match_type || "")

        return Math.abs(Number(score) - 1) < 1e-6 ? "sku" : "name";

        if (mt === "name") {
          if (mm === "all") return "Название · из «все поля»";
          return "По названию";

        if (mt === "sku") {
          if (mm === "sku_norm") return "SKU · нормализация";
          if (mm === "sku_best") return "SKU · норм. + строка";
          if (mm === "all") return "SKU · строго («все поля»)";
          return "SKU · строго";
        }
        return mt;

      function loadMyProducts() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) {
          state.myProducts = [];
          state.myProductsTotal = 0;
          renderMyProducts();
          return;
        }
        state.loadingProducts = true;
        renderMyProducts();
        var offset = (state.myProductsPage - 1) * PRODUCTS_LIMIT;
        var q = new URLSearchParams({
          my_site_id: mySiteId,
          limit: String(PRODUCTS_LIMIT),
          offset: String(offset),
        });
        var ps = String(document.getElementById("dg-matches-product-search").value || "").trim();
        if (ps) q.set("search", ps);
        fetch("/api/matches/my-products?" + q.toString(), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки товаров");
            state.myProducts = Array.isArray(x.j.data) ? x.j.data : [];
            state.myProductsTotal = Number(x.j.total || 0);
          })
          .catch(function (e) {
            alert(e.message || "Не удалось загрузить товары");
            state.myProducts = [];
            state.myProductsTotal = 0;
          })
          .then(function () {
            state.loadingProducts = false;
            renderMyProducts();
          });
      }

      function loadMatches(silent) {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) {
          state.matches = [];
          state.matchesTotal = 0;
          renderMatchesTable();
          return;
        }
        var showLoader = !silent;
        if (showLoader) {
          state.loadingMatches = true;
          renderMatchesTable();
        }
        var offset = (state.matchesPage - 1) * state.matchesLimit;
        var q = new URLSearchParams({
          my_site_id: mySiteId,
          limit: String(state.matchesLimit),
          offset: String(offset),
        });
        var sf = document.getElementById("dg-matches-status-filter").value;
        if (sf !== "all") q.set("status", sf);
        var fetchOpts = { credentials: "same-origin" };
        try {
          if (typeof AbortSignal !== "undefined" && AbortSignal.timeout) fetchOpts.signal = AbortSignal.timeout(120000);
        } catch (eSig) {}
        fetch("/api/matches/list?" + q.toString(), fetchOpts)
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки совпадений");
            state.matches = Array.isArray(x.j.data) ? x.j.data : [];
            state.matchesTotal = Number(x.j.total || 0);
          })
          .catch(function (e) {
            if (e && (e.name === "AbortError" || /aborted|timeout/i.test(String(e.message || ""))))
              alert(
                "Сервер не ответил за 2 минуты при загрузке совпадений. Частая причина — долгие операции с индексами в БД; перезапустите сервер и откройте страницу снова."
              );
            else alert(e.message || "Не удалось загрузить сопоставления");
            state.matches = [];
            state.matchesTotal = 0;
          })
          .then(function () {
            if (showLoader) state.loadingMatches = false;
            renderMatchesTable();
            scheduleSyncUrl();
            persistMatchesListFilterForm();
          });
      }

      function loadStatus() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return;
        fetch("/api/matches/status?my_site_id=" + encodeURIComponent(mySiteId), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) return;
            var json = x.j;
            if (json.active) state.jobDoneReloaded = false;
            state.jobStatus = {
              active: !!json.active,
              done: !!json.done,
              message: json.message || "",
              processed: Number(json.processed || 0),
              total: Number(json.total || 0),
              foundSku: Number(json.foundSku || 0),
              foundName: Number(json.foundName || 0),
              logs: Array.isArray(json.logs) ? json.logs : [],
              canRetry: !!json.canRetry,
            };
            updateJobUi();
            if (json.done && !state.jobDoneReloaded) {
              state.jobDoneReloaded = true;
              loadMatches(true);
            }
          })
          .catch(function () {});
      }

      function startStatusPoll() {
        stopStatusPoll();
        loadStatus();
        state.statusTimer = setInterval(loadStatus, 1500);
      }
      function stopStatusPoll() {
        if (state.statusTimer) {
          clearInterval(state.statusTimer);
          state.statusTimer = null;
        }
      }

      function runMatching(payload) {
        fetch("/api/matches/start-matching", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось запустить сопоставление");
            alert("Сопоставление запущено");
            return loadStatus();
          })
          .catch(function (e) {
            alert(e.message || "Ошибка запуска сопоставления");
          });
      }

      function onRunSelected() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        if (!state.competitorIds.length) return alert("Выберите конкурентов");
        if (!state.selectedProductIds.length) return alert("Выберите товары");
        runMatching({
          mySiteId: Number(mySiteId),
          competitorIds: state.competitorIds.map(Number),
          mode: document.getElementById("dg-matches-search-mode").value,
          productIds: state.selectedProductIds,
          batchSize: Number(document.getElementById("dg-matches-batch-size").value || 200),
          microPauseMs: Number(document.getElementById("dg-matches-micro-pause").value || 20),
          batchPauseMs: Number(document.getElementById("dg-matches-batch-pause").value || 1000),
        });
      }

      function onRunAuto() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        if (!state.competitorIds.length) return alert("Выберите конкурентов");
        runMatching({
          mySiteId: Number(mySiteId),
          competitorIds: state.competitorIds.map(Number),
          mode: document.getElementById("dg-matches-search-mode").value,
          productSearch: String(document.getElementById("dg-matches-product-search").value || "").trim(),
          batchSize: Number(document.getElementById("dg-matches-batch-size").value || 200),
          microPauseMs: Number(document.getElementById("dg-matches-micro-pause").value || 20),
          batchPauseMs: Number(document.getElementById("dg-matches-batch-pause").value || 1000),
        });
      }

      function onRetryLast() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        fetch("/api/matches/retry-last", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mySiteId: Number(mySiteId),
            competitorIds: state.competitorIds.map(Number),
            mode: document.getElementById("dg-matches-search-mode").value,
            productSearch: String(document.getElementById("dg-matches-product-search").value || "").trim(),
            batchSize: Number(document.getElementById("dg-matches-batch-size").value || 200),
            microPauseMs: Number(document.getElementById("dg-matches-micro-pause").value || 20),
            batchPauseMs: Number(document.getElementById("dg-matches-batch-pause").value || 1000),
          }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось повторить задачу");
            alert("Повтор запущен (из задачи #" + x.j.replayFrom + ")");
            return loadStatus();
          })
          .catch(function (e) {
            alert(e.message || "Ошибка повтора");
          });
      }

      function onStop() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        fetch("/api/matches/stop", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mySiteId: Number(mySiteId) }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось остановить задачу");
            alert("Остановка запрошена");
            return loadStatus();
          })
          .catch(function (e) {
            alert(e.message || "Ошибка остановки");
          });
      }

      function updateMatch(id, action) {
        var endpoint =
          action === "confirmed"
            ? "/api/matches/confirm"
            : action === "unlink"
              ? "/api/matches/unlink"
              : "/api/matches/reject";
        fetch(endpoint, {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: id }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось обновить статус");
            loadMatches(true);
          })
          .catch(function (e) {
            alert(e.message || "Ошибка обновления статуса");
          });
      }

      function onSortMatches(field) {
        if (state.matchesSortBy === field) state.matchesSortDir = state.matchesSortDir === "asc" ? "desc" : "asc";
        else {
          state.matchesSortBy = field;
          state.matchesSortDir = field === "confidence" ? "desc" : "asc";
        }
        renderMatchesTable();
      }

      function onMySiteChanged(resetPages) {
        if (resetPages) {
          state.myProductsPage = 1;
          state.matchesPage = 1;
          state.selectedProductIds = [];
          state.jobDoneReloaded = false;
        }
        scheduleSyncUrl();
        loadMyProducts();
        loadMatches();
        stopStatusPoll();
        if (document.getElementById("dg-matches-my-site").value) startStatusPoll();
        renderMyProducts();
      }

      document.getElementById("dg-matches-my-site").addEventListener("change", function () {
        onMySiteChanged(true);
      });
      document.getElementById("dg-matches-product-search").addEventListener("input", function () {
        scheduleSyncUrl();
        loadMyProducts();
      });
      document.getElementById("dg-matches-search-mode").addEventListener("change", scheduleSyncUrl);
      (function initMatchesFilterLogicToggle() {
        var btn = document.getElementById("dg-matches-filter-logic-toggle");
        var panel = document.getElementById("dg-matches-filter-logic");
        if (!btn || !panel) return;
        btn.addEventListener("click", function () {
          var show = panel.classList.contains("d-none");
          panel.classList.toggle("d-none", !show);
          btn.setAttribute("aria-expanded", show ? "true" : "false");
        });
      })();

      (function initMatchesModeHintToggle() {
        var btn = document.getElementById("dg-matches-mode-hint-toggle");
        var panel = document.getElementById("dg-matches-mode-hint");
        if (!btn || !panel) return;
        btn.addEventListener("click", function () {
          var show = panel.classList.contains("d-none");
          panel.classList.toggle("d-none", !show);
          btn.setAttribute("aria-expanded", show ? "true" : "false");
        });
      })();

      (function matchesMyProductsManualCollapse() {
        var body = document.getElementById("dg-matches-my-products-body");
        var btn = document.getElementById("dg-matches-my-products-toggle");
        if (!body || !btn) return;
        function apply() {
          try {
            var c = localStorage.getItem(MATCHES_MY_PRODUCTS_MANUAL_COLLAPSE_KEY) === "1";
            if (c) {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
          matchesMyRefreshFloatingAfterLayout();
        }
        try {
          if (localStorage.getItem(MATCHES_MY_PRODUCTS_MANUAL_COLLAPSE_KEY) === "1") body.style.display = "none";
        } catch (e2) {}
        apply();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(MATCHES_MY_PRODUCTS_MANUAL_COLLAPSE_KEY, hidden ? "0" : "1");
          } catch (e3) {}
          matchesMyRefreshFloatingAfterLayout();
        });
      })();
      document.getElementById("dg-matches-status-filter").addEventListener("change", function () {
        scheduleSyncUrl();
      });
      document.getElementById("dg-matches-limit").addEventListener("change", function () {
        state.matchesLimit = Number(this.value) || 100;
        scheduleSyncUrl();
      });
      document.getElementById("dg-matches-my-prev").addEventListener("click", function () {
        if (state.myProductsPage > 1) {
          state.myProductsPage--;
          loadMyProducts();
        }
      });
      document.getElementById("dg-matches-my-next").addEventListener("click", function () {
        if (state.myProductsPage < myProductsPages()) {
          state.myProductsPage++;
          loadMyProducts();
        }
      });
      document.getElementById("dg-matches-prev").addEventListener("click", function () {
        if (state.matchesPage > 1) {
          state.matchesPage--;
          loadMatches();
        }
      });
      document.getElementById("dg-matches-next").addEventListener("click", function () {
        if (state.matchesPage < matchesPages()) {
          state.matchesPage++;
          loadMatches();
        }
      });
      document.getElementById("dg-matches-my-select-all").addEventListener("change", function (e) {
        var checked = e.target.checked;
        var set = {};
        state.selectedProductIds.forEach(function (id) {
          set[id] = true;
        });
        state.myProducts.forEach(function (p) {
          if (checked) set[p.id] = true;
          else delete set[p.id];
        });
        state.selectedProductIds = Object.keys(set).map(Number);
        renderMyProducts();
      });
      document.getElementById("dg-matches-run-selected").addEventListener("click", onRunSelected);
      document.getElementById("dg-matches-run-auto").addEventListener("click", onRunAuto);
      document.getElementById("dg-matches-retry").addEventListener("click", onRetryLast);
      document.getElementById("dg-matches-stop").addEventListener("click", onStop);
      document.getElementById("dg-matches-copy-link").addEventListener("click", function () {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(
            function () {
              alert("Ссылка скопирована");
            },
            function () {
              alert("Не удалось скопировать ссылку");
            }
          );
        } else {
          alert("Не удалось скопировать ссылку");
        }
      });
      document.getElementById("dg-matches-smart-filter").addEventListener("input", function () {
        scheduleSyncUrl();
      });
      [
        "dg-matches-tf-my-sku",
        "dg-matches-tf-comp-sku",
        "dg-matches-tf-match-type",
        "dg-matches-tf-status",
        "dg-matches-tf-conf-min",
        "dg-matches-tf-conf-max",
      ].forEach(function (id) {
        var el = document.getElementById(id);
        el.addEventListener("input", function () {
          scheduleSyncUrl();
        });
        el.addEventListener("change", function () {
          scheduleSyncUrl();
        });
      });
      document.getElementById("dg-matches-filters-apply").addEventListener("click", function () {
        state.matchesPage = 1;
        persistMatchesListFilterForm();
        loadMatches();
      });
      document.getElementById("dg-matches-filters-default").addEventListener("click", function () {
        if (window.DatagonMatchesListFilterBlocks && window.DatagonMatchesListFilterBlocks.reset) window.DatagonMatchesListFilterBlocks.reset();
        if (window.DatagonFilters) window.DatagonFilters.clear("matches_list");
        document.getElementById("dg-matches-smart-filter").value = "";
        document.getElementById("dg-matches-status-filter").value = "pending";
        state.matchesLimit = 100;
        document.getElementById("dg-matches-limit").value = "100";
        document.getElementById("dg-matches-tf-my-sku").value = "";
        document.getElementById("dg-matches-tf-comp-sku").value = "";
        document.getElementById("dg-matches-tf-match-type").value = "all";
        document.getElementById("dg-matches-tf-status").value = "all";
        document.getElementById("dg-matches-tf-conf-min").value = "";
        document.getElementById("dg-matches-tf-conf-max").value = "";
        state.matchesPage = 1;
        scheduleSyncUrl();
        loadMatches();
      });
      document.querySelectorAll("th[data-match-sort]").forEach(function (th) {
        th.addEventListener("click", function (ev) {
          if (ev.target && ev.target.closest && ev.target.closest(".dg-matches-resize-handle")) return;
          onSortMatches(th.getAttribute("data-match-sort"));
        });
      });
      setupMatchesListTableChrome();
      ensureMatchesMyScrollAndResizeBound();

      (function matchesLaunchFilterFieldVisibility() {
        var FIELD_GROUPS = [
          {
            title: "Параметры",
            subtitle: "",
            items: [
              { key: "smart", title: "Умный поиск", hint: "" },
              { key: "my_site", title: "Мой сайт", hint: "" },
              { key: "search_mode", title: "Режим сопоставления", hint: "" },
              { key: "batch_size", title: "Размер пакета", hint: "" },
              { key: "micro_pause", title: "Микропауза", hint: "" },
              { key: "batch_pause", title: "Пауза между пакетами", hint: "" },
            ],
          },
          {
            title: "Конкуренты и действия",
            subtitle: "",
            items: [
              { key: "competitors", title: "Блок конкурентов", hint: "" },
              { key: "launch_actions", title: "Кнопки запуска / ссылка", hint: "" },
            ],
          },
        ];
        if (window.DatagonFilterFieldsVisibility && window.DatagonFilterFieldsVisibility.init) {
          window.DatagonFilterFieldsVisibility.init({
            storageKeyPrefix: "datagon_matches_launch_filter_fields_v2",
            attr: "data-dg-matches-launch-field",
            fieldGroups: FIELD_GROUPS,
            togglesRootId: "dg-matches-launch-filter-blocks-toggles",
            idPrefix: "dg-matches-launch-ff-",
            exposeAs: "DatagonMatchesLaunchFilterBlocks",
            onAfterApply: matchesMyRefreshFloatingAfterLayout,
          });
        }
      })();

      (function matchesListFilterFieldVisibility() {
        var FIELD_GROUPS = [
          {
            title: "Фильтры списка",
            subtitle: "",
            items: [
              { key: "smart", title: "Умный фильтр", hint: "" },
              { key: "status", title: "Статус", hint: "" },
              { key: "limit", title: "Лимит", hint: "" },
              { key: "tf_my_sku", title: "Мой SKU", hint: "" },
              { key: "tf_comp_sku", title: "SKU конк.", hint: "" },
              { key: "tf_match_type", title: "Тип совпадения", hint: "" },
              { key: "tf_status", title: "Статус в списке", hint: "" },
              { key: "tf_conf_min", title: "Схож. от %", hint: "" },
              { key: "tf_conf_max", title: "Схож. до %", hint: "" },
            ],
          },
          {
            title: "Действия",
            subtitle: "",
            items: [{ key: "list_actions", title: "«Применить» и «По умолчанию»", hint: "" }],
          },
        ];
        if (window.DatagonFilterFieldsVisibility && window.DatagonFilterFieldsVisibility.init) {
          window.DatagonFilterFieldsVisibility.init({
            storageKeyPrefix: "datagon_matches_list_filter_fields_v2",
            attr: "data-dg-matches-list-field",
            fieldGroups: FIELD_GROUPS,
            togglesRootId: "dg-matches-list-filter-blocks-toggles",
            idPrefix: "dg-matches-list-ff-",
            exposeAs: "DatagonMatchesListFilterBlocks",
            onAfterApply: matchesMyRefreshFloatingAfterLayout,
          });
        }
      })();

      Promise.all([
        fetch("/api/my-sites", { credentials: "same-origin" }).then(function (r) {
          return r.json().then(function (j) {
            return { r: r, j: j };
          });
        }),
        fetch("/api/projects", { credentials: "same-origin" }).then(function (r) {
          return r.json().then(function (j) {
            return { r: r, j: j };
          });
        }),
      ])
        .then(function (arr) {
          if (!arr[0].r.ok) throw new Error("Не удалось загрузить мои сайты");
          if (!arr[1].r.ok) throw new Error("Не удалось загрузить конкурентов");
          state.mySites = Array.isArray(arr[0].j) ? arr[0].j : [];
          state.competitors = Array.isArray(arr[1].j) ? arr[1].j : [];
          fillMySitesSelect();
          renderCompetitors();
          var up = parseUrlParams();
          var sel = document.getElementById("dg-matches-my-site");
          if (up.my_site_id && [].some.call(sel.options, function (o) { return o.value === String(up.my_site_id); })) {
            sel.value = String(up.my_site_id);
          } else if (state.mySites.length) {
            sel.value = String(state.mySites[0].id);
          }
          if (up.status && ["pending", "confirmed", "rejected", "all"].indexOf(up.status) !== -1)
            document.getElementById("dg-matches-status-filter").value = up.status;
          if (up.mode && MATCH_MODES_ALLOWED[up.mode])
            document.getElementById("dg-matches-search-mode").value = up.mode;
          if (up.product_search) document.getElementById("dg-matches-product-search").value = up.product_search;
          if (Number.isFinite(up.matches_page) && up.matches_page > 0) state.matchesPage = up.matches_page;
          if ([50, 100, 200].indexOf(up.matches_limit) !== -1) {
            state.matchesLimit = up.matches_limit;
            document.getElementById("dg-matches-limit").value = String(up.matches_limit);
          }
          mergeMatchesListPrefsFromStorage();
          showErr("");
          syncUrlFromState();
          onMySiteChanged(false);
        })
        .catch(function (e) {
          showErr(e.message || "Ошибка загрузки справочников");
        });
    })();
  </script>
