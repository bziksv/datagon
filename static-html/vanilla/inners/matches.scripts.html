  <script>
    (function () {
      var PRODUCTS_LIMIT = 50;
      var MATCHES_MY_PRODUCTS_MANUAL_COLLAPSE_KEY = "datagon_matches_my_products_manual_collapsed_v1";
      var MATCHES_STEP_LAUNCH_COLLAPSE_KEY = "datagon_matches_step_launch_collapsed_v1";
      var MATCHES_STEP_LIST_COLLAPSE_KEY = "datagon_matches_step_list_collapsed_v1";
      var MATCHES_STEP_MANUAL_COLLAPSE_KEY = "datagon_matches_step_manual_collapsed_v1";
      var MATCHES_STEP_ARCHIVE_COLLAPSE_KEY = "datagon_matches_step_archive_collapsed_v1";
      var MATCHES_WORKFLOW_PANEL_OPEN_KEY = "datagon_matches_workflow_panel_open_v1";
      var MATCHES_WORKFLOW_TEXT_1_KEY = "datagon_matches_workflow_text1_collapsed_v1";
      var MATCHES_WORKFLOW_TEXT_2_KEY = "datagon_matches_workflow_text2_collapsed_v1";
      var MATCHES_WORKFLOW_TEXT_3_KEY = "datagon_matches_workflow_text3_collapsed_v1";
      var MATCHES_WORKFLOW_TEXT_4_KEY = "datagon_matches_workflow_text4_collapsed_v1";

      function formatNumber(value) {
        return Number(value || 0).toLocaleString("ru-RU");
      }
      function ruRecordsWord(n) {
        var v = Math.floor(Number(n) || 0);
        var x = Math.abs(v) % 100;
        var x1 = x % 10;
        if (x > 10 && x < 20) return "записей";
        if (x1 === 1) return "запись";
        if (x1 >= 2 && x1 <= 4) return "записи";
        return "записей";
      }
      function formatDateTime(value) {
        if (!value) return "-";
        var d = new Date(value);
        if (isNaN(d.getTime())) return "-";
        return d.toLocaleString("ru-RU");
      }
      function buildSiteUrl(raw) {
        var v = String(raw || "").trim();
        if (!v) return "";
        if (/^https?:\/\//i.test(v)) return v;
        if (!/[a-z0-9-]+\.[a-z]{2,}/i.test(v)) return "";
        return "https://" + v;
      }
      function normalizeWebasystProductUrl(rawUrl, domainRaw, cmsType) {
        var direct = buildSiteUrl(rawUrl);
        var base = buildSiteUrl(domainRaw);
        var isWebasyst = String(cmsType || "").toLowerCase() === "webasyst";
        function rewrite(u, allowMultiSegment) {
          var pathRaw = String(u.pathname || "/");
          var pathLower = pathRaw.toLowerCase();
          if (pathLower.indexOf("/webasyst/") >= 0) return null;
          if (pathLower.startsWith("/search")) return null;
          if (pathLower.startsWith("/product/")) {
            if (!pathRaw.endsWith("/")) u.pathname = pathRaw + "/";
            return u.toString();
          }
          var slug = pathRaw.replace(/^\/+/, "").replace(/\/+$/, "");
          if (!slug) return u.toString();
          if (slug.indexOf("/") >= 0) {
            if (!allowMultiSegment) return null;
            var parts = slug.split("/").filter(Boolean);
            var last = parts[parts.length - 1];
            if (!last) return u.toString();
            u.pathname = "/product/" + last + "/";
            return u.toString();
          }
          if (/^(search|cart|checkout|login|my|order|tag|brands?|contact|blog)$/i.test(slug)) return null;
          u.pathname = "/product/" + slug + "/";
          return u.toString();
        }
        if (direct) {
          try {
            var u = new URL(direct);
            var out = rewrite(u, isWebasyst);
            return out != null ? out : direct;
          } catch (e) {
            return direct;
          }
        }
        if (!isWebasyst || !base) return "";
        try {
          var u2 = new URL(base);
          var out2 = rewrite(u2, true);
          return out2 != null ? out2 : base;
        } catch (e2) {
          return base;
        }
      }
      /**
       * Fallback витрины Shop-Script: если после normalizeWebasystProductUrl URL всё ещё нет —
       * собираем https://домен/product/{SKU}/ (SKU без символов /, ?, #).
       */
      function buildProductPageUrlFromSlug(domainRaw, skuRaw) {
        var base = buildSiteUrl(domainRaw);
        var sku = String(skuRaw || "").trim();
        if (!base || !sku || /[/?#]/.test(sku)) return "";
        return base.replace(/\/+$/, "") + "/product/" + encodeURIComponent(sku) + "/";
      }
      function buildProductSearchUrl(domainRaw, sku, name) {
        var base = buildSiteUrl(domainRaw);
        if (!base) return "";
        var query = String(sku || "").trim() || String(name || "").trim();
        if (!query) return base;
        return base.replace(/\/$/, "") + "/search/?q=" + encodeURIComponent(query);
      }
      function buildWebasystEditUrl(domainRaw, sourceId, cmsType) {
        var base = buildSiteUrl(domainRaw);
        var id = String(sourceId || "").trim();
        if (!base || !id) return "";
        if (String(cmsType || "").toLowerCase() !== "webasyst") return "";
        return base.replace(/\/$/, "") + "/webasyst/shop/?action=products#/product/" + encodeURIComponent(id) + "/edit/";
      }

      var MATCH_MODES_ALLOWED = { all: 1, name: 1, sku: 1, sku_norm: 1, sku_best: 1 };

      function syncUrlFromState() {
        var params = new URLSearchParams();
        var launchSite = document.getElementById("dg-matches-my-site").value;
        var listSite = document.getElementById("dg-matches-list-my-site").value;
        var statusFilter = document.getElementById("dg-matches-status-filter").value;
        var searchMode = document.getElementById("dg-matches-search-mode").value;
        var productSearch = String(document.getElementById("dg-matches-product-search").value || "").trim();
        var matchesPage = Number(state.matchesPage || 1);
        var matchesLimit = Number(state.matchesLimit || 100);
        if (launchSite) params.set("my_site_id", String(launchSite));
        if (listSite && listSite !== launchSite) params.set("list_my_site_id", String(listSite));
        var listCompEl = document.getElementById("dg-matches-list-competitor");
        var listComp = listCompEl && listCompEl.value ? String(listCompEl.value).trim() : "";
        if (listComp) params.set("list_competitor_id", listComp);
        if (statusFilter && statusFilter !== "pending") params.set("status", statusFilter);
        if (searchMode && searchMode !== "all") params.set("mode", searchMode);
        if (productSearch) params.set("product_search", productSearch);
        if (matchesPage > 1) params.set("matches_page", String(matchesPage));
        if (matchesLimit !== 100) params.set("matches_limit", String(matchesLimit));
        var mqPage = Number(state.manualQueuePage || 1);
        var mqLimit = Number(state.manualQueueLimit || 100);
        if (mqPage > 1) params.set("manual_queue_page", String(mqPage));
        if (mqLimit !== 100) params.set("manual_queue_limit", String(mqLimit));
        var mqReason = String(state.manualQueueReason || "").trim().toLowerCase();
        if (mqReason === "no_match" || mqReason === "rejected") params.set("manual_queue_reason", mqReason);
        var next = params.toString()
          ? window.location.pathname + "?" + params.toString()
          : window.location.pathname;
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      var state = {
        mySites: [],
        competitors: [],
        competitorIds: [],
        myProducts: [],
        myProductsPage: 1,
        myProductsTotal: 0,
        selectedProductIds: [],
        loadingProducts: false,
        matches: [],
        matchesPage: 1,
        matchesLimit: 100,
        matchesTotal: 0,
        loadingMatches: false,
        matchesSortBy: "confidence",
        matchesSortDir: "desc",
        jobStatus: {
          active: false,
          done: false,
          message: "Ожидание",
          processed: 0,
          total: 0,
          foundSku: 0,
          foundName: 0,
          dbFoundSku: 0,
          dbFoundName: 0,
          dbMatchCountsAvailable: false,
          logs: [],
          canRetry: false,
          startedAt: null,
          finishedAt: null,
          stopPending: false,
        },
        jobDoneReloaded: false,
        statusTimer: null,
        /** Подряд неудачных опросов /api/matches/status (сервер занят или недоступен). */
        statusPollFailures: 0,
        urlTick: null,
        /** Последний my_site_id, с которым реально вызывали /api/matches/list (для текста пустой таблицы). */
        lastMatchesQuerySiteId: "",
        /** Очередь ручного сопоставления (шаг 3): пагинация как у списка совпадений. */
        manualQueuePage: 1,
        manualQueueLimit: 100,
        manualQueueTotal: 0,
        /** Шаг 3: фильтр очереди по match_exclusion.reason (пусто = все). */
        manualQueueReason: "",
      };

      var MATCHES_MY_COL_COUNT = 7;
      var MATCHES_MY_COL_DEFAULTS = [44, 108, 120, 280, 96, 72, 152];
      var matchesMyColWidths = {};
      var matchesMyResizeState = null;
      var matchesMyResizeGlobalsBound = false;
      var matchesMyScrollGlobalsBound = false;
      var FLOATING_MY_OFFSET_PX = 2;
      var FLOATING_MY_START_EPS_PX = 3;
      var matchesMyFloatingRaf = 0;
      var matchesMyFloatingLastScrollTs = 0;

      function showErr(msg) {
        var el = document.getElementById("dg-matches-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function parseUrlParams() {
        var p = new URLSearchParams(window.location.search);
        return {
          my_site_id: p.get("my_site_id") || "",
          list_my_site_id: p.get("list_my_site_id") || "",
          list_competitor_id: p.get("list_competitor_id") || "",
          status: p.get("status") || "",
          mode: p.get("mode") || "",
          product_search: p.get("product_search") || "",
          matches_page: Number(p.get("matches_page") || 1),
          matches_limit: Number(p.get("matches_limit") || 100),
          manual_queue_page: Number(p.get("manual_queue_page") || 1),
          manual_queue_limit: Number(p.get("manual_queue_limit") || 100),
          manual_queue_reason: String(p.get("manual_queue_reason") || "").trim().toLowerCase(),
        };
      }

      function normalizeManualQueueReason(v) {
        var s = String(v || "").trim().toLowerCase();
        return s === "no_match" || s === "rejected" ? s : "";
      }

      function scheduleSyncUrl() {
        if (state.urlTick) clearTimeout(state.urlTick);
        state.urlTick = setTimeout(function () {
          state.urlTick = null;
          syncUrlFromState();
        }, 150);
      }

      function selectedSet() {
        var s = {};
        state.selectedProductIds.forEach(function (id) {
          s[id] = true;
        });
        return s;
      }

      function fillMySitesSelect() {
        var sel = document.getElementById("dg-matches-my-site");
        var selList = document.getElementById("dg-matches-list-my-site");
        var v = sel.value;
        var vList = selList ? selList.value : "";
        var optEmpty = '<option value="">-- выберите --</option>';
        sel.innerHTML = optEmpty;
        if (selList) selList.innerHTML = optEmpty;
        state.mySites.forEach(function (s) {
          var o = document.createElement("option");
          o.value = String(s.id);
          o.textContent = s.name || "#" + s.id;
          sel.appendChild(o);
          if (selList) selList.appendChild(o.cloneNode(true));
        });
        if (v && [].some.call(sel.options, function (o) { return o.value === v; })) sel.value = v;
        if (selList && vList && [].some.call(selList.options, function (o) { return o.value === vList; })) selList.value = vList;
      }

      function listCompetitorOptionExists(sel, id) {
        var s = String(id || "").trim();
        return (
          !!s &&
          !!sel &&
          [].some.call(sel.options, function (o) {
            return o.value === s;
          })
        );
      }

      function fillListCompetitorSelect() {
        var sel = document.getElementById("dg-matches-list-competitor");
        if (!sel) return;
        var prev = String(sel.value || "").trim();
        sel.replaceChildren();
        var o0 = document.createElement("option");
        o0.value = "";
        o0.textContent = "Все конкуренты";
        sel.appendChild(o0);
        (state.competitors || []).forEach(function (c) {
          var idNum = Number(c.id);
          if (!Number.isFinite(idNum) || idNum <= 0) return;
          var o = document.createElement("option");
          o.value = String(c.id);
          var nm = String(c.name || "").trim();
          var dm = String(c.domain || "").trim();
          o.textContent = nm || dm || "#" + c.id;
          sel.appendChild(o);
        });
        if (prev && listCompetitorOptionExists(sel, prev)) sel.value = prev;
        else sel.value = "";
        fillManualFindCompSelect();
      }

      /** Заполнить селект проектов конкурента для прайса. preferredProjectId — приоритет (например competitor_site_id строки очереди). */
      function populateManualFindCompSelectInto(targetSel, preferredProjectId) {
        if (!targetSel) return;
        var pref =
          preferredProjectId != null && String(preferredProjectId).trim() !== ""
            ? String(preferredProjectId).trim()
            : String(targetSel.value || "").trim();
        targetSel.replaceChildren();
        var o0 = document.createElement("option");
        o0.value = "";
        o0.textContent = "Выберите конкурента…";
        targetSel.appendChild(o0);
        (state.competitors || []).forEach(function (c) {
          var idNum = Number(c.id);
          if (!Number.isFinite(idNum) || idNum <= 0) return;
          var o = document.createElement("option");
          o.value = String(c.id);
          var nm = String(c.name || "").trim();
          var dm = String(c.domain || "").trim();
          o.textContent = nm || dm || "#" + c.id;
          targetSel.appendChild(o);
        });
        var listEl = document.getElementById("dg-matches-list-competitor");
        var listV = listEl && String(listEl.value || "").trim();
        if (pref && listCompetitorOptionExists(targetSel, pref)) targetSel.value = pref;
        else if (listV && listCompetitorOptionExists(targetSel, listV)) targetSel.value = listV;
        else targetSel.value = "";
      }

      /** Раньше заполнял общий селект «Поиск в прайсе»; селекты только inline под строкой очереди. */
      function fillManualFindCompSelect() {}

      function mySiteOptionExists(sel, id) {
        var s = String(id || "").trim();
        return (
          !!s &&
          [].some.call(sel.options, function (o) {
            return o.value === s;
          })
        );
      }

      /** Если в URL нет my_site_id: сначала сайт из «Мои товары», затем последний на этой странице; иначе пусто (не первый из списка). */
      function pickDefaultMySiteIdFromPrefs(sel) {
        try {
          var DF = window.DatagonFilters;
          if (DF && DF.load) {
            var mp = DF.load("my_products");
            if (mp && mp.site_id != null && String(mp.site_id).trim() && String(mp.site_id) !== "all") {
              var sid = String(mp.site_id).trim();
              if (mySiteOptionExists(sel, sid)) return sid;
            }
            var mc = DF.load("matches_ctx");
            if (mc && mc.my_site_id != null && String(mc.my_site_id).trim()) {
              var mid = String(mc.my_site_id).trim();
              if (mySiteOptionExists(sel, mid)) return mid;
            }
          }
        } catch (e) {}
        return "";
      }

      function renderCompetitors() {
        var box = document.getElementById("dg-matches-competitors");
        box.replaceChildren();
        var set = {};
        state.competitorIds.forEach(function (id) {
          set[String(id)] = true;
        });
        state.competitors.forEach(function (c) {
          var id = String(c.id);
          var wrap = document.createElement("div");
          wrap.className = "form-check";
          var inp = document.createElement("input");
          inp.type = "checkbox";
          inp.className = "form-check-input";
          inp.id = "comp-" + id;
          inp.checked = !!set[id];
          inp.addEventListener("change", function () {
            if (inp.checked) {
              if (!state.competitorIds.some(function (x) { return String(x) === id; })) state.competitorIds.push(id);
            } else {
              state.competitorIds = state.competitorIds.filter(function (x) { return String(x) !== id; });
            }
            scheduleSyncUrl();
            refreshActionButtons();
          });
          var lab = document.createElement("label");
          lab.className = "form-check-label";
          lab.htmlFor = "comp-" + id;
          lab.textContent = c.name || "#" + c.id;
          wrap.appendChild(inp);
          wrap.appendChild(lab);
          box.appendChild(wrap);
        });
      }

      function refreshActionButtons() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        var hasComp = state.competitorIds.length > 0;
        var js = state.jobStatus;
        document.getElementById("dg-matches-run-selected").disabled = !mySiteId || !hasComp;
        document.getElementById("dg-matches-run-auto").disabled = !mySiteId || !hasComp;
        document.getElementById("dg-matches-retry").disabled = !mySiteId || !js.canRetry;
        document.getElementById("dg-matches-stop").disabled = !mySiteId || !js.active;
      }

      function formatJobInstant(iso) {
        if (!iso) return "—";
        try {
          var d = new Date(iso);
          if (Number.isNaN(d.getTime())) return "—";
          return d.toLocaleString("ru-RU", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        } catch (e) {
          return "—";
        }
      }

      function updateJobUi() {
        var js = state.jobStatus;
        var pct = js.total > 0 ? Math.round((js.processed / js.total) * 100) : 0;
        var hint = document.getElementById("dg-matches-job-hint");
        if (hint) {
          var msg = js.message || "Ожидание";
          var base = msg;
          if (js.total > 0 || js.processed > 0) {
            base +=
              " · пары «наш товар × конкурент» (не страницы прайса): " +
              formatNumber(js.processed) +
              " / " +
              formatNumber(js.total) +
              " (" +
              pct +
              "%)";
          }
          if (js.active && state.statusPollFailures >= 3)
            base += " · нет ответа сервера на опрос статуса (возможна долгая фаза «по названию» — подождите или обновите страницу)";
          hint.textContent = base;
        }
        var timesEl = document.getElementById("dg-matches-job-times");
        if (timesEl) {
          var startStr = formatJobInstant(js.startedAt);
          var stopPend =
            !!js.stopPending ||
            (!!js.active && /Остановка\s+задачи/i.test(String(js.message || "")));
          var endStr;
          if (js.active) endStr = stopPend ? "остановка (ждём шаг БД)…" : "выполняется…";
          else endStr = js.finishedAt ? formatJobInstant(js.finishedAt) : "—";
          timesEl.textContent = "Старт: " + startStr + " · Окончание: " + endStr;
        }
        var stopHint = document.getElementById("dg-matches-job-stop-hint");
        if (stopHint) {
          var showStop =
            !!js.active &&
            (!!js.stopPending || /Остановка\s+задачи/i.test(String(js.message || "")));
          stopHint.classList.toggle("d-none", !showStop);
        }
        var found = document.getElementById("dg-matches-job-found");
        if (found) {
          found.replaceChildren();
          var l1 = document.createElement("div");
          l1.className = "mb-0";
          l1.textContent =
            "В этой задаче (с переносом счётчика): по SKU " +
            formatNumber(js.foundSku) +
            ", по названию " +
            formatNumber(js.foundName);
          found.appendChild(l1);
          if (js.dbMatchCountsAvailable) {
            var l2 = document.createElement("div");
            l2.className = "small text-muted mt-1 mb-0";
            l2.textContent =
              "Уже в таблице «Совпадения» по конкурентам из задачи: по SKU " +
              formatNumber(js.dbFoundSku || 0) +
              ", по названию " +
              formatNumber(js.dbFoundName || 0);
            found.appendChild(l2);
          }
        }
        var logsEl = document.getElementById("dg-matches-job-logs");
        if (logsEl) {
          logsEl.replaceChildren();
          (js.logs || []).slice(0, 20).forEach(function (l, i) {
            var d = document.createElement("div");
            d.textContent = "• " + l;
            logsEl.appendChild(d);
          });
          var hasLogReserve = !!js.active || (js.logs || []).length > 0;
          logsEl.classList.toggle("dg-matches-job-logs-reserved", hasLogReserve);
          var row = logsEl.closest(".dg-matches-job-logs-found-row");
          if (row) row.classList.toggle("dg-matches-job-has-content", hasLogReserve);
        }
        refreshActionButtons();
      }

      function myProductsPages() {
        return Math.max(1, Math.ceil(state.myProductsTotal / PRODUCTS_LIMIT));
      }
      function matchesPages() {
        return Math.max(1, Math.ceil(state.matchesTotal / state.matchesLimit));
      }

      function updateMyProductsHints() {
        document.getElementById("dg-matches-my-products-page-hint").textContent =
          "Страница " + state.myProductsPage + "/" + myProductsPages();
        document.getElementById("dg-matches-my-prev").disabled = state.myProductsPage <= 1;
        document.getElementById("dg-matches-my-next").disabled = state.myProductsPage >= myProductsPages();
        document.getElementById("dg-matches-my-products-hint").textContent =
          "Выбрано: " + state.selectedProductIds.length + "; всего: " + formatNumber(state.myProductsTotal);
      }

      function updateMatchesPageHints() {
        document.getElementById("dg-matches-page-hint").textContent =
          "Страница " + state.matchesPage + "/" + matchesPages();
        document.getElementById("dg-matches-prev").disabled = state.matchesPage <= 1;
        document.getElementById("dg-matches-next").disabled = state.matchesPage >= matchesPages();
        document.getElementById("dg-matches-total-hint").textContent = "Всего: " + formatNumber(state.matchesTotal);
      }

      function formatMatchesMyProductMoney(value) {
        var num = Number(value);
        if (!Number.isFinite(num)) num = 0;
        return num.toLocaleString("ru-RU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatMatchesMyProductUpdated(iso) {
        if (!iso) return "—";
        try {
          var d = new Date(iso);
          if (Number.isNaN(d.getTime())) return String(iso);
          return d.toLocaleString("ru-RU", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch (e) {
          return "—";
        }
      }

      /** Цена + валюта для колонок «Совпадения» (мой товар / конкурент). */
      function formatMatchesListPriceLine(price, currency) {
        if (price == null || String(price).trim() === "") return "—";
        var c = String(currency || "").trim();
        var num = Number(price);
        var pStr = Number.isFinite(num)
          ? num.toLocaleString("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 4 })
          : String(price).trim();
        return c ? pStr + " " + c : pStr;
      }

      function appendMatchesListProductBlock(td, sku, name, priceLine) {
        td.classList.add("dg-matches-product-cell");
        var stack = document.createElement("div");
        stack.className = "dg-matches-product-stack";
        var rows = [
          ["Артикул", sku || "—", "dg-matches-product-line__value--sku"],
          ["Наименование", name || "—", "dg-matches-product-line__value--name"],
          ["Цена", priceLine || "—", "dg-matches-product-line__value--price"],
        ];
        rows.forEach(function (r) {
          var line = document.createElement("div");
          line.className = "dg-matches-product-line";
          var lab = document.createElement("div");
          lab.className = "dg-matches-product-line__label";
          lab.textContent = r[0];
          var val = document.createElement("div");
          val.className = "dg-matches-product-line__value " + r[2];

      function updateMatchesMyFloatingHeaderFallback() {
        var thead = document.getElementById("dg-matches-my-thead");
        if (!thead) return;
        var table = thead.closest("table");
        if (!table || !table.getBoundingClientRect) return;
        var row = thead.querySelector("tr");
        if (!row) return;

        var y = window.scrollY || window.pageYOffset || 0;
        var headerTop = getMatchesMyStickyTopPx();

        var baseTopAbs = Number(thead.getAttribute("data-dg-base-top") || 0);
        if (!Number.isFinite(baseTopAbs) || baseTopAbs <= 0) return;
        var tableRect = table.getBoundingClientRect();
        var tableBottom = tableRect.bottom + y;
        var rowRect = row.getBoundingClientRect();
        var rowHeight = rowRect && rowRect.height ? rowRect.height : 0;

        var headerLine = y + headerTop;
        var start = baseTopAbs + FLOATING_MY_START_EPS_PX;
        var end = tableBottom - rowHeight;
        if (headerLine <= start || headerLine >= end) {
          if (thead.style.transform) {
            thead.style.transform = "";
            thead.style.position = "";
            thead.style.zIndex = "";
            thead.style.willChange = "";
            thead.removeAttribute("data-dg-floating");
          }
          return;
        }

        var zoomAwareOffset = FLOATING_MY_OFFSET_PX;
        var dpr = window.devicePixelRatio || 1;
        if (Math.abs(dpr - 1) < 0.03) zoomAwareOffset = FLOATING_MY_OFFSET_PX - 3;
        var shift = Math.max(0, headerLine - start - zoomAwareOffset);
        var shiftPx = Number(shift.toFixed(3));
        var nextTransform = "translate3d(0," + shiftPx + "px,0)";
        if (thead.style.transform !== nextTransform) {
          thead.style.transform = nextTransform;
          thead.style.position = "relative";
          thead.style.zIndex = "25";
          thead.style.willChange = "transform";
          thead.setAttribute("data-dg-floating", "1");
        }
      }

      function filteredSortedMatches() {
        var term = String(document.getElementById("dg-matches-smart-filter").value || "")
          .trim()
          .toLowerCase();
        var matches = state.matches;
        var filtered =
          !term
            ? matches
            : matches.filter(function (m) {
                var hay = [
                  m.status,
                  m.match_type,
                  m.my_sku,
                  m.my_product_name,
                  m.competitor_sku,
                  m.competitor_name,
                  m.confirmed_by,
                  m.unlinked_by,
                  m.rejected_by,
                ]
                  .map(function (x) {
                    return String(x || "").toLowerCase();
                  })
                  .join(" ");
                return hay.indexOf(term) !== -1;
              });
        var tf = readTableFilters();
        var byColumns = filtered.filter(function (m) {
          if (tf.my_sku && String(m.my_sku || "").toLowerCase().indexOf(String(tf.my_sku).trim().toLowerCase()) === -1)
            return false;
          if (
            tf.competitor_sku &&
            String(m.competitor_sku || "").toLowerCase().indexOf(String(tf.competitor_sku).trim().toLowerCase()) === -1
          )
            return false;
          if (tf.match_type !== "all") {
            var wantMt = String(tf.match_type).toLowerCase();
            var rowMt = String(m.match_type || "").trim().toLowerCase();
            if (!rowMt)
              rowMt = String(effectiveMatchTypeForScore(m, normalizeConfidence01(m.confidence_score))).toLowerCase();
            if (rowMt !== wantMt) return false;
          }
          if (tf.status !== "all" && String(m.status || "").toLowerCase() !== String(tf.status).toLowerCase()) return false;
          var pct = normalizeConfidence01(m.confidence_score) * 100;
          var min = Number(tf.confidence_min || "");
          var max = Number(tf.confidence_max || "");
          if (Number.isFinite(min) && String(tf.confidence_min).trim() !== "" && pct < min) return false;
          if (Number.isFinite(max) && String(tf.confidence_max).trim() !== "" && pct > max) return false;
          return true;
        });
        var dir = state.matchesSortDir === "asc" ? 1 : -1;
        var sortBy = state.matchesSortBy;
        return byColumns.slice().sort(function (a, b) {
          if (sortBy === "confidence") {
            return (normalizeConfidence01(a.confidence_score) - normalizeConfidence01(b.confidence_score)) * dir;
          }
          var av = String(a[sortBy] || "");
          var bv = String(b[sortBy] || "");
          return av.localeCompare(bv, "ru", { sensitivity: "base" }) * dir;
        });
      }

        if (!row) return;
        ensureMatchesResizeGlobals();
        var ths = Array.prototype.slice.call(row.querySelectorAll("th"));
        ths.forEach(function (th, index) {
          if (index >= 6) return;
          if (th.getAttribute("data-dg-matches-resize-ready") === "1") return;
          th.setAttribute("data-dg-matches-resize-ready", "1");
          th.style.position = "relative";
          var handle = document.createElement("span");
          handle.className = "dg-matches-resize-handle";
          handle.setAttribute("role", "separator");
          handle.setAttribute("aria-orientation", "vertical");
          handle.title = "Потяните, чтобы изменить ширину колонки";
          handle.style.cssText =
            "position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:4;" +
            "background:linear-gradient(to right,transparent 47%,#d9dee5 47%,#d9dee5 53%,transparent 53%);opacity:0.55";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var col = document.querySelector("#dg-matches-list-table col.dg-matches-col-" + index);
            var cur = col && col.style.width ? parseInt(col.style.width, 10) : 0;
            if (!Number.isFinite(cur) || cur <= 0) cur = MATCHES_COL_DEFAULTS[index];
            var rect = th.getBoundingClientRect();
            var w0 = rect && rect.width ? Math.round(rect.width) : cur;
            matchesResizeState = {
              index: index,
              startX: ev.clientX,
              startWidth: Number(matchesColWidths[index]) > 0 ? Number(matchesColWidths[index]) : w0 || cur,
            };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          handle.addEventListener("click", function (ev) {
            ev.stopPropagation();
          });
          th.appendChild(handle);
        });
      }

      function statusUi(status) {
        if (status === "confirmed") return { icon: "pe-7s-check", badge: "success", label: "Подтверждено" };
        if (status === "rejected") return { icon: "pe-7s-close-circle", badge: "danger", label: "Отклонено" };
        return { icon: "pe-7s-timer", badge: "warning", label: "Ожидает" };
      }
      /** БД: 0..1; редкий legacy — уже в процентах 0..100. */
      function normalizeConfidence01(raw) {
        var n = Number(raw);
        if (!Number.isFinite(n) || n < 0) return 0;
        if (n > 1 && n <= 100) return n / 100;
        if (n > 100) return 1;
        return n;
      }
      function scoreUi(matchType, score01) {
        var mt = String(matchType || "").toLowerCase();
        if (mt === "manual") return { text: "Вручную", badge: "info" };
        if (mt === "sku") {
          var skuPct = Math.round(Number(score01 || 0) * 100);
          if (skuPct >= 100) return { text: "100% по SKU", badge: "success" };
          if (skuPct >= 90) return { text: skuPct + "% по SKU", badge: "success" };
          if (skuPct >= 70) return { text: skuPct + "% по SKU", badge: "warning" };
          return { text: skuPct + "% по SKU", badge: "secondary" };
        }
        var pct = Math.round(Number(score01 || 0) * 100);
        if (pct < 0) pct = 0;
        if (pct > 100) pct = 100;
        var text = pct + "% по названию";
        if (pct >= 90) return { text: text, badge: "success" };
        if (pct >= 70) return { text: text, badge: "warning" };
        return { text: text, badge: "secondary" };
      }

      function effectiveMatchTypeForScore(m, score) {
        var t = String(m.match_type || "")
          .trim()
          .toLowerCase();
        if (t) return t;
        return Math.abs(Number(score) - 1) < 1e-6 ? "sku" : "name";
      }

      function matchTypeLabel(m) {
        var mt = String(m.match_type || "")
          .trim()
          .toLowerCase();
        var mm = String(m.matching_mode || "")
          .trim()
          .toLowerCase();
        if (!mt) return "—";
        if (mt === "manual") return "Вручную";
        if (mt === "name") {
          if (mm === "all") return "Название · из «все поля»";
          return "По названию";
        }
        if (mt === "sku") {
          if (mm === "sku_norm") return "SKU · нормализация";
          if (mm === "sku_best") return "SKU · норм. + строка";
          if (mm === "all") return "SKU · строго («все поля»)";
          return "SKU · строго";
        }
        return mt;
      }

      function loadMyProducts() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) {
          state.myProducts = [];
          state.myProductsTotal = 0;
          renderMyProducts();
          return;
        }
        state.loadingProducts = true;
        renderMyProducts();
        var offset = (state.myProductsPage - 1) * PRODUCTS_LIMIT;
        var q = new URLSearchParams({
          my_site_id: mySiteId,
          limit: String(PRODUCTS_LIMIT),
          offset: String(offset),
        });
        var ps = String(document.getElementById("dg-matches-product-search").value || "").trim();
        if (ps) q.set("search", ps);
        fetch("/api/matches/my-products?" + q.toString(), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки товаров");
            state.myProducts = Array.isArray(x.j.data) ? x.j.data : [];
            state.myProductsTotal = Number(x.j.total || 0);
          })
          .catch(function (e) {
            alert(e.message || "Не удалось загрузить товары");
            state.myProducts = [];
            state.myProductsTotal = 0;
          })
          .then(function () {
            state.loadingProducts = false;
            renderMyProducts();
          });
      }

      function loadMatches(silent) {
        var mySiteId = document.getElementById("dg-matches-list-my-site").value;
        if (!mySiteId) {
          state.lastMatchesQuerySiteId = "";
          state.matches = [];
          state.matchesTotal = 0;
          renderMatchesTable();
          return;
        }
        state.lastMatchesQuerySiteId = String(mySiteId);
        var showLoader = !silent;
        if (showLoader) {
          state.loadingMatches = true;
          renderMatchesTable();
        }
        var offset = (state.matchesPage - 1) * state.matchesLimit;
        var q = new URLSearchParams({
          my_site_id: mySiteId,
          limit: String(state.matchesLimit),
          offset: String(offset),
        });
        var sf = document.getElementById("dg-matches-status-filter").value;
        if (sf !== "all") q.set("status", sf);
        var mtList = document.getElementById("dg-matches-tf-match-type").value;
        if (mtList && mtList !== "all") q.set("match_type", mtList);
        var compF = document.getElementById("dg-matches-list-competitor");
        var compId = compF && String(compF.value || "").trim();
        if (compId) q.set("competitor_site_id", compId);
        var fetchOpts = { credentials: "same-origin" };
        try {
          if (typeof AbortSignal !== "undefined" && AbortSignal.timeout) fetchOpts.signal = AbortSignal.timeout(120000);
        } catch (eSig) {}
        fetch("/api/matches/list?" + q.toString(), fetchOpts)
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки совпадений");
            state.matches = Array.isArray(x.j.data) ? x.j.data : [];
            state.matchesTotal = Number(x.j.total || 0);
          })
          .catch(function (e) {
            if (e && (e.name === "AbortError" || /aborted|timeout/i.test(String(e.message || ""))))
              alert(
                "Сервер не ответил за 2 минуты при загрузке совпадений. Частая причина — долгие операции с индексами в БД; перезапустите сервер и откройте страницу снова."
              );
            else alert(e.message || "Не удалось загрузить сопоставления");
            state.matches = [];
            state.matchesTotal = 0;
          })
          .then(function () {
            if (showLoader) state.loadingMatches = false;
            renderMatchesTable();
            scheduleSyncUrl();
            persistMatchesListFilterForm();
          });
      }

      function loadStatus() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return;
        var fetchOpts = { credentials: "same-origin" };
        try {
          if (typeof AbortSignal !== "undefined" && AbortSignal.timeout) fetchOpts.signal = AbortSignal.timeout(20000);
        } catch (eT) {}
        fetch("/api/matches/status?my_site_id=" + encodeURIComponent(mySiteId), fetchOpts)
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) return;
            state.statusPollFailures = 0;
            var json = x.j;
            if (json.active) state.jobDoneReloaded = false;
            state.jobStatus = {
              active: !!json.active,
              done: !!json.done,
              message: json.message || "",
              processed: Number(json.processed || 0),
              total: Number(json.total || 0),
              foundSku: Number(json.foundSku || 0),
              foundName: Number(json.foundName || 0),
              dbFoundSku: Number(json.dbFoundSku || 0),
              dbFoundName: Number(json.dbFoundName || 0),
              dbMatchCountsAvailable: !!json.dbMatchCountsAvailable,
              logs: Array.isArray(json.logs) ? json.logs : [],
              canRetry: !!json.canRetry,
              startedAt: json.startedAt != null ? json.startedAt : json.started_at != null ? json.started_at : null,
              finishedAt: json.finishedAt != null ? json.finishedAt : json.finished_at != null ? json.finished_at : null,
              stopPending:
                json.stopPending === true ||
                (!!json.active && /Остановка\s+задачи/i.test(String(json.message || ""))),
            };
            updateJobUi();
            if (json.done && !state.jobDoneReloaded) {
              state.jobDoneReloaded = true;
              loadMatches(true);
            }
          })
          .catch(function (e) {
            state.statusPollFailures += 1;
            updateJobUi();
          });
      }

      /** Опрос задачи сопоставления привязан к «Мой сайт (запуск)»; вызывать после успешного start/retry/stop. */
      function ensureMatchesJobPolling() {
        var sel = document.getElementById("dg-matches-my-site");
        if (sel && String(sel.value || "").trim()) startStatusPoll();
      }

      function startStatusPoll() {
        stopStatusPoll();
        loadStatus();
        state.statusTimer = setInterval(loadStatus, 1500);
      }
      function stopStatusPoll() {
        if (state.statusTimer) {
          clearInterval(state.statusTimer);
          state.statusTimer = null;
        }
      }

      function runMatching(payload) {
        fetch("/api/matches/start-matching", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось запустить сопоставление");
            alert("Сопоставление запущено");
            ensureMatchesJobPolling();
            return loadStatus();
          })
          .catch(function (e) {
            alert(e.message || "Ошибка запуска сопоставления");
          });
      }

      function onRunSelected() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        if (!state.competitorIds.length) return alert("Выберите конкурентов");
        if (!state.selectedProductIds.length) return alert("Выберите товары");
        runMatching({
          mySiteId: Number(mySiteId),
          competitorIds: state.competitorIds.map(Number),
          mode: document.getElementById("dg-matches-search-mode").value,
          productIds: state.selectedProductIds,
          batchSize: Number(document.getElementById("dg-matches-batch-size").value || 200),
          microPauseMs: Number(document.getElementById("dg-matches-micro-pause").value || 20),
          batchPauseMs: Number(document.getElementById("dg-matches-batch-pause").value || 200),
        });
      }

      function onRunAuto() {
        var mySiteId = document.getElementById("dg-matches-my-site").value;
        if (!mySiteId) return alert("Выберите мой сайт");
        if (!state.competitorIds.length) return alert("Выберите конкурентов");
        runMatching({
          mySiteId: Number(mySiteId),
          competitorIds: state.competitorIds.map(Number),
          mode: document.getElementById("dg-matches-search-mode").value,
          productSearch: String(document.getElementById("dg-matches-product-search").value || "").trim(),
          batchSize: Number(document.getElementById("dg-matches-batch-size").value || 200),
          microPauseMs: Number(document.getElementById("dg-matches-micro-pause").value || 20),
          batchPauseMs: Number(document.getElementById("dg-matches-batch-pause").value || 200),

          }
          if (!cs && !cn) {
            alert("Укажите SKU или название позиции конкурента.");
            return Promise.reject(new Error("bad_input"));
          }
          return fetch("/api/matches/manual-match/confirm", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              my_site_id: parseInt(sid, 10),
              competitor_site_id: parseInt(cid, 10),
              my_product_id: pid,
              competitor_sku: cs,
              competitor_name: cn,
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { r: r, j: j };
              });
            })
            .then(function (x) {
              if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Ошибка");
              alert("Сохранено как подтвержденное вручную.");
              loadManualQueue();
              loadMatches(true);
            })
            .catch(function (e) {
              if (e && e.message !== "bad_input") alert(e.message || "Ошибка");
            });
        }
        function parseManualFindCompQuery(raw) {
          var s = String(raw || "").trim();
          if (!s) return "";
          var m = s.match(/^(?:название|name)\s*:\s*(.+)$/i);
          if (m) return String(m[1] || "").trim();
          m = s.match(/^(?:sku|артикул)\s*:\s*(.+)$/i);
          if (m) return String(m[1] || "").trim();
          return s;
        }
        /** Запрос без префикса name: — похож на один артикул (для авто-выбора прайса при пустом селекте конкурента). */
        function manualFindQueryLooksSkuOnly(qRaw, q) {
          var raw = String(qRaw || "").trim();
          if (/^(?:sku|артикул)\s*:/i.test(raw)) return true;
          var t = String(q || "").trim();
          if (!t || t.length > 120 || t.length < 2) return false;
          if (/\s/.test(t)) return false;
          return /^[A-Za-z0-9А-Яа-яЁё._\-\/]+$/.test(t);
        }

        function runManualPricesSearchFetch(projectIdStr, q, resEl, pickTarget) {
          fetch(
            "/api/matches/prices-search?project_id=" +
              encodeURIComponent(projectIdStr) +
              "&q=" +
              encodeURIComponent(q) +
              "&limit=30",
            { credentials: "same-origin" }
          )
            .then(function (r) {
              return r.json().then(function (j) {
                return { r: r, j: j };
              });
            })
            .then(function (x) {
              if (!x.r.ok) throw new Error(x.j.error || "Ошибка поиска");
              var rows = x.j.data || [];
              if (!rows.length) {
                resEl.textContent = "Ничего не найдено.";
                return;
              }
              resEl.replaceChildren();
              var ul = document.createElement("div");
              ul.className = "list-group list-group-flush border rounded";
              rows.forEach(function (pr) {
                var a = document.createElement("button");
                a.type = "button";
                a.className = "list-group-item list-group-item-action text-start small py-2";
                a.innerHTML =
                  "<strong>" +
                  (pr.sku || "—") +
                  "</strong> · " +
                  (pr.product_name || "—") +
                  "<div class=\"text-muted\">" +
                  (pr.price != null ? pr.price : "") +
                  " " +
                  (pr.currency || "") +
                  "</div>";
                a.addEventListener("click", function () {
                  var sEl = pickTarget && pickTarget.skuEl ? pickTarget.skuEl : null;
                  var nEl = pickTarget && pickTarget.nameEl ? pickTarget.nameEl : null;
                  if (sEl) sEl.value = pr.sku || "";
                  if (nEl) nEl.value = pr.product_name || "";
                });
                ul.appendChild(a);
              });
              resEl.appendChild(ul);
            })
            .catch(function (e) {
              alert(e.message || "Ошибка");
            });
        }

        function runManualPricesSearchInline(compSel, qEl, resEl, pickTarget) {
          if (!compSel || !qEl || !resEl) {
            alert("Выберите конкурента (прайс) в селекте.");
            return;
          }
          var qRaw = String(qEl.value || "").trim();
          var q = parseManualFindCompQuery(qRaw);
          if (!q) {
            alert("Введите подстроку для поиска в прайсе (или название: … / sku: …).");
            return;
          }
          var cid = String(compSel.value || "").trim();
          if (!cid) {
            if (!manualFindQueryLooksSkuOnly(qRaw, q)) {
              alert(
                "Выберите конкурента в селекте «Конкурент (прайс)» или введите артикул одной строкой (без пробелов) — если он есть только в одном прайсе, проект подставится сам."
              );
              return;
            }
            fetch("/api/matches/prices-resolve-sku?sku=" + encodeURIComponent(q), { credentials: "same-origin" })
              .then(function (r) {
                return r.json().then(function (j) {
                  return { r: r, j: j };
                });
              })
              .then(function (x) {
                if (!x.r.ok) throw new Error(x.j.error || "Ошибка");
                var n = Number(x.j.count || 0);
                var projects = x.j.data || [];
                if (n === 1 && x.j.project_id != null) {
                  var pid = String(x.j.project_id);
                  if (!listCompetitorOptionExists(compSel, pid)) {
                    alert("Проект #" + pid + " не найден в селекте конкурентов — обновите страницу или список проектов.");
                    return;
                  }
                  compSel.value = pid;
                  runManualPricesSearchFetch(pid, q, resEl, pickTarget);
                  return;
                }
                if (n > 1) {
                  var names = projects
                    .slice(0, 8)
                    .map(function (p) {
                      return (p.project_name || "") + " (#" + p.project_id + ")";
                    })
                    .join("; ");
                  alert(
                    "Артикул «" +
                      q +
                      "» есть у " +
                      n +
                      " конкурентов — выберите нужный прайс в селекте и нажмите «Найти в прайсе» снова." +
                      (names ? " Например: " + names + (n > 8 ? "…" : "") : "")
                  );
                  return;
                }
                alert(
                  "Артикул «" +
                    q +
                    "» не найден как точное совпадение SKU ни в одном прайсе. Выберите конкурента вручную или введите подстроку для обычного поиска после выбора прайса."
                );
              })
              .catch(function (e) {
                alert(e.message || "Ошибка");
              });
            return;
          }
          runManualPricesSearchFetch(cid, q, resEl, pickTarget);
        }

        function reasonBadgeEscAttr(s) {

        function reasonBadgeEscHtml(s) {

        /** Подписи в колонке «Причина»: понятный текст + подсказка (как в шаге 2 «Совпадения»). */
        function setManualQueueCountUi(message) {
          var top = document.getElementById("dg-manual-queue-count-top");

          var t = String(message || "—");

        function formatManualQueueCountLine(meta, shownLen) {
          if (!listSiteId()) return "Выберите «Мой сайт (список)» — количество строк очереди неизвестно.";
          var m = meta && typeof meta === "object" ? meta : {};
          var total = Number.isFinite(Number(m.total)) ? Math.max(0, Math.floor(Number(m.total))) : null;
          var shown = Math.max(0, Math.floor(Number(shownLen) || 0));
          var lim = Number.isFinite(Number(m.limit)) ? Math.max(1, Math.floor(Number(m.limit))) : 100;
          var off = Number.isFinite(Number(m.offset)) ? Math.max(0, Math.floor(Number(m.offset))) : 0;
          var page = Number.isFinite(Number(m.page)) ? Math.max(1, Math.floor(Number(m.page))) : 1;
          var pages = Number.isFinite(Number(m.pages)) ? Math.max(1, Math.floor(Number(m.pages))) : 1;
          if (total === null) total = shown;
          if (total === 0)
            return (
              "По текущему фильтру в очереди 0 " +
              ruRecordsWord(0) +
              ". Много строк «Авто не нашло пару» — нормально: после каждого прогона шага 1 сюда попадают все товары без пары по выбранному конкуренту (не только отклонения из шага 2)."
            );
          if (total <= lim)
            return "В очереди по фильтру: " + formatNumber(total) + " " + ruRecordsWord(total) + " (все на одной странице).";
          var fromN = shown ? off + 1 : 0;
          var toN = off + shown;
          return (
            "Всего по фильтру: " +
            formatNumber(total) +
            " " +
            ruRecordsWord(total) +
            ". Страница " +
            page +
            " из " +
            pages +
            ": записи " +
            formatNumber(fromN) +
            "–" +
            formatNumber(toN) +
            " (лимит страницы " +
            formatNumber(lim) +
            ", как в блоке «Совпадения»). Остальные — кнопки «Назад»/«Вперёд» или поиск в очереди."
          );
        }
        function manualQueuePages() {
          var lim = Math.max(1, Number(state.manualQueueLimit) || 100);
          var tot = Math.max(0, Number(state.manualQueueTotal) || 0);
          return Math.max(1, Math.ceil(tot / lim));
        }
        function updateManualQueuePaginationUi() {
          var hint = document.getElementById("dg-manual-queue-page-hint");
          var prev = document.getElementById("dg-manual-queue-prev");
          var next = document.getElementById("dg-manual-queue-next");
          if (!listSiteId()) {
            if (hint) hint.textContent = "Страница —";
            if (prev) prev.disabled = true;
            if (next) next.disabled = true;
            return;
          }
          var pgs = manualQueuePages();
          if (hint) hint.textContent = "Страница " + state.manualQueuePage + "/" + pgs;
          if (prev) prev.disabled = state.manualQueuePage <= 1;
          if (next) next.disabled = state.manualQueuePage >= pgs;
        }
        function reasonBadge(reason) {

            return (
              '<span class="badge bg-warning text-dark text-wrap text-start" style="cursor:help" title="' +
              reasonBadgeEscAttr(tipR) +
              '" role="status">Авто-совпадение вы отклонили</span>'
            );
          }
          if (r === "no_match") {
            var tipN =
              "Эту строку вы не добавляли вручную: её создаёт последний прогон авто-сопоставления (шаг 1). Для пары «ваш товар × этот конкурент» в том режиме и с теми настройками, что были у задачи, в прайсе конкурента не нашлось подходящей позиции (SKU или название — в зависимости от режима). По большому каталогу таких записей может быть очень много — это нормально. «Вернуть в авто» удаляет исключение; иначе подберите пару вручную или запустите сопоставление с другим режимом/фильтром.";
            return (
              '<span class="badge bg-secondary text-wrap text-start" style="cursor:help" title="' +
              reasonBadgeEscAttr(tipN) +
              '" role="status">Авто не нашло пару</span>'
            );
          }

        function loadManualQueue() {

            state.manualQueueTotal = 0;
            renderManualQueue([], {});
            return;

          var limRaw = Number(state.manualQueueLimit);
          var lim = [50, 100, 200].indexOf(limRaw) !== -1 ? limRaw : 100;
          state.manualQueueLimit = lim;
          var limSel = document.getElementById("dg-manual-queue-limit");
          if (limSel) limSel.value = String(lim);
          var off = (Math.max(1, Number(state.manualQueuePage) || 1) - 1) * lim;
          var params = new URLSearchParams();
          params.set("my_site_id", sid);
          var cid = listCompetitorId();
          if (cid) params.set("competitor_site_id", cid);
          var sq = document.getElementById("dg-manual-queue-search");
          if (sq && String(sq.value || "").trim()) params.set("search", String(sq.value || "").trim());
          var exReason = normalizeManualQueueReason(state.manualQueueReason);
          state.manualQueueReason = exReason;
          if (exReason) params.set("exclusion_reason", exReason);
          params.set("limit", String(lim));
          params.set("offset", String(off));
          fetch("/api/matches/manual-queue?" + params.toString(), { credentials: "same-origin" })
            .then(function (r) {
              return r.json().then(function (j) {
                return { r: r, j: j };
              });
            })
            .then(function (x) {
              if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки очереди");
              var total = Number(x.j.total != null ? x.j.total : 0);
              var limR = Number(x.j.limit != null ? x.j.limit : lim);
              var offR = Number(x.j.offset != null ? x.j.offset : off);
              var pages = Math.max(1, Math.ceil(total / limR));
              if (total === 0) state.manualQueuePage = 1;
              else if (state.manualQueuePage > pages) {
                state.manualQueuePage = pages;
                loadManualQueue();
                return;
              }
              state.manualQueueTotal = total;
              renderManualQueue(x.j.data || [], {
                total: total,
                limit: limR,
                offset: offR,
                page: state.manualQueuePage,
                pages: pages,
              });
              scheduleSyncUrl();
            })
            .catch(function (e) {
              setManualQueueCountUi("Не удалось загрузить очередь.");
              updateManualQueuePaginationUi();
              alert(e.message || "Ошибка");

        function formatMatchProductLogDetail(ev) {
          var detailJson = ev && ev.detail_json != null ? String(ev.detail_json).trim() : "";
          if (!detailJson) {
            if (ev && ev.competitor_site_id != null && Number(ev.competitor_site_id) > 0) {
              return "\n  — конкурент (проект) #" + String(ev.competitor_site_id);
            }
            return "";
          }
          var o = null;
          try {
            o = JSON.parse(detailJson);
          } catch (e0) {
            return "\n  — детали: " + detailJson.slice(0, 400);
          }
          if (!o || typeof o !== "object") return "";
          var parts = [];
          if (o.source_product_match_id != null && String(o.source_product_match_id).trim() !== "")
            parts.push("запись совпадения #" + String(o.source_product_match_id));
          if (o.rejected_by && String(o.rejected_by).trim() !== "" && String(o.rejected_by).trim() !== "unknown")
            parts.push("отклонил: " + String(o.rejected_by).trim());
          if (o.product_match_id != null && String(o.product_match_id).trim() !== "")
            parts.push("совпадение #" + String(o.product_match_id));
          if (o.exclusion_id != null && String(o.exclusion_id).trim() !== "")
            parts.push("строка очереди id " + String(o.exclusion_id));
          if (o.archive_id != null && String(o.archive_id).trim() !== "")
            parts.push("архив id " + String(o.archive_id));
          if (o.competitor_sku || o.competitor_name) {
            var cn = [];
            if (o.competitor_sku) cn.push("SKU «" + String(o.competitor_sku).slice(0, 80) + "»");
            if (o.competitor_name) cn.push(String(o.competitor_name).slice(0, 120));
            if (cn.length) parts.push(cn.join(", "));
          }
          if (o.note) parts.push("заметка: " + String(o.note).slice(0, 200));
          var known = {
            source_product_match_id: 1,
            rejected_by: 1,
            product_match_id: 1,
            exclusion_id: 1,
            archive_id: 1,
            competitor_sku: 1,
            competitor_name: 1,
            note: 1,
          };
          Object.keys(o).forEach(function (k) {
            if (known[k]) return;
            var v = o[k];
            if (v == null || String(v).trim() === "") return;
            parts.push(k + ": " + String(v).slice(0, 120));
          });
          var tail = "";
          if (ev && ev.competitor_site_id != null && Number(ev.competitor_site_id) > 0) {
            tail = " · конкурент #" + String(ev.competitor_site_id);
          }
          if (!parts.length) {
            try {
              return "\n  — " + JSON.stringify(o).slice(0, 500) + tail;
            } catch (e1) {
              return "\n  — " + detailJson.slice(0, 400) + tail;
            }
          }
          return "\n  — " + parts.join(" · ") + tail;
        }

        function loadProductLogTableInto(container, myProductId) {
          var sid = listSiteId();
          var pid = parseInt(String(myProductId || "").trim(), 10);
          container.replaceChildren();
          if (!sid || !Number.isFinite(pid) || pid < 1) {
            var sp = document.createElement("div");

            sp.textContent = "Укажите «Мой сайт (список)» в «Совпадениях».";
            container.appendChild(sp);
            return;
          }
          var load = document.createElement("div");
          load.className = "small text-muted py-2";
          load.textContent = "Загрузка…";
          container.appendChild(load);
          fetch(
            "/api/matches/product-match-log?my_site_id=" +
              encodeURIComponent(sid) +
              "&my_product_id=" +
              encodeURIComponent(String(pid)) +
              "&limit=80",
            { credentials: "same-origin" }
          )
            .then(function (r) {
              return r.json().then(function (j) {
                return { r: r, j: j };
              });
            })
            .then(function (x) {
              load.remove();
              if (!x.r.ok) throw new Error(x.j.error || "Ошибка лога");
              var events = x.j.data || [];
              if (!events.length) {
                var em = document.createElement("div");
                em.className = "small text-muted";
                em.textContent = "Событий пока нет.";
                container.appendChild(em);
                return;
              }
              var wrap = document.createElement("div");
              wrap.className = "table-responsive";
              var tbl = document.createElement("table");
              tbl.className = "table table-sm table-bordered mb-0 align-middle";
              var thead = document.createElement("thead");
              thead.className = "table-light";
              var hr = document.createElement("tr");
              ["Когда", "Событие", "Сообщение", "Детали"].forEach(function (h) {
                var th = document.createElement("th");
                th.className = "small";
                th.scope = "col";
                th.textContent = h;
                hr.appendChild(th);
              });
              thead.appendChild(hr);
              tbl.appendChild(thead);
              var tbod = document.createElement("tbody");
              events.forEach(function (ev) {
                var tr = document.createElement("tr");
                var t1 = document.createElement("td");
                t1.className = "small text-nowrap text-muted";
                t1.textContent = formatDateTime(ev.created_at);
                var t2 = document.createElement("td");
                t2.className = "small font-monospace";
                t2.textContent = String(ev.event || "—");
                var t3 = document.createElement("td");
                t3.className = "small";
                t3.textContent = String(ev.message || "").trim() || "—";
                var t4 = document.createElement("td");
                t4.className = "small text-muted";
                var det = formatMatchProductLogDetail(ev);
                var one = String(det || "")
                  .replace(/\n+/g, " ")
                  .replace(/\s+/g, " ")
                  .trim();
                if (!one) one = "—";
                if (one.length > 400) one = one.slice(0, 397) + "…";
                t4.textContent = one;
                tr.appendChild(t1);
                tr.appendChild(t2);
                tr.appendChild(t3);
                tr.appendChild(t4);
                tbod.appendChild(tr);
              });
              tbl.appendChild(tbod);
              wrap.appendChild(tbl);
              container.appendChild(wrap);
            })
            .catch(function (e) {
              load.remove();
              var er = document.createElement("div");
              er.className = "small text-danger";
              er.textContent = e.message || "Ошибка";
              container.appendChild(er);
            });
        }

              encodeURIComponent(String(pid)) +
              "&limit=80",

              });

            })

              out.textContent = e.message || "Ошибка";
            });
        }
