  <script>
    (function () {
      var MP_FILTERS_KEY = "datagon_my_products_filters_collapsed_v1";
      var SORT_STORAGE_VERSION = "v1";
      var initialLimit = 30;

      var offset = 0;
      var apiSearch = "";
      var lastTotal = 0;
      var lastRows = [];
      var lastLoading = false;
      var lastFx = { usd_to_rub: 90, eur_to_rub: 100 };
      var lastFxUpdatedAt = null;
      var siteNameById = {};
      var siteById = {};
      var DEFAULT_VISIBLE_COLS = [
        "id",
        "site",
        "sku",
        "name",
        "price",
        "dealmed_price",
        "medkompleks_price",
        "currency",
        "stock",
        "status",
        "updated",
        "competitor",
        "actions",
      ];
      var visibleCols = DEFAULT_VISIBLE_COLS.slice();
      var columnWidths = {};
      var resizeState = null;

      var FLOATING_HEADER_OFFSET_PX = 2;
      var FLOATING_HEADER_START_EPS_PX = 3;
      var mpFloatingHeaderRaf = 0;
      var mpFloatingLastScrollTs = 0;

      function userSortKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_my_products_sort_" + SORT_STORAGE_VERSION + ":" + u;
        } catch (e) {
          return "datagon_my_products_sort_" + SORT_STORAGE_VERSION + ":guest";
        }
      }

      function buildQuery(params) {
        var s = new URLSearchParams();
        Object.keys(params).forEach(function (k) {
          var v = params[k];
          if (v === undefined || v === null || v === "" || v === "all") return;
          s.set(k, String(v));
        });
        var q = s.toString();
        return q ? "?" + q : "";
      }

      function parseSmartSearch(raw) {
        var out = { site: "", status: "", search: "" };
        var tokens = (raw || "").trim().match(/"[^"]+"|\S+/g) || [];
        var free = [];
        tokens.forEach(function (token) {
          var idx = token.indexOf(":");
          if (idx > 0) {
            var key = token.slice(0, idx).toLowerCase();
            var value = token.slice(idx + 1).trim();
            if (
              (value.charAt(0) === '"' && value.slice(-1) === '"') ||
              (value.charAt(0) === "'" && value.slice(-1) === "'")
            )
              value = value.slice(1, -1);
            if (key === "site" || key === "site_id") out.site = value;
            else if (key === "status") out.status = value;
            else if (key === "code" || key === "sku" || key === "name" || key === "id") free.push(value);
            else free.push(token);
          } else {
            free.push(token.replace(/^"(.*)"$/, "$1"));
          }
        });
        out.search = free.join(" ").trim();
        return out;
      }

      function syncUrlFromDom() {
        var params = new URLSearchParams();
        var f = collectApiFilters();
        Object.keys(f).forEach(function (k) {
          var v = f[k];
          if (v === undefined || v === null || v === "" || v === "all") return;
          if (k === "limit" && Number(v) === initialLimit) return;
          if (k === "offset" && Number(v) === 0) return;
          params.set(k, String(v));
        });
        var next = params.toString()
          ? window.location.pathname + "?" + params.toString()
          : window.location.pathname;
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      function updateMpStickyTopVar() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        var top = 0;
        if (fixed && header && header.getBoundingClientRect) {
          var rect = header.getBoundingClientRect();
          top = rect && rect.height ? rect.height : 60;
        }
        document.documentElement.style.setProperty("--dg-table-sticky-top", top + "px");
      }

      function getMpStickyTopPx() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        if (!fixed) return 0;
        if (!header || !header.getBoundingClientRect) return 60;
        var rect = header.getBoundingClientRect();
        var h = rect && rect.height ? rect.height : 60;
        return h > 0 ? h : 60;
      }

      function captureMpTheadBaseTop() {
        var thead = document.getElementById("dg-mp-thead");
        if (!thead) return;
        thead.style.transform = "";
        thead.style.position = "";
        thead.style.zIndex = "";
        thead.style.willChange = "";
        thead.removeAttribute("data-dg-floating");
        var rect = thead.getBoundingClientRect();
        var absTop = (window.scrollY || window.pageYOffset || 0) + (rect && rect.top ? rect.top : 0);
        thead.setAttribute("data-dg-base-top", String(absTop));
      }

      function updateMpFloatingHeaderFallback() {
        var thead = document.getElementById("dg-mp-thead");
        if (!thead) return;
        var table = thead.closest("table");
        if (!table || !table.getBoundingClientRect) return;
        var row = thead.querySelector("tr");
        if (!row) return;

        var y = window.scrollY || window.pageYOffset || 0;
        var headerTop = getMpStickyTopPx();

        var baseTopAbs = Number(thead.getAttribute("data-dg-base-top") || 0);
        if (!Number.isFinite(baseTopAbs) || baseTopAbs <= 0) return;
        var tableRect = table.getBoundingClientRect();
        var tableBottom = tableRect.bottom + y;
        var rowRect = row.getBoundingClientRect();
        var rowHeight = rowRect && rowRect.height ? rowRect.height : 0;

        var headerLine = y + headerTop;
        var start = baseTopAbs + FLOATING_HEADER_START_EPS_PX;
        var end = tableBottom - rowHeight;
        if (headerLine <= start || headerLine >= end) {
          if (thead.style.transform) {
            thead.style.transform = "";
            thead.style.position = "";
            thead.style.zIndex = "";
            thead.style.willChange = "";
            thead.removeAttribute("data-dg-floating");
          }
          return;
        }

        var zoomAwareOffset = FLOATING_HEADER_OFFSET_PX;
        var dpr = window.devicePixelRatio || 1;
        if (Math.abs(dpr - 1) < 0.03) zoomAwareOffset = FLOATING_HEADER_OFFSET_PX - 3;
        var shift = Math.max(0, headerLine - start - zoomAwareOffset);
        var shiftPx = Number(shift.toFixed(3));
        var nextTransform = "translate3d(0," + shiftPx + "px,0)";
        if (thead.style.transform !== nextTransform) {
          thead.style.transform = nextTransform;
          thead.style.position = "relative";
          thead.style.zIndex = "25";
          thead.style.willChange = "transform";
          thead.setAttribute("data-dg-floating", "1");
        }
      }

      function mpFloatingHeaderTick(ts) {
        mpFloatingHeaderRaf = 0;
        updateMpFloatingHeaderFallback();
        if (ts - mpFloatingLastScrollTs < 140) {
          mpFloatingHeaderRaf = requestAnimationFrame(mpFloatingHeaderTick);
        }
      }

      function scheduleMpFloatingHeaderUpdate() {
        mpFloatingLastScrollTs = performance.now();
        if (mpFloatingHeaderRaf) return;
        mpFloatingHeaderRaf = requestAnimationFrame(mpFloatingHeaderTick);
      }

      function onScrollMpFloatingHeader() {
        scheduleMpFloatingHeaderUpdate();
      }

      function mpRefreshFloatingAfterLayout() {
        requestAnimationFrame(function () {
          captureMpTheadBaseTop();
          scheduleMpFloatingHeaderUpdate();
        });
      }

      function collectApiFilters() {
        var lim = Number(document.getElementById("mp-f-limit").value);
        if (!Number.isFinite(lim) || lim < 1) lim = initialLimit;
        return {
          site_id: document.getElementById("f-site").value,
          status: document.getElementById("mp-f-status").value,
          source_enabled: document.getElementById("mp-f-source_enabled").value,
          ms_linked: document.getElementById("f-ms").value,
          sort_by: document.getElementById("mp-f-sort-by").value,
          sort_dir: document.getElementById("mp-f-sort-dir").value,
          search: apiSearch,
          match_audit: document.getElementById("mp-f-match_audit").value,
          gap_filter_enabled: document.getElementById("mp-f-gap_enabled").checked ? "1" : "0",
          gap_exclude_zero: document.getElementById("mp-f-gap_exclude_zero").checked ? "1" : "0",
          gap_competitor: document.getElementById("mp-f-gap_competitor").value,
          gap_min_pct: document.getElementById("mp-f-gap_min_pct").value.trim(),
          gap_max_pct: document.getElementById("mp-f-gap_max_pct").value.trim(),
          usd_to_rub: document.getElementById("mp-f-usd_to_rub").value.trim(),
          eur_to_rub: document.getElementById("mp-f-eur_to_rub").value.trim(),
          comp_sync_rand_min: document.getElementById("mp-f-comp_min").value.trim(),
          comp_sync_rand_max: document.getElementById("mp-f-comp_max").value.trim(),
          stock_min: document.getElementById("mp-f-stock_min").value.trim(),
          stock_max: document.getElementById("mp-f-stock_max").value.trim(),
          limit: lim,
          offset: offset,
        };
      }

      function collectTableFilters() {
        return {
          source_id: document.getElementById("mp-tf-source_id").value,
          site_name: document.getElementById("mp-tf-site_name").value,
          sku: document.getElementById("mp-tf-sku").value,
          name: document.getElementById("mp-tf-name").value,
          currency: document.getElementById("mp-tf-currency").value,
        };
      }

      function collectMyProductsFilterFormFull() {
        return {
          smart: document.getElementById("mp-f-smart").value,
          apiSearch: apiSearch,
          offset: String(offset),
          site_id: document.getElementById("f-site").value,
          status: document.getElementById("mp-f-status").value,
          source_enabled: document.getElementById("mp-f-source_enabled").value,
          ms_linked: document.getElementById("f-ms").value,
          sort_by: document.getElementById("mp-f-sort-by").value,
          sort_dir: document.getElementById("mp-f-sort-dir").value,
          match_audit: document.getElementById("mp-f-match_audit").value,
          gap_filter_enabled: document.getElementById("mp-f-gap_enabled").checked ? "1" : "0",
          gap_exclude_zero: document.getElementById("mp-f-gap_exclude_zero").checked ? "1" : "0",
          gap_competitor: document.getElementById("mp-f-gap_competitor").value,
          gap_min_pct: document.getElementById("mp-f-gap_min_pct").value,
          gap_max_pct: document.getElementById("mp-f-gap_max_pct").value,
          usd_to_rub: document.getElementById("mp-f-usd_to_rub").value,
          eur_to_rub: document.getElementById("mp-f-eur_to_rub").value,
          comp_min: document.getElementById("mp-f-comp_min").value,
          comp_max: document.getElementById("mp-f-comp_max").value,
          stock_min: document.getElementById("mp-f-stock_min").value,
          stock_max: document.getElementById("mp-f-stock_max").value,
          limit: document.getElementById("mp-f-limit").value,
          tf_source_id: document.getElementById("mp-tf-source_id").value,
          tf_site_name: document.getElementById("mp-tf-site_name").value,
          tf_sku: document.getElementById("mp-tf-sku").value,
          tf_name: document.getElementById("mp-tf-name").value,
          tf_currency: document.getElementById("mp-tf-currency").value,
        };
      }

      function persistMyProductsFilterForm() {
        try {
          if (window.DatagonFilters) window.DatagonFilters.save("my_products", collectMyProductsFilterFormFull());
        } catch (e) {}
      }

      function mergeMyProductsPrefsFromStorage() {
        var DF = window.DatagonFilters;
        if (!DF || !DF.load) return;
        var prefs = DF.load("my_products");
        if (!prefs) return;
        var p;
        try {
          p = new URLSearchParams(window.location.search);
        } catch (e2) {
          p = new URLSearchParams();
        }
        function miss(k) {
          return !p.has(k);
        }
        if (miss("search")) {
          if (prefs.smart != null) document.getElementById("mp-f-smart").value = String(prefs.smart);
          if (prefs.apiSearch != null) apiSearch = String(prefs.apiSearch);
          else if (prefs.smart != null) apiSearch = String(prefs.smart);
        }
        if (miss("offset") && prefs.offset != null) offset = Number(prefs.offset) || 0;
        if (miss("site_id") && prefs.site_id != null) {
          var sel = document.getElementById("f-site");
          var w = String(prefs.site_id);
          if ([].some.call(sel.options, function (o) {
            return o.value === w;
          }))
            sel.value = w;
        }
        if (miss("status") && prefs.status != null) document.getElementById("mp-f-status").value = String(prefs.status);
        if (miss("source_enabled") && prefs.source_enabled != null)
          document.getElementById("mp-f-source_enabled").value = String(prefs.source_enabled);
        if (miss("ms_linked") && prefs.ms_linked != null) document.getElementById("f-ms").value = String(prefs.ms_linked);
        if (miss("sort_by") && prefs.sort_by != null)
          document.getElementById("mp-f-sort-by").value = String(prefs.sort_by);
        if (miss("sort_dir") && prefs.sort_dir != null)
          document.getElementById("mp-f-sort-dir").value = String(prefs.sort_dir);
        if (miss("match_audit") && prefs.match_audit != null)
          document.getElementById("mp-f-match_audit").value = String(prefs.match_audit);
        if (miss("gap_filter_enabled") && prefs.gap_filter_enabled != null)
          document.getElementById("mp-f-gap_enabled").checked = String(prefs.gap_filter_enabled) === "1";
        if (miss("gap_exclude_zero") && prefs.gap_exclude_zero != null)
          document.getElementById("mp-f-gap_exclude_zero").checked = String(prefs.gap_exclude_zero) === "1";
        if (miss("gap_competitor") && prefs.gap_competitor != null)
          document.getElementById("mp-f-gap_competitor").value = String(prefs.gap_competitor);
        if (miss("gap_min_pct") && prefs.gap_min_pct != null)
          document.getElementById("mp-f-gap_min_pct").value = String(prefs.gap_min_pct);
        if (miss("gap_max_pct") && prefs.gap_max_pct != null)
          document.getElementById("mp-f-gap_max_pct").value = String(prefs.gap_max_pct);
        if (miss("usd_to_rub") && prefs.usd_to_rub != null)
          document.getElementById("mp-f-usd_to_rub").value = String(prefs.usd_to_rub);
        if (miss("eur_to_rub") && prefs.eur_to_rub != null)
          document.getElementById("mp-f-eur_to_rub").value = String(prefs.eur_to_rub);
        if (miss("comp_sync_rand_min") && prefs.comp_min != null)
          document.getElementById("mp-f-comp_min").value = String(prefs.comp_min);
        if (miss("comp_sync_rand_max") && prefs.comp_max != null)
          document.getElementById("mp-f-comp_max").value = String(prefs.comp_max);
        if (miss("stock_min") && prefs.stock_min != null)
          document.getElementById("mp-f-stock_min").value = String(prefs.stock_min);
        if (miss("stock_max") && prefs.stock_max != null)
          document.getElementById("mp-f-stock_max").value = String(prefs.stock_max);
        if (miss("limit") && prefs.limit != null) document.getElementById("mp-f-limit").value = String(prefs.limit);
        if (prefs.tf_source_id != null) document.getElementById("mp-tf-source_id").value = String(prefs.tf_source_id);
        if (prefs.tf_site_name != null) document.getElementById("mp-tf-site_name").value = String(prefs.tf_site_name);
        if (prefs.tf_sku != null) document.getElementById("mp-tf-sku").value = String(prefs.tf_sku);
        if (prefs.tf_name != null) document.getElementById("mp-tf-name").value = String(prefs.tf_name);
        if (prefs.tf_currency != null) document.getElementById("mp-tf-currency").value = String(prefs.tf_currency);
      }

      function filterRows(rows, tf) {
        return (rows || []).filter(function (r) {
          var siteName = String(siteNameById[String(r.site_id)] || "");
          if (tf.source_id && String(r.source_id || "").indexOf(String(tf.source_id).trim()) === -1)
            return false;
          if (tf.site_name && siteName.toLowerCase().indexOf(String(tf.site_name).trim().toLowerCase()) === -1)
            return false;
          if (tf.sku && String(r.sku || "").toLowerCase().indexOf(String(tf.sku).trim().toLowerCase()) === -1)
            return false;
          if (tf.name && String(r.name || "").toLowerCase().indexOf(String(tf.name).trim().toLowerCase()) === -1)
            return false;
          if (tf.currency !== "all" && String(r.currency || "").toUpperCase() !== String(tf.currency).toUpperCase())
            return false;
          return true;
        });
      }

      function fmt(n) {
        return Number.isFinite(n) ? new Intl.NumberFormat("ru-RU").format(n) : "—";
      }
      function formatMoney(value) {
        var num = Number(value);
        if (!Number.isFinite(num)) return "-";
        return num.toLocaleString("ru-RU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function formatRuDateTime(value) {
        if (!value) return "—";
        var d = new Date(value);
        if (isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
      function formatFxUpdatedLabel(value) {
        if (!value) return "неизвестно";
        var d = new Date(value);
        if (isNaN(d.getTime())) return "неизвестно";
        return d.toLocaleString("ru-RU");
      }
      function buildSiteUrl(raw) {
        var v = String(raw || "").trim();
        if (!v) return "";
        if (/^https?:\/\//i.test(v)) return v;
        if (!/[a-z0-9-]+\.[a-z]{2,}/i.test(v)) return "";
        return "https://" + v;
      }
      function normalizeSiteProductUrl(rawUrl, site) {
        var direct = buildSiteUrl(rawUrl);
        if (!direct) return "";
        var isWebasyst = String(site && site.cms_type || "").toLowerCase() === "webasyst";
        if (!isWebasyst) return direct;
        try {
          var u = new URL(direct);
          var path = String(u.pathname || "/");
          if (!path.startsWith("/product/")) {
            var slug = path.replace(/^\/+/, "").replace(/\/+$/, "");
            if (slug) u.pathname = "/product/" + slug + "/";
          } else if (!path.endsWith("/")) u.pathname = path + "/";
          return u.toString();
        } catch (e) {
          return direct;
        }
      }
      function safeLink(raw) {
        var v = String(raw || "").trim();
        if (!v) return "";
        if (/^https?:\/\//i.test(v)) return v;
        return "";
      }
      function buildWebasystEditUrl(site, sourceId) {
        var id = String(sourceId || "").trim();
        if (!id) return "";
        if (String(site && site.cms_type || "").toLowerCase() !== "webasyst") return "";
        var cleanDomain = String(site && site.domain || "")
          .trim()
          .replace(/^https?:\/\//i, "")
          .replace(/\/+$/, "");
        if (!cleanDomain) return "";
        return (
          "https://" +
          cleanDomain +
          "/webasyst/shop/?action=products#/product/" +
          encodeURIComponent(id) +
          "/edit/"
        );
      }
      function toRubValue(price, currency, usdRub, eurRub) {
        var n = Number(price);
        if (!Number.isFinite(n)) return null;
        var cur = String(currency || "RUB").trim().toUpperCase();
        if (cur === "RUB" || cur === "RUR" || cur === "₽") return n;
        if (cur === "USD" || cur === "$") return n * Number(usdRub || 90);
        if (cur === "EUR" || cur === "€") return n * Number(eurRub || 100);
        return n;
      }
      function formatDeviationPct(myPrice, myCurrency, compPrice, compCurrency, usdRub, eurRub) {
        var myRub = toRubValue(myPrice, myCurrency, usdRub, eurRub);
        var compRub = toRubValue(compPrice, compCurrency, usdRub, eurRub);
        if (!Number.isFinite(myRub) || !Number.isFinite(compRub) || compRub <= 0) return "н/д";
        var pct = ((myRub - compRub) / compRub) * 100;
        var sign = pct > 0 ? "+" : "";
        return sign + pct.toFixed(2) + "%";
      }
      function formatBasePriceWithRub(price, currency, usdRub, eurRub) {
        var cur = String(currency || "RUB").toUpperCase();
        var base = formatMoney(price);
        var rub = toRubValue(price, cur, usdRub, eurRub);
        if (!Number.isFinite(rub)) return { baseText: base + " " + cur, rubText: "" };
        if (cur === "RUB" || cur === "RUR" || cur === "₽") return { baseText: base + " " + cur, rubText: "" };
        return { baseText: base + " " + cur, rubText: "≈ " + formatMoney(rub) + " RUB" };
      }
      function deviationClass(devText) {
        var v = String(devText || "").trim();
        if (!v || v === "н/д") return "text-muted";
        if (v.charAt(0) === "-") return "text-success";
        if (v.charAt(0) === "+") return "text-danger";
        return "text-muted";
      }
      function buildMoyskladSearchLink(code) {
        var value = String(code || "").trim();
        if (!value) return "";
        return (
          "/moysklad.html?search=" + encodeURIComponent("code:" + value) + "&page=1"
        );
      }

      function getUsdEurForRow() {
        var f = collectApiFilters();
        var u = Number(f.usd_to_rub || lastFx.usd_to_rub || 90);
        var e = Number(f.eur_to_rub || lastFx.eur_to_rub || 100);
        if (!Number.isFinite(u)) u = 90;
        if (!Number.isFinite(e)) e = 100;
        return { usd: u, eur: e };
      }

      function updateSortHeaders() {
        var sortBy = document.getElementById("mp-f-sort-by").value;
        var sortDir = document.getElementById("mp-f-sort-dir").value;
        document.querySelectorAll("#mp-thead-row [data-mp-sort]").forEach(function (th) {
          var col = th.getAttribute("data-mp-sort");
          var base = th.getAttribute("data-mp-label");
          if (!base) {
            base = th.textContent.replace(/\s*[↑↓↕]\s*$/, "").trim();
            th.setAttribute("data-mp-label", base);
            base = th.getAttribute("data-mp-label");
          }
          var arrow = "";
          if (sortBy === col) arrow = sortDir === "asc" ? " ↑" : " ↓";
          var labelEl = th.querySelector(".mp-sort-label");
          if (!labelEl) {
            labelEl = document.createElement("span");
            labelEl.className = "mp-sort-label";
            th.insertBefore(labelEl, th.firstChild || null);
          }
          labelEl.textContent = base + arrow;
          Array.prototype.slice.call(th.childNodes).forEach(function (node) {
            if (node === labelEl) return;
            if (node.classList && node.classList.contains("mp-resize-handle")) return;
            if (node.nodeType === Node.TEXT_NODE) th.removeChild(node);
          });
        });
        initColumnResizeHandles();
        applyStoredColumnWidths();
        mpRefreshFloatingAfterLayout();
      }

      function getHeaderCells() {
        return Array.prototype.slice.call(document.querySelectorAll("#mp-thead-row th"));
      }

      function applyColumnWidthByIndex(index, widthPx) {
        var w = Math.max(80, Math.min(900, Math.round(Number(widthPx) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        columnWidths[index] = w;
        var headers = getHeaderCells();
        if (headers[index]) {
          headers[index].style.width = w + "px";
          headers[index].style.minWidth = w + "px";
          headers[index].style.maxWidth = w + "px";
        }
        document.querySelectorAll("#dg-tbody tr").forEach(function (tr) {
          if (!tr.cells || !tr.cells[index]) return;
          tr.cells[index].style.width = w + "px";
          tr.cells[index].style.minWidth = w + "px";
          tr.cells[index].style.maxWidth = w + "px";
        });
      }

      function applyStoredColumnWidths() {
        Object.keys(columnWidths || {}).forEach(function (k) {
          var idx = Number(k);
          if (!Number.isFinite(idx)) return;
          applyColumnWidthByIndex(idx, columnWidths[k]);
        });
      }

      function onResizeMove(e) {
        if (!resizeState) return;
        var delta = e.clientX - resizeState.startX;
        applyColumnWidthByIndex(resizeState.index, resizeState.startWidth + delta);
        scheduleMpFloatingHeaderUpdate();
      }

      function onResizeUp() {
        if (!resizeState) return;
        resizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try {

          th.setAttribute("data-mp-resize-ready", "1");

          handle.setAttribute("aria-orientation", "vertical");

            "position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:4;" +
            "background:linear-gradient(to right,transparent 47%,#d9dee5 47%,#d9dee5 53%,transparent 53%);opacity:0.55";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var rect = th.getBoundingClientRect();
            var w = Number(columnWidths[index] || (rect && rect.width ? rect.width : 0));
            resizeState = { index: index, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";

      function applyVisibleColumns() {
        var cols = getVisibleColumns();
        var all = Array.prototype.slice.call(
          document.querySelectorAll("#mp-thead-row th, #dg-tbody tr td")
        );
        var headCells = Array.prototype.slice.call(
          document.querySelectorAll("#mp-thead-row th")
        );

        });
        headCells.forEach(function (th, index) {

          if (!key) key = index === headCells.length - 2 ? "competitor" : "actions";

          th.style.display = show ? "" : "none";
          document.querySelectorAll("#dg-tbody tr").forEach(function (tr) {
            if (tr.cells && tr.cells[index]) tr.cells[index].style.display = show ? "" : "none";
          });

      function renderColumnsPanel() {
        var list = document.getElementById("dg-mp-columns-list");
        if (!list) return;
        list.replaceChildren();
        var headers = Array.prototype.slice.call(document.querySelectorAll("#mp-thead-row th"));
        headers.forEach(function (th, index) {
          var key = th.getAttribute("data-mp-sort");
          if (!key) key = index === headers.length - 2 ? "competitor" : "actions";
          var label = String(th.getAttribute("data-mp-label") || th.textContent || "")
            .replace(/\s*[↑↓↕]\s*$/, "")
            .trim();
          var row = document.createElement("label");
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = visibleCols.indexOf(key) >= 0;
          cb.addEventListener("change", function () {
            var next = visibleCols.slice();
            if (cb.checked) {
              if (next.indexOf(key) < 0) next.push(key);
            } else {
              next = next.filter(function (k) {
                return k !== key;
              });
            }
            if (!next.length) {
              cb.checked = true;
              return;
            }
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) {
              return next.indexOf(k) >= 0;
            });
            try {
              localStorage.setItem(userVisibleColsKeyVanilla(), JSON.stringify(visibleCols));
            } catch (e) {}
            applyVisibleColumns();
          });
          row.appendChild(cb);
          row.appendChild(document.createTextNode(label || key));
          list.appendChild(row);
        });
      }

      function aggregateStats(rows) {
        var acc = { total: 0, linked: 0, disabled: 0, disappeared: 0 };
        (rows || []).forEach(function (s) {
          acc.total += Number(s.total || 0);
          acc.linked += Number(s.linked || 0);
          acc.disabled += Number(s.disabled || 0);
          acc.disappeared += Number(s.disappeared || 0);
        });
        acc.unlinked = Math.max(0, acc.total - acc.linked);
        return acc;
      }

      function parseUrlToForm() {
        var params = new URLSearchParams(window.location.search);
        var keys = [
          "site_id",
          "status",
          "source_enabled",
          "ms_linked",
          "sort_by",
          "sort_dir",
          "search",
          "match_audit",
          "gap_competitor",
          "gap_min_pct",
          "gap_max_pct",
          "usd_to_rub",
          "eur_to_rub",
          "comp_sync_rand_min",
          "comp_sync_rand_max",
          "stock_min",
          "stock_max",
        ];
        keys.forEach(function (k) {
          var v = params.get(k);
          if (v === null || v === "") return;
          if (k === "site_id") document.getElementById("f-site").value = v;
          if (k === "status") document.getElementById("mp-f-status").value = v;
          if (k === "source_enabled")
            document.getElementById("mp-f-source_enabled").value = v;
          if (k === "ms_linked") document.getElementById("f-ms").value = v;
          if (k === "sort_by") document.getElementById("mp-f-sort-by").value = v;
          if (k === "sort_dir") document.getElementById("mp-f-sort-dir").value = v;
          if (k === "search") {
            apiSearch = v;
            document.getElementById("mp-f-smart").value = v;
          }
          if (k === "match_audit")
            document.getElementById("mp-f-match_audit").value = v;
          if (k === "gap_competitor")
            document.getElementById("mp-f-gap_competitor").value = v;
          if (k === "gap_min_pct")
            document.getElementById("mp-f-gap_min_pct").value = v;
          if (k === "gap_max_pct")
            document.getElementById("mp-f-gap_max_pct").value = v;
          if (k === "usd_to_rub") document.getElementById("mp-f-usd_to_rub").value = v;
          if (k === "eur_to_rub") document.getElementById("mp-f-eur_to_rub").value = v;
          if (k === "comp_sync_rand_min") document.getElementById("mp-f-comp_min").value = v;
          if (k === "comp_sync_rand_max") document.getElementById("mp-f-comp_max").value = v;
          if (k === "stock_min") document.getElementById("mp-f-stock_min").value = v;
          if (k === "stock_max") document.getElementById("mp-f-stock_max").value = v;
        });
        var lim = params.get("limit");
        if (lim !== null && lim !== "")
          document.getElementById("mp-f-limit").value = lim;
        var off = params.get("offset");
        if (off !== null && off !== "") offset = Number(off) || 0;
        var gfe = params.get("gap_filter_enabled");
        if (gfe === "1") document.getElementById("mp-f-gap_enabled").checked = true;
        if (gfe === "0") document.getElementById("mp-f-gap_enabled").checked = false;
        var gez = params.get("gap_exclude_zero");
        if (gez === "0") document.getElementById("mp-f-gap_exclude_zero").checked = false;
        if (gez === "1") document.getElementById("mp-f-gap_exclude_zero").checked = true;

        if (!params.get("sort_by") || !params.get("sort_dir")) {
          try {
            var saved = JSON.parse(localStorage.getItem(userSortKey()) || "{}");
            if (saved.sort_by)
              document.getElementById("mp-f-sort-by").value = String(saved.sort_by);
            if (saved.sort_dir === "asc" || saved.sort_dir === "desc")
              document.getElementById("mp-f-sort-dir").value = saved.sort_dir;
          } catch (e) {}
        }
      }

      async function load() {
        var st = document.getElementById("dg-status");
        if (st) {
          st.style.display = "none";
          st.textContent = "";
        }
        lastLoading = true;
        applyTableFilterAndRender();
        try {
          var listQs = buildQuery(collectApiFilters());
          var statsQs = buildStatsQuery();
          var fxP = fetch("/api/my-products/fx-rates", { credentials: "same-origin" }).then(
            function (r) {
              return r.json();
            }
          );
          var statsP = fetch("/api/my-products/stats" + statsQs, {
            credentials: "same-origin",
          }).then(function (r) {
            return r.json();
          });
          var prodP = fetch("/api/my-products" + listQs, {
            credentials: "same-origin",
          }).then(function (r) {
            return r.json();
          });

          var settled = await Promise.all([
            fxP.catch(function () {
              return {};
            }),
            statsP.catch(function () {
              return [];
            }),
            prodP,
          ]);
          var fx = settled[0];
          var statsRows = settled[1];
          var json = settled[2];

          if (!json || json.error) throw new Error((json && json.error) || "Ошибка загрузки");

          lastFx = {
            usd_to_rub: Number(fx.usd_to_rub || 0),
            eur_to_rub: Number(fx.eur_to_rub || 0),
          };
          lastFxUpdatedAt = fx.updated_at || fx.updatedAt;
          var fxEl = document.getElementById("dg-fx-hint");
          if (fxEl) {
            fxEl.textContent =
              "FX: USD " +
              lastFx.usd_to_rub.toFixed(2) +
              " | EUR " +
              lastFx.eur_to_rub.toFixed(2) +
              " | Обновлен: " +
              formatFxUpdatedLabel(lastFxUpdatedAt);
          }

          var agg = aggregateStats(Array.isArray(statsRows) ? statsRows : []);
          document.getElementById("mp-st-active").textContent = fmt(agg.total);
          document.getElementById("mp-st-linked").textContent = fmt(agg.linked);
          document.getElementById("mp-st-unlinked").textContent = fmt(agg.unlinked);
          document.getElementById("mp-st-disabled").textContent = fmt(agg.disabled);
          document.getElementById("mp-st-disappeared").textContent = fmt(agg.disappeared);

          lastRows = Array.isArray(json.data) ? json.data : [];
          lastTotal = Number(json.total || 0);
          lastLoading = false;
          syncUrlFromDom();
          updateSortHeaders();
          persistMyProductsFilterForm();
          applyTableFilterAndRender();
        } catch (e) {
          lastLoading = false;
          lastRows = [];
          applyTableFilterAndRender();
          if (st) {
            st.style.display = "";
            st.textContent = "Ошибка: " + (e && e.message ? e.message : e);
          }
        }
      }

      function onRefreshOne(row) {
        fetch("/api/my-products/refresh-one", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            site_id: Number(row.site_id),
            sku: row.sku || undefined,
            source_id: row.source_id || undefined,
          }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "refresh-one failed");
            load();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function onSyncPrice(row) {
        var min =
          document.getElementById("mp-f-comp_min").value.trim() || "0.1";
        var max =
          document.getElementById("mp-f-comp_max").value.trim() || "1";
        fetch("/api/my-products/sync-price-from-competitor", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            site_id: Number(row.site_id),
            sku: row.sku,
            source_id: row.source_id || undefined,
            random_min_pct: Number(String(min).replace(",", ".")),
            random_max_pct: Number(String(max).replace(",", ".")),
          }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success)
              throw new Error(x.j.error || x.j.message || "sync-price failed");
            load();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function post(url, body) {
        fetch(url, {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: body ? JSON.stringify(body) : "{}",
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка");
            load();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function applySmartSearchFromInput() {
        var raw = document.getElementById("mp-f-smart").value;
        var parsed = parseSmartSearch(raw);
        if (parsed.site) {
          var sel = document.getElementById("f-site");
          var ok = false;
          for (var i = 0; i < sel.options.length; i++) {
            if (String(sel.options[i].value) === String(parsed.site)) {
              sel.selectedIndex = i;
              ok = true;
              break;
            }
          }
        }
        if (parsed.status) {
          var sv = parsed.status.toLowerCase();
          if (sv === "active" || sv === "1")
            document.getElementById("mp-f-status").value = "1";
          else if (sv === "inactive" || sv === "hidden" || sv === "0")
            document.getElementById("mp-f-status").value = "0";
        }
        apiSearch = parsed.search || "";
        offset = 0;
        updateSubtitle();
        updateSyncSiteButton();
        load();
      }

      document.getElementById("btn-apply").addEventListener("click", function () {
        offset = 0;
        try {
          localStorage.setItem(
            userSortKey(),
            JSON.stringify({
              sort_by: document.getElementById("mp-f-sort-by").value,
              sort_dir: document.getElementById("mp-f-sort-dir").value,
            })
          );
        } catch (e) {}
        persistMyProductsFilterForm();
        load();
      });
      document.getElementById("mp-filter-default").addEventListener("click", function () {
        if (window.DatagonFilters) window.DatagonFilters.clear("my_products");
        document.getElementById("mp-f-smart").value = "";
        apiSearch = "";
        offset = 0;
        document.getElementById("f-site").value = "all";
        document.getElementById("mp-f-status").value = "all";
        document.getElementById("mp-f-source_enabled").value = "all";
        document.getElementById("f-ms").value = "all";
        document.getElementById("mp-tf-source_id").value = "";
        document.getElementById("mp-tf-site_name").value = "";
        document.getElementById("mp-tf-sku").value = "";
        document.getElementById("mp-tf-name").value = "";
        document.getElementById("mp-tf-currency").value = "all";
        document.getElementById("mp-f-stock_min").value = "";
        document.getElementById("mp-f-stock_max").value = "";
        document.getElementById("mp-f-limit").value = String(initialLimit);
        document.getElementById("mp-f-match_audit").value = "all";
        document.getElementById("mp-f-sort-by").value = "id";
        document.getElementById("mp-f-sort-dir").value = "asc";
        document.getElementById("mp-f-gap_enabled").checked = false;
        document.getElementById("mp-f-gap_exclude_zero").checked = true;
        document.getElementById("mp-f-gap_competitor").value = "all";
        document.getElementById("mp-f-gap_min_pct").value = "-100";
        document.getElementById("mp-f-gap_max_pct").value = "100";
        document.getElementById("mp-f-usd_to_rub").value = "";
        document.getElementById("mp-f-eur_to_rub").value = "";
        document.getElementById("mp-f-comp_min").value = "0.1";
        document.getElementById("mp-f-comp_max").value = "1";
        try {
          window.history.replaceState(null, "", window.location.pathname);
        } catch (e2) {}
        try {
          localStorage.setItem(
            userSortKey(),
            JSON.stringify({
              sort_by: document.getElementById("mp-f-sort-by").value,
              sort_dir: document.getElementById("mp-f-sort-dir").value,
            })
          );
        } catch (e3) {}
        updateSubtitle();
        updateSyncSiteButton();
        updateSortHeaders();
        load();
      });

      document.querySelectorAll("#mp-thead-row [data-mp-sort]").forEach(function (th) {
        th.addEventListener("click", function () {
          setSort(th.getAttribute("data-mp-sort"));
        });
      });
      window.addEventListener("mousemove", onResizeMove);
      window.addEventListener("mouseup", onResizeUp);

      window.addEventListener("scroll", onScrollMpFloatingHeader, { passive: true });
      window.addEventListener("resize", function () {
        updateMpStickyTopVar();
        mpRefreshFloatingAfterLayout();
      });
      (function bindMpScrollContainers() {
        var mainOuter = document.querySelector(".app-main__outer");
        if (mainOuter && mainOuter.addEventListener) {
          mainOuter.addEventListener("scroll", onScrollMpFloatingHeader, { passive: true });
        }
        var horiz = document.querySelector(".dg-mp-table-scroll-outer");
        if (horiz && horiz.addEventListener) {
          horiz.addEventListener("scroll", onScrollMpFloatingHeader, { passive: true });
        }
      })();

      [
        "mp-tf-source_id",
        "mp-tf-site_name",
        "mp-tf-sku",
        "mp-tf-name",
        "mp-tf-currency",
      ].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", applyTableFilterAndRender);
          el.addEventListener("change", applyTableFilterAndRender);
        }
      });

      document.getElementById("mp-f-smart").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          applySmartSearchFromInput();
        }
      });

      document.getElementById("f-site").addEventListener("change", function () {
        updateSubtitle();
        updateSyncSiteButton();
      });

      document.getElementById("mp-btn-fx").addEventListener("click", function () {
        fetch("/api/my-products/fx-rates?force=1", { credentials: "same-origin" })
          .then(function (r) {
            return r.json();
          })
          .then(function () {
            load();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      });
      document.getElementById("mp-btn-syncall").addEventListener("click", function () {
        post("/api/sync-all-start");
      });
      document.getElementById("mp-btn-sync-site").addEventListener("click", function () {
        var sid = document.getElementById("f-site").value;
        if (!sid || sid === "all") return;
        post("/api/sync-site-start", { site_id: Number(sid) });
      });
      document.getElementById("mp-btn-rebuild").addEventListener("click", function () {
        post("/api/ms/rebuild-links-cache");
      });
      document.getElementById("mp-btn-copy").addEventListener("click", function () {
        navigator.clipboard.writeText(window.location.href).catch(function () {});
      });
      (function initColumnsPanel() {
        try {
          var rawVisible = JSON.parse(localStorage.getItem(userVisibleColsKeyVanilla()) || "[]");
          if (Array.isArray(rawVisible) && rawVisible.length) {
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) {
              return rawVisible.indexOf(k) >= 0;
            });
          }
        } catch (e) {}
        var toggle = document.getElementById("dg-mp-columns-toggle");
        var panel = document.getElementById("dg-mp-columns-panel");
        var btnAll = document.getElementById("dg-mp-columns-all");
        var btnNone = document.getElementById("dg-mp-columns-none");
        var btnDef = document.getElementById("dg-mp-columns-default");
        if (toggle && panel) {
          toggle.addEventListener("click", function () {
            panel.classList.toggle("open");
            renderColumnsPanel();
          });
        }
        if (btnAll) {
          btnAll.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try {
              localStorage.setItem(userVisibleColsKeyVanilla(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnNone) {
          btnNone.addEventListener("click", function () {
            visibleCols = ["name"];
            try {
              localStorage.setItem(userVisibleColsKeyVanilla(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnDef) {
          btnDef.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try {
              localStorage.setItem(userVisibleColsKeyVanilla(), JSON.stringify(visibleCols));
            } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        renderColumnsPanel();
      })();

      (function collapse() {
        var body = document.getElementById("dg-mp-filters-body");
        var btn = document.getElementById("dg-mp-filters-toggle");
        function sync() {
          try {
            if (localStorage.getItem(MP_FILTERS_KEY) === "1") {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(MP_FILTERS_KEY) === "1") body.style.display = "none";
        } catch (e) {}
        sync();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(MP_FILTERS_KEY, hidden ? "0" : "1");
          } catch (e) {}
          mpRefreshFloatingAfterLayout();
        });
      })();

      (async function init() {
        updateMpStickyTopVar();
        try {
          columnWidths = JSON.parse(localStorage.getItem(userColWidthKey()) || "{}") || {};
        } catch (e) {
          columnWidths = {};
        }
        initColumnResizeHandles();
        await loadSites();
        parseUrlToForm();
        mergeMyProductsPrefsFromStorage();
        updateSubtitle();
        updateSyncSiteButton();
        updateSortHeaders();
        await load();
        mpRefreshFloatingAfterLayout();
      })();
    })();
  </script>
