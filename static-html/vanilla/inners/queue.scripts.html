  <script>
    (function () {
      var FILTERS_KEY = "datagon_queue_filters_collapsed_v1";
      var SORT_STORAGE_VERSION = "v1";
      var statusRu = {
        sitemap: "Sitemap",
        pending: "Ожидает",
        processing: "В обработке",
        done: "Готово",
        error: "Ошибка",
      };
      var statusBadgeClass = {
        sitemap: "bg-secondary",
        pending: "bg-warning",
        processing: "bg-info",
        done: "bg-success",
        error: "bg-danger",
      };

      var projects = [];
      var rows = [];
      var total = 0;
      var page = 1;
      var limit = 100;
      var sortBy = "id";
      var sortDir = "desc";
      var loading = false;
      var pollTimer = null;
      var urlDebounce = null;
      var searchLoadDebounce = null;
      var DEFAULT_VISIBLE_COLS = [
        "id","project_id","page_type","url","added_from","added_at","status","parsed_at","matched","last_error","actions"
      ];
      var visibleCols = DEFAULT_VISIBLE_COLS.slice();
      var columnWidths = {};
      var resizeState = null;

      var FLOATING_HEADER_OFFSET_PX = 2;
      var FLOATING_HEADER_START_EPS_PX = 3;
      var qFloatingHeaderRaf = 0;
      var qFloatingLastScrollTs = 0;

      function updateQStickyTopVar() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        var top = 0;
        if (fixed && header && header.getBoundingClientRect) {
          var rect = header.getBoundingClientRect();
          top = rect && rect.height ? rect.height : 60;
        }
        document.documentElement.style.setProperty("--dg-table-sticky-top", top + "px");
      }

      function getQStickyTopPx() {
        var app = document.querySelector(".app-container");
        var header = document.querySelector(".app-header");
        var fixed = Boolean(app && app.classList && app.classList.contains("fixed-header"));
        if (!fixed) return 0;
        if (!header || !header.getBoundingClientRect) return 60;
        var rect = header.getBoundingClientRect();
        var h = rect && rect.height ? rect.height : 60;
        return h > 0 ? h : 60;
      }

      function captureQTheadBaseTop() {
        var thead = document.getElementById("dg-q-thead");
        if (!thead) return;
        thead.style.transform = "";
        thead.style.position = "";
        thead.style.zIndex = "";
        thead.style.willChange = "";
        thead.removeAttribute("data-dg-floating");
        var rect = thead.getBoundingClientRect();
        var absTop = (window.scrollY || window.pageYOffset || 0) + (rect && rect.top ? rect.top : 0);
        thead.setAttribute("data-dg-base-top", String(absTop));
      }

      function updateQFloatingHeaderFallback() {
        var thead = document.getElementById("dg-q-thead");
        if (!thead) return;
        var table = thead.closest("table");
        if (!table || !table.getBoundingClientRect) return;
        var row = thead.querySelector("tr");
        if (!row) return;

        var y = window.scrollY || window.pageYOffset || 0;
        var headerTop = getQStickyTopPx();

        var baseTopAbs = Number(thead.getAttribute("data-dg-base-top") || 0);
        if (!Number.isFinite(baseTopAbs) || baseTopAbs <= 0) return;
        var tableRect = table.getBoundingClientRect();
        var tableBottom = tableRect.bottom + y;
        var rowRect = row.getBoundingClientRect();
        var rowHeight = rowRect && rowRect.height ? rowRect.height : 0;

        var headerLine = y + headerTop;
        var start = baseTopAbs + FLOATING_HEADER_START_EPS_PX;
        var end = tableBottom - rowHeight;
        if (headerLine <= start || headerLine >= end) {
          if (thead.style.transform) {
            thead.style.transform = "";
            thead.style.position = "";
            thead.style.zIndex = "";
            thead.style.willChange = "";
            thead.removeAttribute("data-dg-floating");
          }
          return;
        }

        var zoomAwareOffset = FLOATING_HEADER_OFFSET_PX;
        var dpr = window.devicePixelRatio || 1;
        if (Math.abs(dpr - 1) < 0.03) zoomAwareOffset = FLOATING_HEADER_OFFSET_PX - 3;
        var shift = Math.max(0, headerLine - start - zoomAwareOffset);
        var shiftPx = Number(shift.toFixed(3));
        var nextTransform = "translate3d(0," + shiftPx + "px,0)";
        if (thead.style.transform !== nextTransform) {
          thead.style.transform = nextTransform;
          thead.style.position = "relative";
          thead.style.zIndex = "25";
          thead.style.willChange = "transform";
          thead.setAttribute("data-dg-floating", "1");
        }
      }

      function qFloatingHeaderTick(ts) {
        qFloatingHeaderRaf = 0;
        updateQFloatingHeaderFallback();
        if (ts - qFloatingLastScrollTs < 140) {
          qFloatingHeaderRaf = requestAnimationFrame(qFloatingHeaderTick);
        }
      }

      function scheduleQFloatingHeaderUpdate() {
        qFloatingLastScrollTs = performance.now();
        if (qFloatingHeaderRaf) return;
        qFloatingHeaderRaf = requestAnimationFrame(qFloatingHeaderTick);
      }

      function onScrollQFloatingHeader() {
        scheduleQFloatingHeaderUpdate();
      }

      function qRefreshFloatingAfterLayout() {
        requestAnimationFrame(function () {
          captureQTheadBaseTop();
          scheduleQFloatingHeaderUpdate();
        });
      }

      function userSortKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_queue_sort_" + SORT_STORAGE_VERSION + ":" + u;
        } catch (e) {
          return "datagon_queue_sort_" + SORT_STORAGE_VERSION + ":guest";
        }
      }
      function userVisibleColsKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_queue_visible_cols_v1:" + u;
        } catch (e) {
          return "datagon_queue_visible_cols_v1:guest";
        }
      }
      function userColWidthKey() {
        try {
          var u = String(localStorage.getItem("currentUser") || "guest").trim() || "guest";
          return "datagon_queue_col_widths_v1:" + u;
        } catch (e) {
          return "datagon_queue_col_widths_v1:guest";
        }
      }
      function updateSortHeaders() {
        document.querySelectorAll("th[data-q-sort]").forEach(function (th) {
          var f = th.getAttribute("data-q-sort");
          if (th.getAttribute("data-q-no-sort") === "1") {
            var baseNs = th.getAttribute("data-q-label");
            if (!baseNs) {
              baseNs = String(th.textContent || "").trim();
              th.setAttribute("data-q-label", baseNs);
            }
            return;
          }
          var base = th.getAttribute("data-q-label");
          if (!base) {
            base = String(th.textContent || "").replace(/\s*[↑↓]\s*$/, "").trim();
            th.setAttribute("data-q-label", base);
          }
          var labelEl = th.querySelector(".q-sort-label");
          if (!labelEl) {
            labelEl = document.createElement("span");
            labelEl.className = "q-sort-label";
            th.insertBefore(labelEl, th.firstChild || null);
          }
          labelEl.textContent = base + (sortBy === f ? (sortDir === "asc" ? " ↑" : " ↓") : "");
          Array.prototype.slice.call(th.childNodes).forEach(function (node) {
            if (node === labelEl) return;
            if (node.classList && node.classList.contains("q-resize-handle")) return;
            if (node.nodeType === Node.TEXT_NODE) th.removeChild(node);
          });
        });
        initColumnResizeHandles();
        applyStoredColumnWidths();
        qRefreshFloatingAfterLayout();
      }
      function getHeaderCells() {
        return Array.prototype.slice.call(document.querySelectorAll("#dg-q-main-table thead th"));
      }
      function applyColumnWidthByIndex(index, widthPx) {
        var w = Math.max(80, Math.min(420, Math.round(Number(widthPx) || 0)));
        if (!Number.isFinite(w) || w <= 0) return;
        columnWidths[index] = w;
        var headers = getHeaderCells();
        if (headers[index]) {
          headers[index].style.width = w + "px";
          headers[index].style.minWidth = w + "px";
          headers[index].style.maxWidth = w + "px";
        }
        document.querySelectorAll("#dg-q-tbody tr").forEach(function (tr) {
          if (!tr.cells || !tr.cells[index]) return;
          tr.cells[index].style.width = w + "px";
          tr.cells[index].style.minWidth = w + "px";
          tr.cells[index].style.maxWidth = w + "px";
        });
      }
      function applyStoredColumnWidths() {
        Object.keys(columnWidths || {}).forEach(function (k) {
          var idx = Number(k);
          if (!Number.isFinite(idx)) return;
          applyColumnWidthByIndex(idx, columnWidths[k]);
        });
      }
      function onResizeMove(e) {
        if (!resizeState) return;
        var delta = e.clientX - resizeState.startX;
        applyColumnWidthByIndex(resizeState.index, resizeState.startWidth + delta);
        scheduleQFloatingHeaderUpdate();
      }
      function onResizeUp() {
        if (!resizeState) return;
        resizeState = null;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        try { localStorage.setItem(userColWidthKey(), JSON.stringify(columnWidths || {})); } catch (e) {}
        qRefreshFloatingAfterLayout();
      }
      function initColumnResizeHandles() {
        getHeaderCells().forEach(function (th, index) {
          if (th.getAttribute("data-q-resize-ready") === "1") return;
          th.setAttribute("data-q-resize-ready", "1");
          th.style.position = "relative";
          th.style.overflow = "visible";
          th.addEventListener("mousemove", function (ev) {
            var rect = th.getBoundingClientRect();
            if (!rect) return;
            th.style.cursor = ev.clientX >= rect.right - 24 ? "col-resize" : "";
          });
          th.addEventListener("mouseleave", function () {
            th.style.cursor = "";
          });
          th.addEventListener("mousedown", function (ev) {
            var rect = th.getBoundingClientRect();
            if (!rect) return;
            if (ev.clientX < rect.right - 24) return;
            ev.preventDefault();
            ev.stopPropagation();
            var w = Number(columnWidths[index] || (rect && rect.width ? rect.width : 0));
            resizeState = { index: index, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          var handle = document.createElement("span");
          handle.className = "q-resize-handle";
          handle.setAttribute("role", "separator");
          handle.title = "Потяните, чтобы изменить ширину";
          handle.style.cssText =
            "position:absolute;top:50%;right:0;width:8px;height:18px;transform:translateY(-50%);cursor:col-resize;z-index:8;" +
            "background:linear-gradient(to right,transparent 42%,#cfd6df 42%,#cfd6df 58%,transparent 58%);opacity:0";
          handle.addEventListener("mousedown", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            var rect = th.getBoundingClientRect();
            var w = Number(columnWidths[index] || (rect && rect.width ? rect.width : 0));
            resizeState = { index: index, startX: ev.clientX, startWidth: w > 0 ? w : 120 };
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
          });
          handle.addEventListener("click", function (ev) { ev.stopPropagation(); });
          th.appendChild(handle);
        });
      }
      function applyVisibleColumns() {
        var headers = getHeaderCells();
        headers.forEach(function (th, index) {
          var key = th.getAttribute("data-q-sort");
          if (!key) key = index === headers.length - 2 ? "last_error" : "actions";
          var show = visibleCols.indexOf(key) >= 0;
          th.style.display = show ? "" : "none";
          document.querySelectorAll("#dg-q-tbody tr").forEach(function (tr) {
            if (tr.cells && tr.cells[index]) tr.cells[index].style.display = show ? "" : "none";
          });
        });
        qRefreshFloatingAfterLayout();
      }
      function renderColumnsPanel() {
        var list = document.getElementById("dg-q-columns-list");
        if (!list) return;
        list.replaceChildren();
        getHeaderCells().forEach(function (th, index) {
          var key = th.getAttribute("data-q-sort");
          if (!key) key = index === getHeaderCells().length - 2 ? "last_error" : "actions";
          var label = String(th.getAttribute("data-q-label") || th.textContent || "").replace(/\s*[↑↓]\s*$/, "").trim();
          var row = document.createElement("label");
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = visibleCols.indexOf(key) >= 0;
          cb.addEventListener("change", function () {
            var next = visibleCols.slice();
            if (cb.checked) { if (next.indexOf(key) < 0) next.push(key); }
            else next = next.filter(function (k) { return k !== key; });
            if (!next.length) { cb.checked = true; return; }
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) { return next.indexOf(k) >= 0; });
            try { localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols)); } catch (e) {}
            applyVisibleColumns();
          });
          row.appendChild(cb);
          row.appendChild(document.createTextNode(label));
          list.appendChild(row);
        });
      }

      function readApiFilters() {
        return {
          project_id: document.getElementById("dg-q-f-project").value,
          type: document.getElementById("dg-q-f-type").value,
          status: document.getElementById("dg-q-f-status").value,
          matched: document.getElementById("dg-q-f-matched").value,
          search: document.getElementById("dg-q-f-search").value.trim(),
        };
      }

      function readTableFilters() {
        return {
          id: document.getElementById("dg-q-tf-id").value.trim(),
          url: document.getElementById("dg-q-tf-url").value.trim(),
          added_from: document.getElementById("dg-q-tf-added_from").value.trim(),
          status: document.getElementById("dg-q-tf-status").value,
          page_type: document.getElementById("dg-q-tf-page_type").value,
          matched: document.getElementById("dg-q-tf-matched").value,
        };
      }

      function collectQueueFilterForm() {
        var f = readApiFilters();
        var t = readTableFilters();
        return {
          project_id: f.project_id,
          type: f.type,
          status: f.status,
          matched: f.matched,
          search: f.search,
          tf_id: t.id,
          tf_url: t.url,
          tf_added_from: t.added_from,
          tf_status: t.status,
          tf_page_type: t.page_type,
          tf_matched: t.matched,
          page: String(page),
          limit: String(limit),
          sort_by: sortBy,
          sort_dir: sortDir,
        };
      }

      function persistQueueFilterForm() {
        try {
          if (window.DatagonFilters) window.DatagonFilters.save("queue", collectQueueFilterForm());
        } catch (e) {}
      }

      function mergeQueuePrefsFromStorage() {
        var DF = window.DatagonFilters;
        if (!DF || !DF.load) return;
        var prefs = DF.load("queue");
        if (!prefs) return;
        var p;
        try {
          p = new URLSearchParams(window.location.search);
        } catch (e2) {
          p = new URLSearchParams();
        }
        function missing(k) {
          return !p.has(k);
        }
        if (missing("search") && prefs.search != null)
          document.getElementById("dg-q-f-search").value = String(prefs.search);
        if (missing("project_id") && prefs.project_id != null) {
          var sel = document.getElementById("dg-q-f-project");
          var w = String(prefs.project_id);
          if ([].some.call(sel.options, function (o) {
            return o.value === w;
          }))
            sel.value = w;
          else if (w === "all") sel.value = "all";
        }
        if (missing("type") && prefs.type != null) document.getElementById("dg-q-f-type").value = String(prefs.type);
        if (missing("status") && prefs.status != null) document.getElementById("dg-q-f-status").value = String(prefs.status);
        if (missing("matched") && prefs.matched != null)
          document.getElementById("dg-q-f-matched").value = String(prefs.matched);
        if (prefs.tf_id != null) document.getElementById("dg-q-tf-id").value = String(prefs.tf_id);
        if (prefs.tf_url != null) document.getElementById("dg-q-tf-url").value = String(prefs.tf_url);
        if (prefs.tf_added_from != null)
          document.getElementById("dg-q-tf-added_from").value = String(prefs.tf_added_from);
        if (prefs.tf_status != null) document.getElementById("dg-q-tf-status").value = String(prefs.tf_status);
        if (prefs.tf_page_type != null) document.getElementById("dg-q-tf-page_type").value = String(prefs.tf_page_type);
        if (prefs.tf_matched != null) document.getElementById("dg-q-tf-matched").value = String(prefs.tf_matched);
        if (missing("page") && prefs.page != null) {
          var pg = Number(prefs.page);
          if (Number.isFinite(pg) && pg > 0) page = pg;
        }
        if (missing("limit") && prefs.limit != null) {
          var l = Number(prefs.limit);
          if ([50, 100, 500, 1000].includes(l)) {
            limit = l;
            document.getElementById("dg-q-limit").value = String(l);
          }
        }
        if (missing("sort_by") && prefs.sort_by) sortBy = String(prefs.sort_by);
        if (missing("sort_dir") && (prefs.sort_dir === "asc" || prefs.sort_dir === "desc")) sortDir = prefs.sort_dir;
      }

      function buildQueueUrl() {
        var f = readApiFilters();
        var s = new URLSearchParams({
          limit: String(limit),
          offset: String((page - 1) * limit),
          sort_by: sortBy,
          sort_dir: sortDir,
        });
        Object.keys(f).forEach(function (k) {
          var v = f[k];
          if (!v || v === "all") return;
          s.set(k, String(v));
        });
        return "/api/pages?" + s.toString();
      }

      function syncUrl() {
        var f = readApiFilters();
        var params = new URLSearchParams();
        Object.keys(f).forEach(function (k) {
          var v = f[k];
          if (!v || v === "all") return;
          params.set(k, String(v));
        });
        if (page > 1) params.set("page", String(page));
        if (limit !== 100) params.set("limit", String(limit));
        if (sortBy !== "id") params.set("sort_by", sortBy);
        if (sortDir !== "desc") params.set("sort_dir", sortDir);
        var next = params.toString()
          ? window.location.pathname + "?" + params.toString()
          : window.location.pathname;
        try {
          window.history.replaceState(null, "", next);
        } catch (e) {}
      }

      function scheduleSyncUrl() {
        if (urlDebounce) clearTimeout(urlDebounce);
        urlDebounce = setTimeout(function () {
          urlDebounce = null;
          syncUrl();
        }, 200);
      }

      function parseUrlToForm() {
        var params = new URLSearchParams(window.location.search);
        ["project_id", "type", "status", "matched", "search"].forEach(function (k) {
          var v = params.get(k);
          if (v === null || v === "") return;
          if (k === "search") document.getElementById("dg-q-f-search").value = v;
          if (k === "project_id") document.getElementById("dg-q-f-project").value = v;
          if (k === "type") document.getElementById("dg-q-f-type").value = v;
          if (k === "status") document.getElementById("dg-q-f-status").value = v;
          if (k === "matched") document.getElementById("dg-q-f-matched").value = v;
        });
        var p = Number(params.get("page") || 1);
        var l = Number(params.get("limit") || 100);
        if (Number.isFinite(p) && p > 0) page = p;
        if ([50, 100, 500, 1000].includes(l)) {
          limit = l;
          document.getElementById("dg-q-limit").value = String(l);
        }
        var sb = params.get("sort_by") || "id";
        var sd = params.get("sort_dir") === "asc" ? "asc" : "desc";
        sortBy = sb;
        sortDir = sd;
        if (!params.get("sort_by") || !params.get("sort_dir")) {
          try {
            var saved = JSON.parse(localStorage.getItem(userSortKey()) || "{}");
            if (saved && saved.sort_by) sortBy = saved.sort_by;
            if (saved && (saved.sort_dir === "asc" || saved.sort_dir === "desc")) sortDir = saved.sort_dir;
          } catch (e) {}
        }
      }

      function fillProjectSelects(list) {
        var up = document.getElementById("dg-q-upload-project");
        var fp = document.getElementById("dg-q-f-project");
        var upVal = up.value;
        var fpVal = fp.value;
        up.innerHTML = '<option value="">Выберите проект...</option>';
        fp.innerHTML = '<option value="all">Все проекты</option>';
        (list || []).forEach(function (p) {
          var o1 = document.createElement("option");
          o1.value = String(p.id);
          o1.textContent = p.name || "#" + p.id;
          up.appendChild(o1);
          var o2 = document.createElement("option");
          o2.value = String(p.id);
          o2.textContent = p.name || "#" + p.id;
          fp.appendChild(o2);
        });
        if ([].slice.call(up.options).some(function (o) { return o.value === upVal; })) up.value = upVal;
        if ([].slice.call(fp.options).some(function (o) { return o.value === fpVal; })) fp.value = fpVal;
        mergeQueuePrefsFromStorage();
      }

      function setDiscoveryHint(text) {
        var el = document.getElementById("dg-q-discovery-hint");
        if (el) el.textContent = text;
      }

      function activeProjectId() {
        var f = readApiFilters();
        return f.project_id !== "all" ? f.project_id : document.getElementById("dg-q-upload-project").value;
      }

      function refreshDiscoveryStatus(projectId) {
        if (!projectId || projectId === "all") {
          setDiscoveryHint("Автообход: выберите конкретный проект");
          return;
        }
        fetch("/api/pages/discover-status?project_id=" + encodeURIComponent(projectId), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Не удалось получить статус");
            var json = x.j;
            var activeLabel = json.active ? "выполняется" : "ожидание";
            var base =
              "Автообход (" +
              activeLabel +
              "): найдено " +
              (json.discovered || 0) +
              ", новых из sitemap " +
              (json.added_sitemap || 0) +
              ", добавлено со стр. " +
              (json.added_from_page || 0);
            setDiscoveryHint(json.message ? base + " | " + json.message : base);
          })
          .catch(function (e) {
            setDiscoveryHint("Автообход: ошибка статуса - " + (e.message || e));
          });
      }

      function filterRows(data) {
        var tf = readTableFilters();
        return (data || []).filter(function (r) {
          if (tf.id && !String(r.id || "").includes(String(tf.id).trim())) return false;
          if (tf.url && !String(r.url || "").toLowerCase().includes(String(tf.url).trim().toLowerCase())) return false;
          if (tf.added_from && !String(r.added_from || "").toLowerCase().includes(String(tf.added_from).trim().toLowerCase()))
            return false;
          if (tf.status !== "all" && String(r.status || "").toLowerCase() !== String(tf.status).toLowerCase()) return false;
          if (tf.page_type !== "all" && String(r.page_type || "").toLowerCase() !== String(tf.page_type).toLowerCase())
            return false;
          var isMatched = Number(r.is_matched || 0) === 1 ? "1" : "0";
          if (tf.matched !== "all" && isMatched !== tf.matched) return false;
          return true;
        });
      }

      function appendHighlightedUrl(a, urlValue, needle) {
        var source = String(urlValue || "");
        var n = String(needle || "").trim();
        if (!n) {
          a.textContent = source;
          return;
        }
        var idx = source.toLowerCase().indexOf(n.toLowerCase());
        if (idx === -1) {
          a.textContent = source;
          return;
        }
        a.appendChild(document.createTextNode(source.slice(0, idx)));
        var mark = document.createElement("mark");
        mark.textContent = source.slice(idx, idx + n.length);
        a.appendChild(mark);
        a.appendChild(document.createTextNode(source.slice(idx + n.length)));
      }

      function projectName(id) {
        var found = projects.find(function (p) {
          return String(p.id) === String(id);
        });
        return found ? found.name : id;
      }

      function renderTable() {
        updateSortHeaders();
        var tbody = document.getElementById("dg-q-tbody");
        var hint = document.getElementById("dg-q-table-hint");
        tbody.replaceChildren();
        if (hint) hint.textContent = "Всего: " + Number(total || 0).toLocaleString("ru-RU");
        var searchNeedle = readApiFilters().search;
        var filtered = filterRows(rows);
        if (loading) {
          var trL = document.createElement("tr");
          var tdL = document.createElement("td");
          tdL.colSpan = 11;
          tdL.className = "text-muted";
          tdL.textContent = "Загрузка...";
          trL.appendChild(tdL);
          tbody.appendChild(trL);
          applyVisibleColumns();
          applyStoredColumnWidths();
          updatePager();
          qRefreshFloatingAfterLayout();
          return;
        }
        if (!filtered.length) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.colSpan = 11;
          td.className = "text-muted";
          td.textContent = "Нет данных";
          tr.appendChild(td);
          tbody.appendChild(tr);
          applyVisibleColumns();
          applyStoredColumnWidths();
          updatePager();
          qRefreshFloatingAfterLayout();
          return;
        }
        filtered.forEach(function (r) {
          var matched = Number(r.is_matched || 0) === 1;
          var tr = document.createElement("tr");
          if (matched) tr.className = "table-success";
          var canRun = ["sitemap", "pending", "error"].includes(String(r.status || "").toLowerCase());
          var tdUrl = document.createElement("td");
          tdUrl.style.maxWidth = "320px";
          tdUrl.className = "text-truncate";
          var link = document.createElement("a");
          link.href = r.url || "#";
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          appendHighlightedUrl(link, r.url, searchNeedle);
          tdUrl.appendChild(link);
          var st = String(r.status || "").toLowerCase();
          var badge = document.createElement("span");
          badge.className = "badge " + (statusBadgeClass[st] || "bg-secondary");
          badge.textContent = statusRu[st] || r.status || "-";
          var tdAct = document.createElement("td");
          tdAct.className = "text-nowrap";
          if (canRun) {
            var btnRun = document.createElement("button");
            btnRun.type = "button";
            btnRun.className = "btn btn-sm btn-outline-primary me-1";
            btnRun.textContent = "Запуск";
            btnRun.addEventListener("click", function () {
              parsePage(r.id);
            });
            tdAct.appendChild(btnRun);
          }
          var btnDel = document.createElement("button");
          btnDel.type = "button";
          btnDel.className = "btn btn-sm btn-outline-danger";
          btnDel.textContent = "Удалить";
          btnDel.addEventListener("click", function () {
            deletePage(r.id);
          });
          tdAct.appendChild(btnDel);
          function tdText(t) {
            var x = document.createElement("td");
            x.textContent = t == null ? "" : String(t);
            return x;
          }
          tr.appendChild(tdText(r.id));
          tr.appendChild(tdText(projectName(r.project_id)));
          tr.appendChild(tdText(r.page_type || "-"));
          tr.appendChild(tdUrl);
          tr.appendChild(tdText(r.added_from || "-"));
          tr.appendChild(
            tdText(r.added_at ? new Date(r.added_at).toLocaleString("ru-RU") : "-")
          );
          var tdSt = document.createElement("td");
          tdSt.appendChild(badge);
          tr.appendChild(tdSt);
          tr.appendChild(
            tdText(r.parsed_at ? new Date(r.parsed_at).toLocaleString("ru-RU") : "-")
          );
          var tdM = document.createElement("td");
          if (matched) {
            var b = document.createElement("span");
            b.className = "badge bg-success";
            b.textContent = "Сопоставлено";
            tdM.appendChild(b);
          } else tdM.textContent = "-";
          tr.appendChild(tdM);
          var tdE = document.createElement("td");
          tdE.className = "small text-danger";
          tdE.textContent = r.last_error || "";
          tr.appendChild(tdE);
          tr.appendChild(tdAct);
          tbody.appendChild(tr);
        });
        applyVisibleColumns();
        applyStoredColumnWidths();
        initColumnResizeHandles();
        updatePager();
        qRefreshFloatingAfterLayout();
      }

      function pagesCount() {
        return Math.max(1, Math.ceil(Number(total || 0) / Number(limit || 100)));
      }

      function updatePager() {
        var prev = document.getElementById("dg-q-prev");
        var next = document.getElementById("dg-q-next");
        var pc = pagesCount();
        if (prev) prev.disabled = page <= 1;
        if (next) next.disabled = page >= pc;
      }

      function showLoadErr(msg) {
        var el = document.getElementById("dg-q-err");
        if (!el) return;
        if (!msg) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.style.display = "";
        el.textContent = msg;
      }

      function loadPages(opts) {
        var silent = Boolean(opts && opts.silent);
        if (searchLoadDebounce) {
          clearTimeout(searchLoadDebounce);
          searchLoadDebounce = null;
        }
        if (!silent) {
          loading = true;
          showLoadErr("");
          renderTable();
        }
        fetch(buildQueueUrl(), { credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok) throw new Error(x.j.error || "Ошибка загрузки очереди");
            var json = x.j;
            var data = json.data || json.rows || [];
            rows = Array.isArray(data) ? data : [];
            total = Number(json.total || 0);
            loading = false;
            renderTable();
            syncUrl();
            refreshDiscoveryStatus(activeProjectId());
            qRefreshFloatingAfterLayout();
            if (!silent) persistQueueFilterForm();
          })
          .catch(function (e) {
            loading = false;
            if (!silent) {
              rows = [];
              total = 0;
              renderTable();
              showLoadErr(e.message || "Ошибка загрузки очереди");
              qRefreshFloatingAfterLayout();
            }
          });
      }

      function loadBaseData() {
        return Promise.all([
          fetch("/api/projects", { credentials: "same-origin" }).then(function (r) {
            return r.json();
          }),
          fetch("/api/settings", { credentials: "same-origin" }).then(function (r) {
            return r.json();
          }),
        ])
          .then(function (arr) {
            var pj = arr[0];
            var st = arr[1];
            if (Array.isArray(pj)) {
              projects = pj;
              fillProjectSelects(projects);
            }
            var dl = Number(st.default_limit || 100);
            if ([50, 100, 500, 1000].includes(dl)) {
              limit = dl;
              document.getElementById("dg-q-limit").value = String(dl);
            }
          })
          .catch(function () {});
      }

      function parseSmartSearch() {
        var raw = String(document.getElementById("dg-q-f-search").value || "").trim();
        if (!raw) return;
        var tokens = raw.match(/"[^"]+"|\S+/g) || [];
        var free = [];
        var next = readApiFilters();
        tokens.forEach(function (token) {
          var idx = token.indexOf(":");
          if (idx > 0) {
            var key = token.slice(0, idx).toLowerCase();
            var value = token.slice(idx + 1).trim().replace(/^"(.*)"$/, "$1");
            if (key === "project" || key === "project_id") next.project_id = value;
            else if (key === "type") next.type = value;
            else if (key === "status") next.status = value;
            else if (key === "code" || key === "sku" || key === "name") free.push(value);
            else free.push(token);
          } else {
            free.push(token.replace(/^"(.*)"$/, "$1"));
          }
        });
        next.search = free.join(" ").trim();
        document.getElementById("dg-q-f-search").value = next.search;
        document.getElementById("dg-q-f-type").value = next.type && next.type !== "" ? next.type : "all";
        document.getElementById("dg-q-f-status").value = next.status || "";
        document.getElementById("dg-q-f-matched").value = next.matched || "all";
        var sel = document.getElementById("dg-q-f-project");
        var want = String(next.project_id || "all");
        if (want !== "all" && [].some.call(sel.options, function (o) { return o.value === want; })) sel.value = want;
        else sel.value = "all";
        page = 1;
        loadPages();
      }

      function onSort(field) {
        if (sortBy === field) sortDir = sortDir === "asc" ? "desc" : "asc";
        else {
          sortBy = field;
          sortDir = "asc";
        }
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sort_by: sortBy, sort_dir: sortDir }));
        } catch (e) {}
        page = 1;
        updateSortHeaders();
        persistQueueFilterForm();
        loadPages();
      }

      function postQueueAction(url, body) {
        return fetch(url, {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {}),
        }).then(function (r) {
          return r.json().then(function (j) {
            return { r: r, j: j };
          });
        });
      }

      function addBulk() {
        var pid = document.getElementById("dg-q-upload-project").value;
        var text = document.getElementById("dg-q-upload-text").value.trim();
        if (!pid || !text) {
          alert("Выберите проект и вставьте URL");
          return;
        }
        postQueueAction("/api/pages/bulk", { project_id: pid, urls_text: text })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось загрузить URL");
            document.getElementById("dg-q-upload-text").value = "";
            alert("Добавлено URL: " + (x.j.count || 0));
            loadPages();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function startDiscovery() {
        var aid = activeProjectId();
        if (!aid) {
          alert("Выберите конкретный проект");
          return;
        }
        if (!window.confirm("Запустить автообход URL?")) return;
        postQueueAction("/api/pages/discover-start", { project_id: Number(aid) }).then(function (x) {
          if (!x.r.ok) throw new Error(x.j.error || x.j.message || "Ошибка действия");
          refreshDiscoveryStatus(aid);
        }).catch(function (e) {
          alert(e.message || String(e));
        });
      }

      function stopDiscovery() {
        var aid = activeProjectId();
        if (!aid) {
          alert("Выберите конкретный проект");
          return;
        }
        if (!window.confirm("Остановить автообход URL?")) return;
        postQueueAction("/api/pages/discover-stop", { project_id: Number(aid) }).then(function (x) {
          if (!x.r.ok) throw new Error(x.j.error || x.j.message || "Ошибка действия");
          refreshDiscoveryStatus(aid);
        }).catch(function (e) {
          alert(e.message || String(e));
        });
      }

      function parseVisible() {
        if (!window.confirm("Запустить парсинг видимых страниц?")) return;
        var f = readApiFilters();
        postQueueAction("/api/parse/visible", {
          project_id: f.project_id === "all" ? null : f.project_id,
          status: f.status || null,
          type: f.type === "all" ? null : f.type,
        }).then(function (x) {
          if (!x.r.ok) throw new Error(x.j.error || x.j.message || "Ошибка действия");
          setTimeout(loadPages, 1000);
        }).catch(function (e) {
          alert(e.message || String(e));
        });
      }

      function resetOrClear(mode, kind) {
        var isReset = kind === "reset";
        if (!window.confirm(isReset ? "Вернуть страницы в очередь?" : "Удалить страницы?")) return;
        var f = readApiFilters();
        var payload = {
          project_id: f.project_id === "all" ? null : f.project_id,
          status: mode === "filtered" ? f.status || null : null,
          type: mode === "filtered" ? (f.type === "all" ? null : f.type) : null,
        };
        var url = isReset ? "/api/pages/reset" : "/api/pages/clear";
        postQueueAction(url, payload).then(function (x) {
          if (!x.r.ok) throw new Error(x.j.error || x.j.message || "Ошибка действия");
          if (isReset) alert("В pending: " + (x.j.reset != null ? x.j.reset : 0));
          else alert("Удалено: " + (x.j.deleted != null ? x.j.deleted : 0));
          loadPages();
        }).catch(function (e) {
          alert(e.message || String(e));
        });
      }

      function parsePage(id) {
        postQueueAction("/api/parse/page/" + id, {}).then(function (x) {
          if (!x.r.ok) throw new Error(x.j.error || x.j.message || "Ошибка действия");
          setTimeout(loadPages, 1000);
        }).catch(function (e) {
          alert(e.message || String(e));
        });
      }

      function deletePage(id) {
        if (!window.confirm("Удалить страницу из очереди?")) return;
        fetch("/api/pages/" + id, { method: "DELETE", credentials: "same-origin" })
          .then(function (r) {
            return r.json().then(function (j) {
              return { r: r, j: j };
            });
          })
          .then(function (x) {
            if (!x.r.ok || !x.j.success) throw new Error(x.j.error || "Не удалось удалить");
            loadPages();
          })
          .catch(function (e) {
            alert(e.message || String(e));
          });
      }

      function resetFilters() {
        if (window.DatagonQueueFilterBlocks && window.DatagonQueueFilterBlocks.reset) window.DatagonQueueFilterBlocks.reset();
        if (window.DatagonFilters) window.DatagonFilters.clear("queue");
        document.getElementById("dg-q-f-search").value = "";
        document.getElementById("dg-q-f-project").value = "all";
        document.getElementById("dg-q-f-type").value = "all";
        document.getElementById("dg-q-f-status").value = "";
        document.getElementById("dg-q-f-matched").value = "all";
        document.getElementById("dg-q-tf-id").value = "";
        document.getElementById("dg-q-tf-url").value = "";
        document.getElementById("dg-q-tf-added_from").value = "";
        document.getElementById("dg-q-tf-status").value = "all";
        document.getElementById("dg-q-tf-page_type").value = "all";
        document.getElementById("dg-q-tf-matched").value = "all";
        page = 1;
        sortBy = "id";
        sortDir = "desc";
        try {
          localStorage.setItem(userSortKey(), JSON.stringify({ sort_by: sortBy, sort_dir: sortDir }));
        } catch (e) {}
        try {
          window.history.replaceState(null, "", window.location.pathname);
        } catch (e2) {}
        updateSortHeaders();
        loadPages();
      }

      document.getElementById("queue-upload-urls").addEventListener("click", addBulk);
      document.getElementById("queue-apply").addEventListener("click", function () {
        if (String(document.getElementById("dg-q-f-search").value || "").trim()) {
          parseSmartSearch();
          return;
        }
        page = 1;
        loadPages();
      });
      document.getElementById("queue-reset").addEventListener("click", resetFilters);
      document.getElementById("queue-discovery-start").addEventListener("click", startDiscovery);
      document.getElementById("queue-discovery-stop").addEventListener("click", stopDiscovery);
      document.getElementById("queue-status-refresh").addEventListener("click", function () {
        refreshDiscoveryStatus(activeProjectId());
      });
      document.getElementById("queue-reset-filtered").addEventListener("click", function () {
        resetOrClear("filtered", "reset");
      });
      document.getElementById("queue-parse-visible").addEventListener("click", parseVisible);
      document.getElementById("queue-clear-filtered").addEventListener("click", function () {
        resetOrClear("filtered", "clear");
      });
      document.getElementById("queue-clear-all").addEventListener("click", function () {
        resetOrClear("all", "clear");
      });
      document.getElementById("queue-copy-link").addEventListener("click", function () {
        navigator.clipboard.writeText(window.location.href).catch(function () {});
      });

      document.getElementById("dg-q-f-search").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          parseSmartSearch();
        }
      });

      ["dg-q-f-project", "dg-q-f-type", "dg-q-f-status", "dg-q-f-matched"].forEach(function (id) {
        document.getElementById(id).addEventListener("change", function () {
          page = 1;
          scheduleSyncUrl();
        });
      });

      document.getElementById("dg-q-f-search").addEventListener("input", function () {
        scheduleSyncUrl();
      });

      document.getElementById("dg-q-limit").addEventListener("change", function () {
        limit = Number(this.value) || 100;
        page = 1;
        scheduleSyncUrl();
      });

      document.getElementById("dg-q-prev").addEventListener("click", function () {
        if (page > 1) {
          page--;
          loadPages();
        }
      });
      document.getElementById("dg-q-next").addEventListener("click", function () {
        if (page < pagesCount()) {
          page++;
          loadPages();
        }
      });

      document.querySelectorAll("th[data-q-sort]:not([data-q-no-sort])").forEach(function (th) {
        th.addEventListener("click", function () {
          onSort(th.getAttribute("data-q-sort"));
        });
      });
      window.addEventListener("mousemove", onResizeMove);
      window.addEventListener("mouseup", onResizeUp);

      window.addEventListener("scroll", onScrollQFloatingHeader, { passive: true });
      window.addEventListener("resize", function () {
        updateQStickyTopVar();
        qRefreshFloatingAfterLayout();
      });
      (function bindQScrollContainers() {
        var mainOuter = document.querySelector(".app-main__outer");
        if (mainOuter && mainOuter.addEventListener) {
          mainOuter.addEventListener("scroll", onScrollQFloatingHeader, { passive: true });
        }
        var horiz = document.querySelector(".dg-queue-table-scroll-outer");
        if (horiz && horiz.addEventListener) {
          horiz.addEventListener("scroll", onScrollQFloatingHeader, { passive: true });
        }
      })();

      [
        "dg-q-tf-id",
        "dg-q-tf-url",
        "dg-q-tf-added_from",
        "dg-q-tf-status",
        "dg-q-tf-page_type",
        "dg-q-tf-matched",
      ].forEach(function (id) {
        var el = document.getElementById(id);
        el.addEventListener("input", function () {
          scheduleSyncUrl();
        });
        el.addEventListener("change", function () {
          scheduleSyncUrl();
        });
      });

      (function queueFilterFieldVisibility() {
        var FIELD_GROUPS = [
          {
            title: "Основной ряд",
            subtitle: "",
            items: [
              { key: "smart", title: "Умный поиск", hint: "" },
              { key: "project", title: "Проект", hint: "" },
              { key: "type", title: "Тип", hint: "" },
              { key: "status", title: "Статус", hint: "" },
              { key: "matched", title: "Сопоставление", hint: "" },
            ],
          },
          {
            title: "По таблице",
            subtitle: "",
            items: [
              { key: "tf_id", title: "ID", hint: "" },
              { key: "tf_url", title: "URL", hint: "" },
              { key: "tf_added_from", title: "Добавлено откуда", hint: "" },
              { key: "tf_status", title: "Статус (таблица)", hint: "" },
              { key: "tf_page_type", title: "Тип (таблица)", hint: "" },
              { key: "tf_matched", title: "Сопоставление (таблица)", hint: "" },
            ],
          },
          {
            title: "Действия и подсказка",
            subtitle: "",
            items: [
              { key: "filter_actions", title: "Кнопки под фильтром", hint: "" },
              { key: "discovery_hint", title: "Текст про автообход", hint: "" },
            ],
          },
        ];
        if (window.DatagonFilterFieldsVisibility && window.DatagonFilterFieldsVisibility.init) {
          window.DatagonFilterFieldsVisibility.init({
            storageKeyPrefix: "datagon_queue_filter_fields_v2",
            attr: "data-dg-q-filter-field",
            fieldGroups: FIELD_GROUPS,
            togglesRootId: "dg-q-filter-blocks-toggles",
            idPrefix: "dg-q-ff-",
            exposeAs: "DatagonQueueFilterBlocks",
            onAfterApply: qRefreshFloatingAfterLayout,
          });
        }
      })();

      (function collapse() {
        var body = document.getElementById("dg-q-filters-collapsible");
        var btn = document.getElementById("dg-q-filters-toggle");
        function sync() {
          try {
            if (localStorage.getItem(FILTERS_KEY) === "1") {
              body.style.display = "none";
              btn.textContent = "Развернуть";
            } else {
              body.style.display = "";
              btn.textContent = "Свернуть";
            }
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(FILTERS_KEY) === "1") body.style.display = "none";
        } catch (e) {}
        sync();
        btn.addEventListener("click", function () {
          var hidden = body.style.display === "none";
          body.style.display = hidden ? "" : "none";
          btn.textContent = hidden ? "Свернуть" : "Развернуть";
          try {
            localStorage.setItem(FILTERS_KEY, hidden ? "0" : "1");
          } catch (e) {}
          qRefreshFloatingAfterLayout();
        });
      })();

      (function initColumnsPanel() {
        try {
          var rawVisible = JSON.parse(localStorage.getItem(userVisibleColsKey()) || "[]");
          if (Array.isArray(rawVisible) && rawVisible.length) {
            visibleCols = DEFAULT_VISIBLE_COLS.filter(function (k) { return rawVisible.indexOf(k) >= 0; });
          }
        } catch (e) {}
        try {
          columnWidths = JSON.parse(localStorage.getItem(userColWidthKey()) || "{}") || {};
        } catch (e) {
          columnWidths = {};
        }
        // Guard against stale/broken saved widths that create visual gaps.
        var headerCount = document.querySelectorAll("#dg-q-main-table thead th").length;
        var cleaned = {};
        Object.keys(columnWidths || {}).forEach(function (k) {
          var idx = Number(k);
          var w = Number(columnWidths[k]);
          if (!Number.isFinite(idx) || idx < 0 || idx >= headerCount) return;
          if (!Number.isFinite(w) || w < 80 || w > 420) return;
          cleaned[String(idx)] = Math.round(w);
        });
        columnWidths = cleaned;
        var toggle = document.getElementById("dg-q-columns-toggle");
        var panel = document.getElementById("dg-q-columns-panel");
        var btnAll = document.getElementById("dg-q-columns-all");
        var btnNone = document.getElementById("dg-q-columns-none");
        var btnDef = document.getElementById("dg-q-columns-default");
        if (toggle && panel) {
          toggle.addEventListener("click", function () {
            panel.classList.toggle("open");
            renderColumnsPanel();
          });
        }
        if (btnAll) {
          btnAll.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try { localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols)); } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnNone) {
          btnNone.addEventListener("click", function () {
            visibleCols = ["url"];
            try { localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols)); } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
        if (btnDef) {
          btnDef.addEventListener("click", function () {
            visibleCols = DEFAULT_VISIBLE_COLS.slice();
            try { localStorage.setItem(userVisibleColsKey(), JSON.stringify(visibleCols)); } catch (e) {}
            renderColumnsPanel();
            applyVisibleColumns();
          });
        }
      })();

      updateQStickyTopVar();
      loadBaseData().then(function () {
        parseUrlToForm();
        mergeQueuePrefsFromStorage();
        updateSortHeaders();
        loadPages();
      });
      pollTimer = setInterval(function () {
        loadPages({ silent: true });
      }, 5000);
      window.addEventListener("beforeunload", function () {
        if (pollTimer) clearInterval(pollTimer);
      });
    })();
  </script>
