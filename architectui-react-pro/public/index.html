<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000" />
    
    <!-- React 19 Compatibility - Minimal Early Loading Script -->
    <script>
      // Minimal React 19 ref compatibility - comprehensive console suppression
      (function() {
        const originalConsoleWarn = console.warn;
        const originalConsoleError = console.error;
        const originalConsoleLog = console.log;
        
        console.warn = function() {
          const message = arguments[0];
          if (typeof message === "string" && 
              (message.includes("Accessing element.ref was removed in React 19") ||
               message.includes("ref is now a regular prop") ||
               message.includes("ref was removed in React 19"))) {
            return;
          }
          originalConsoleWarn.apply(console, arguments);
        };
        
        console.error = function() {
          const message = arguments[0];
          if (typeof message === "string" && 
              (message.includes("Accessing element.ref was removed in React 19") ||
               message.includes("ref is now a regular prop") ||
               message.includes("ref was removed in React 19"))) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };
        
        console.log = function() {
          const message = arguments[0];
          if (typeof message === "string" && 
              (message.includes("Accessing element.ref was removed in React 19") ||
               message.includes("ref is now a regular prop"))) {
            return;
          }
          originalConsoleLog.apply(console, arguments);
        };
        
        console.log("🔧 Minimal Early React 19 Compatibility loaded");
      })();
    </script>    
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Датагон</title>
