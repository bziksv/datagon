# =============================================================================
# p.datagon.ru — пример nginx (HTTP + HTTPS)
# =============================================================================
#
# ВАЖНО про «убрал public» в nginx:
#   В репозитории сборка SPA лежит в  public/architectui-react-pro/
#   Express тоже читает оттуда (server.js → __dirname/public/...).
#   Если в nginx root = только .../p.datagon.ru (БЕЗ public), то для URL
#   /architectui-react-pro/static/... nginx будет искать файлы в
#   .../p.datagon.ru/architectui-react-pro/... — их там НЕТ, пока не:
#     - вернуть root .../p.datagon.ru/public  (рекомендуется), ИЛИ
#     - сделать симлинк из корня сайта на public/architectui-react-pro
#
# Про «бекенд в режиме FastCGI» в панели:
#   Datagon — это Node (pm2 parser-app), не PHP-FPM. Запросы /api/* и то,
#   что не попало в отдачу статики, должны идти proxy_pass на 127.0.0.1:3000.
#   Если весь location / отдан FastCGI/PHP — /api и UI от Node перестанут работать.
#
# SSL: впиши свои пути (панель / ls /var/www/httpd-cert/).
#
# Проверки после reload:
#   nginx -t && systemctl reload nginx
#   curl -sI  https://p.datagon.ru/ | head -5
#   curl -sIk https://p.datagon.ru/architectui-react-pro/static/js/main.*.js | egrep 'HTTP|content-type|content-length'
#   curl -s   https://p.datagon.ru/api/auth/me -H 'Accept: application/json' | head -c 200; echo
# =============================================================================

server {
    server_name p.datagon.ru;

    listen 155.212.171.103:80;
    charset utf-8;

    access_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-access.log;
    error_log  /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-error.log;

    # Статика из каталога public репозитория (CRA build → public/architectui-react-pro/)
    location ~* \.(jpg|jpeg|gif|png|svg|js|css|ico|woff|woff2|ttf|eot|otf|mp4|webm|ogg|mp3|wav|zip|pdf|doc|docx|xls|xlsx|csv|xml|json)$ {
        root /var/www/p_datagon_ru_usr/data/www/p.datagon.ru/public;
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # include "/etc/nginx/fastpanel2-sites/p_datagon_ru_usr/p.datagon.ru.includes";
}

server {
    server_name p.datagon.ru;

    listen 155.212.171.103:443 ssl;
    http2 on;
    charset utf-8;

    ssl_certificate     /var/www/httpd-cert/p.datagon.ru.crt;
    ssl_certificate_key /var/www/httpd-cert/p.datagon.ru.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-access.log;
    error_log  /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-error.log;

    location ~* \.(jpg|jpeg|gif|png|svg|js|css|ico|woff|woff2|ttf|eot|otf|mp4|webm|ogg|mp3|wav|zip|pdf|doc|docx|xls|xlsx|csv|xml|json)$ {
        root /var/www/p_datagon_ru_usr/data/www/p.datagon.ru/public;
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # include "/etc/nginx/fastpanel2-sites/p_datagon_ru_usr/p.datagon.ru.includes";
}
