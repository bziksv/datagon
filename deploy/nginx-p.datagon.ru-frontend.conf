# Полный конфиг виртуального хоста p.datagon.ru (как у тебя на s3: frontend-логи, SSL FastPanel, QUIC).
# Datagon = Node на 127.0.0.1:3000, не PHP для / и /api.
#
# Если nginx -t пишет duplicate location "/" — в include от панели тоже есть location /;
#   тогда временно закомментируй два include внизу первого server и правь только этот файл.
#
# Проверка: nginx -t && systemctl reload nginx
#   curl -sI https://p.datagon.ru/ | head -8
#   curl -sI https://p.datagon.ru/architectui-react-pro/dashboard | head -5

server {
    server_name p.datagon.ru;
    listen 155.212.171.103:443 ssl;
    listen 155.212.171.103:443 quic;

    ssl_certificate "/var/www/httpd-cert/p.datagon.ru_2026-04-30-00-38_58.crt";
    ssl_certificate_key "/var/www/httpd-cert/p.datagon.ru_2026-04-30-00-38_58.key";
    add_header Strict-Transport-Security "max-age=31536000" always;

    http2 on;

    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Alt-Svc 'h3=":443"; ma=86400';

    charset utf-8;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/css image/x-ico application/pdf image/jpeg image/png image/gif application/javascript application/x-javascript application/x-pointplus application/json;
    gzip_comp_level 1;

    set $root_path /var/www/p_datagon_ru_usr/data/www/p.datagon.ru;
    disable_symlinks if_not_owner from=$root_path;

    # --- PHP только для .php (если появятся скрипты в корне сайта) ---
    location ~ \.php$ {
        root $root_path;
        include /etc/nginx/fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_pass unix:/var/run/p.datagon.ru.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # --- Статика CRA: URI начинается с /architectui-react-pro/... лежит в public/ ---
    location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpeg|avi|zip|gz|bz2|rar|swf|ico|7z|doc|docx|map|pdf|ttf|tif|txt|wav|webp|woff|woff2|xls|xlsx|xml|json)$ {
        root $root_path/public;
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # --- Datagon (Express) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
    }

    include "/etc/nginx/fastpanel2-sites/p_datagon_ru_usr/p.datagon.ru.includes";
    include /etc/nginx/fastpanel2-includes/*.conf;

    error_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-frontend.error.log;
    access_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-frontend.access.log;
}

server {
    server_name p.datagon.ru;
    listen 155.212.171.103:80;
    return 301 https://$host$request_uri;

    error_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-frontend.error.log;
    access_log /var/www/p_datagon_ru_usr/data/logs/p.datagon.ru-frontend.access.log;
}
